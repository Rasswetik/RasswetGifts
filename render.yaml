# Используем внешнюю бесплатную PostgreSQL от Neon.tech
# 1. Зарегистрируйся на https://neon.tech
# 2. Создай проект и скопируй connection string
# 3. Добавь DATABASE_URL в Dashboard -> Environment

services:
  - type: web
    name: rasswet-gifts
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: DATABASE_URL
        sync: false  # Установи вручную: postgresql://user:pass@host/db от Neon
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: WEBSITE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
