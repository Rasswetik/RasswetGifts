# Render deployment config — PostgreSQL on dpg-d6g8b45m5p6s739vp3pg-a

databases:
  - name: rasswet-gifts-db
    plan: free

services:
  - type: web
    name: rasswet-gifts
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rasswet-gifts-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: WEBSITE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
