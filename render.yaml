# ⚠️ ВАЖНО: Без DATABASE_URL данные СБРАСЫВАЮТСЯ при каждом редеплое!
# 
# ИНСТРУКЦИЯ по настройке PostgreSQL (ОБЯЗАТЕЛЬНО):
# 1. Зайди на https://neon.tech и зарегистрируйся (бесплатно)
# 2. Создай новый проект (Create Project)
# 3. Скопируй Connection String (postgres://...@...neon.tech/neondb?sslmode=require)
# 4. Зайди в Render Dashboard → твой сервис → Environment
# 5. Добавь переменную:
#    Key: DATABASE_URL
#    Value: (вставь connection string от Neon)
# 6. Нажми "Save Changes" и сделай Manual Deploy
#
# БЕЗ ЭТОГО ШАГА ДАННЫЕ БУДУТ ТЕРЯТЬСЯ!

services:
  - type: web
    name: rasswet-gifts
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: DATABASE_URL
        sync: false  # ⚠️ ОБЯЗАТЕЛЬНО установи вручную в Render Dashboard!
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: WEBSITE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
