<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="50%" stop-color="#1a202c"/>
      <stop offset="100%" stop-color="#171923"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="0" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#avatarBg)" stroke="#4a5568" stroke-width="2"/>
  <circle cx="50" cy="36" r="14" fill="url(#personGrad)" filter="url(#innerShadow)"/>
  <path d="M25 82 C25 60, 35 52, 50 52 C65 52, 75 60, 75 82" fill="url(#personGrad)" filter="url(#innerShadow)"/>
  <circle cx="50" cy="36" r="14" fill="none" stroke="#718096" stroke-width="0.5" opacity="0.5"/>
  <path d="M25 82 C25 60, 35 52, 50 52 C65 52, 75 60, 75 82" fill="none" stroke="#718096" stroke-width="0.5" opacity="0.5"/>
</svg>
