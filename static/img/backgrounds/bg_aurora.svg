<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="auroraBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="40%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#081015"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="rgba(30,200,150,0.15)"/>
      <stop offset="40%" stop-color="rgba(50,180,200,0.2)"/>
      <stop offset="60%" stop-color="rgba(100,150,220,0.15)"/>
      <stop offset="80%" stop-color="rgba(150,100,200,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="auroraLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(100,220,180,0.8)"/>
      <stop offset="50%" stop-color="rgba(80,180,220,0.4)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect fill="url(#auroraBg)" width="100" height="100"/>
  <!-- Aurora waves -->
  <ellipse cx="50" cy="25" rx="70" ry="25" fill="url(#aurora1)" filter="url(#blur)" transform="skewY(-5)"/>
  <ellipse cx="50" cy="35" rx="60" ry="20" fill="url(#aurora1)" filter="url(#blur)" transform="skewY(3)" opacity="0.7"/>
  <!-- Aurora lines -->
  <line x1="20" y1="0" x2="20" y2="45" stroke="url(#auroraLine)" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="0" x2="35" y2="40" stroke="url(#auroraLine)" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="0" x2="50" y2="50" stroke="url(#auroraLine)" stroke-width="1.5" opacity="0.7"/>
  <line x1="65" y1="0" x2="65" y2="42" stroke="url(#auroraLine)" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="0" x2="80" y2="48" stroke="url(#auroraLine)" stroke-width="1.5" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="10" cy="80" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="90" cy="75" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="45" cy="90" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="75" cy="85" r="0.7" fill="white" opacity="0.6"/>
</svg>
