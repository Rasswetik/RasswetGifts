<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gridBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E1015"/>
      <stop offset="50%" stop-color="#161923"/>
      <stop offset="100%" stop-color="#0E1015"/>
    </linearGradient>
  </defs>
  <rect fill="url(#gridBg)" width="100" height="100"/>
  <!-- Grid lines -->
  <g stroke="rgba(107,122,141,0.15)" stroke-width="0.5">
    <line x1="0" y1="20" x2="100" y2="20"/>
    <line x1="0" y1="40" x2="100" y2="40"/>
    <line x1="0" y1="60" x2="100" y2="60"/>
    <line x1="0" y1="80" x2="100" y2="80"/>
    <line x1="20" y1="0" x2="20" y2="100"/>
    <line x1="40" y1="0" x2="40" y2="100"/>
    <line x1="60" y1="0" x2="60" y2="100"/>
    <line x1="80" y1="0" x2="80" y2="100"/>
  </g>
  <!-- Glow spots -->
  <ellipse cx="25" cy="30" rx="20" ry="15" fill="rgba(107,122,141,0.1)"/>
  <ellipse cx="75" cy="70" rx="18" ry="12" fill="rgba(140,160,190,0.08)"/>
</svg>
