<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rainbowBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1525"/>
      <stop offset="50%" stop-color="#15182A"/>
      <stop offset="100%" stop-color="#1A1D30"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,100,100,0.2)"/>
      <stop offset="17%" stop-color="rgba(255,180,100,0.2)"/>
      <stop offset="33%" stop-color="rgba(255,255,100,0.2)"/>
      <stop offset="50%" stop-color="rgba(100,255,100,0.2)"/>
      <stop offset="67%" stop-color="rgba(100,200,255,0.2)"/>
      <stop offset="83%" stop-color="rgba(150,100,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,100,200,0.2)"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" stop-color="rgba(255,100,150,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" stop-color="rgba(100,200,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect fill="url(#rainbowBg)" width="100" height="100"/>
  <rect fill="url(#rainbow)" width="100" height="100"/>
  <ellipse cx="30" cy="40" rx="25" ry="20" fill="url(#glow1)"/>
  <ellipse cx="70" cy="60" rx="22" ry="18" fill="url(#glow2)"/>
  <!-- Wave curves -->
  <path d="M0 70 Q25 60 50 70 T100 70 L100 100 L0 100 Z" fill="rgba(255,150,200,0.08)"/>
  <path d="M0 80 Q25 70 50 80 T100 80 L100 100 L0 100 Z" fill="rgba(100,200,255,0.06)"/>
</svg>
