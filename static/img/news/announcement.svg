<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgAnnounce" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3340"/>
      <stop offset="100%" stop-color="#1a2028"/>
    </linearGradient>
    <linearGradient id="megaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98a8c0"/>
      <stop offset="100%" stop-color="#607088"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgAnnounce)"/>
  
  <!-- Wave pattern -->
  <g stroke="rgba(152,168,192,0.04)" fill="none" stroke-width="2">
    <path d="M0 300 Q160 260, 320 300 T640 300"/>
    <path d="M0 320 Q160 280, 320 320 T640 320"/>
    <path d="M0 340 Q160 300, 320 340 T640 340"/>
  </g>
  
  <!-- Sound waves -->
  <g transform="translate(380, 110)" stroke="rgba(152,168,192,0.15)" fill="none" stroke-width="2">
    <path d="M0 0 Q30 -20, 60 0 Q30 20, 0 0"/>
    <path d="M20 0 Q60 -30, 100 0 Q60 30, 20 0"/>
    <path d="M40 0 Q90 -40, 140 0 Q90 40, 40 0"/>
  </g>
  
  <!-- Megaphone icon -->
  <g transform="translate(200, 60)">
    <!-- Main body -->
    <path d="M20 70 L20 130 L80 150 L80 50 Z" fill="none" stroke="url(#megaGrad)" stroke-width="4" stroke-linejoin="round"/>
    <!-- Bell end -->
    <path d="M80 50 Q130 30, 160 20 L160 180 Q130 170, 80 150" fill="none" stroke="url(#megaGrad)" stroke-width="4" stroke-linejoin="round"/>
    <!-- Handle -->
    <rect x="0" y="80" width="25" height="40" rx="5" fill="none" stroke="url(#megaGrad)" stroke-width="3"/>
    <!-- Button -->
    <circle cx="50" cy="100" r="10" fill="none" stroke="#98a8c0" stroke-width="2"/>
    <circle cx="50" cy="100" r="4" fill="#98a8c0"/>
    <!-- Details -->
    <line x1="100" y1="60" x2="100" y2="140" stroke="rgba(152,168,192,0.3)" stroke-width="2"/>
    <line x1="130" y1="45" x2="130" y2="155" stroke="rgba(152,168,192,0.2)" stroke-width="2"/>
  </g>
  
  <!-- Notification dots -->
  <g fill="#98a8c0" opacity="0.4">
    <circle cx="500" cy="80" r="6"/>
    <circle cx="520" cy="95" r="4"/>
    <circle cx="535" cy="85" r="3"/>
    <circle cx="150" cy="250" r="4"/>
    <circle cx="490" cy="260" r="5"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">ОБЪЯВЛЕНИЕ</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Важная информация</text>
</svg>