<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A38"/>
      <stop offset="50%" stop-color="#0E1620"/>
      <stop offset="100%" stop-color="#1A2A38"/>
    </linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#ac)"/>
  <!-- Subtle grid -->
  <g opacity=".03" stroke="#3B82F6" stroke-width=".5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>
  <!-- Small decorative circles -->
  <circle cx="1050" cy="80" r="60" fill="none" stroke="#3B82F6" stroke-width="1" opacity=".06"/>
  <circle cx="1100" cy="300" r="40" fill="none" stroke="#06B6D4" stroke-width="1" opacity=".05"/>
  <circle cx="1000" cy="200" r="25" fill="none" stroke="#3B82F6" stroke-width="1" opacity=".04"/>
  <!-- Version badge -->
  <rect x="60" y="50" width="85" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="102" y="74" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#3B82F6" text-anchor="middle">v1.1</text>
  <!-- Title -->
  <text x="60" y="150" font-family="system-ui,sans-serif" font-size="46" font-weight="900" fill="#fff" letter-spacing="-1">Мобильный интерфейс</text>
  <text x="60" y="185" font-family="system-ui,sans-serif" font-size="17" fill="rgba(255,255,255,0.4)">Обновление Rasswet Gifts</text>
  <!-- Bullet list -->
  <g>
    <circle cx="72" cy="230" r="3" fill="#3B82F6"/>
    <text x="86" y="235" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">Адаптивный дизайн для мобильных</text>
    <circle cx="72" cy="266" r="3" fill="#3B82F6"/>
    <text x="86" y="271" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">Нижняя навигация с иконками</text>
    <circle cx="72" cy="302" r="3" fill="#3B82F6"/>
    <text x="86" y="307" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">Оптимизация модальных окон</text>
    <circle cx="72" cy="338" r="3" fill="#3B82F6"/>
    <text x="86" y="343" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">Плавные анимации переходов</text>
  </g>
  <text x="60" y="385" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.12)" letter-spacing="4">RASSWET GIFTS</text>
</svg>