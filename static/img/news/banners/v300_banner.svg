<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="bgb300" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="acb300" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glowb300" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="320" height="100" rx="12" fill="url(#bgb300)"/>
  <rect y="0" width="320" height="2" fill="url(#acb300)"/>
  <ellipse cx="100" cy="20" rx="80" ry="40" fill="#22c55e" fill-opacity="0.08" filter="url(#glowb300)"/>
  <!-- Version badge -->
  <rect x="20" y="20" width="80" height="28" rx="14" fill="url(#acb300)" fill-opacity="0.15" stroke="url(#acb300)" stroke-width="1"/>
  <text x="60" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="white">v3.0.0</text>
  <!-- Title -->
  <text x="20" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">MAJOR RELEASE</text>
  <text x="20" y="86" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Кейсы • Краш • Апгрейд • Лидеры</text>
  <!-- Icons -->
  <text x="260" y="45" font-size="24">🎰</text>
  <text x="285" y="70" font-size="18">🚀</text>
</svg>
