<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgBan40" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#302a40"/>
      <stop offset="50%" stop-color="#251e30"/>
      <stop offset="100%" stop-color="#1a1520"/>
    </linearGradient>
    <linearGradient id="rocketGrad40" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a090c0"/>
      <stop offset="100%" stop-color="#6050a0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgBan40)"/>
  
  <!-- Stars -->
  <g fill="rgba(160,144,192,0.3)">
    <circle cx="100" cy="80" r="2"/><circle cx="200" cy="120" r="1.5"/>
    <circle cx="150" cy="300" r="2"/><circle cx="250" cy="350" r="1"/>
    <circle cx="800" cy="60" r="2"/><circle cx="900" cy="100" r="1.5"/>
    <circle cx="1000" cy="80" r="2"/><circle cx="1100" cy="150" r="1"/>
    <circle cx="950" cy="320" r="2"/><circle cx="1050" cy="350" r="1.5"/>
  </g>
  
  <!-- Version badge -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="200" height="160" rx="20" fill="rgba(160,144,192,0.1)" stroke="rgba(160,144,192,0.3)" stroke-width="2"/>
    <text x="100" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#9080b0">4.0</text>
    <text x="100" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(144,128,176,0.7)">VERSION</text>
  </g>
  
  <!-- Rocket icon -->
  <g transform="translate(920, 100)">
    <path d="M50 0 L80 60 L80 140 L50 180 L20 140 L20 60 Z" fill="none" stroke="url(#rocketGrad40)" stroke-width="4"/>
    <circle cx="50" cy="80" r="15" fill="none" stroke="rgba(160,144,192,0.5)" stroke-width="2"/>
    <path d="M20 120 L0 160 L20 140" fill="none" stroke="rgba(160,144,192,0.4)" stroke-width="3"/>
    <path d="M80 120 L100 160 L80 140" fill="none" stroke="rgba(160,144,192,0.4)" stroke-width="3"/>
  </g>
  
  <!-- Title -->
  <text x="380" y="180" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#d0c8e8">Краш игра</text>
  <text x="380" y="230" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(208,200,232,0.6)">Новая азартная игра с растущими множителями</text>
  
  <!-- Features -->
  <g transform="translate(380, 280)" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(208,200,232,0.5)">
    <circle cx="0" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="15" y="0">Множители</text>
    <circle cx="150" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="165" y="0">Авто-вывод</text>
    <circle cx="300" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="315" y="0">Таблица лидеров</text>
  </g>
</svg>