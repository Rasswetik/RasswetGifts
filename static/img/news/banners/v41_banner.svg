<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgBan41" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="50%" stop-color="#1e2530"/>
      <stop offset="100%" stop-color="#151a20"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgBan41)"/>
  
  <!-- Grid pattern -->
  <pattern id="gridBan41" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(80,120,160,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#gridBan41)"/>
  
  <!-- Version badge -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="200" height="160" rx="20" fill="rgba(80,120,160,0.1)" stroke="rgba(80,120,160,0.3)" stroke-width="2"/>
    <text x="100" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#5a8ab0">4.1</text>
    <text x="100" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(90,138,176,0.7)">VERSION</text>
  </g>
  
  <!-- Mobile phone icon -->
  <g transform="translate(900, 80)">
    <rect x="0" y="0" width="120" height="220" rx="16" fill="none" stroke="rgba(80,120,160,0.3)" stroke-width="3"/>
    <rect x="40" y="10" width="40" height="6" rx="3" fill="rgba(80,120,160,0.3)"/>
    <circle cx="60" cy="200" r="10" fill="none" stroke="rgba(80,120,160,0.3)" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="380" y="180" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#c8d8e8">Мобильный</text>
  <text x="380" y="230" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(200,216,232,0.6)">Полная оптимизация для мобильных устройств</text>
  
  <!-- Features -->
  <g transform="translate(380, 280)" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(200,216,232,0.5)">
    <circle cx="0" cy="-5" r="4" fill="rgba(80,180,140,0.6)"/>
    <text x="15" y="0">Адаптивный дизайн</text>
    <circle cx="200" cy="-5" r="4" fill="rgba(80,180,140,0.6)"/>
    <text x="215" y="0">Нижняя навигация</text>
    <circle cx="420" cy="-5" r="4" fill="rgba(80,180,140,0.6)"/>
    <text x="435" y="0">Система банов</text>
  </g>
</svg>