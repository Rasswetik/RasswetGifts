<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgBan42" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2d40"/>
      <stop offset="50%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#151820"/>
    </linearGradient>
    <linearGradient id="glowGrad42" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="rgba(100,140,200,0.15)"/>
      <stop offset="70%" stop-color="rgba(100,140,200,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgBan42)"/>
  
  <!-- Grid pattern -->
  <pattern id="gridBan42" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M50 0L0 0 0 50" fill="none" stroke="rgba(100,120,150,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#gridBan42)"/>
  
  <!-- Glow line -->
  <rect x="0" y="195" width="1200" height="10" fill="url(#glowGrad42)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="200" r="180" fill="none" stroke="rgba(100,140,200,0.08)" stroke-width="2"/>
  <circle cx="1050" cy="200" r="150" fill="none" stroke="rgba(100,140,200,0.06)" stroke-width="2"/>
  
  <!-- Version badge -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="200" height="160" rx="20" fill="rgba(100,140,200,0.1)" stroke="rgba(100,140,200,0.3)" stroke-width="2"/>
    <text x="100" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#6a8ab0">4.2</text>
    <text x="100" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(106,138,176,0.7)">VERSION</text>
  </g>
  
  <!-- Title -->
  <text x="380" y="180" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#d0d8e8">Яркие кейсы</text>
  <text x="380" y="230" font-family="Inter, Arial, sans-serif" font-size="24" fill="rgba(208,216,232,0.6)">Анимированные светящиеся рамки и обновлённый дизайн</text>
  
  <!-- Features -->
  <g transform="translate(380, 280)" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(208,216,232,0.5)">
    <circle cx="0" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="15" y="0">Анимация свечения</text>
    <circle cx="200" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="215" y="0">Яркие цвета</text>
    <circle cx="380" cy="-5" r="4" fill="rgba(100,200,150,0.6)"/>
    <text x="395" y="0">Новые обложки</text>
  </g>
  
  <!-- Decorative elements -->
  <g fill="rgba(100,140,200,0.2)">
    <circle cx="950" cy="100" r="5"/>
    <circle cx="1000" cy="150" r="3"/>
    <circle cx="1080" cy="120" r="4"/>
    <circle cx="900" cy="300" r="4"/>
    <circle cx="1100" cy="280" r="3"/>
  </g>
</svg>