<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg43" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2636"/>
      <stop offset="50%" style="stop-color:#141820"/>
      <stop offset="100%" style="stop-color:#0E1218"/>
    </linearGradient>
    <linearGradient id="accent43" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50B8FF"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="glow43">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg43)"/>
  
  <!-- Decorative grid -->
  <g stroke="rgba(200,208,220,0.03)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent43)"/>
  
  <!-- Version badge -->
  <rect x="50" y="50" width="100" height="40" rx="20" fill="url(#accent43)"/>
  <text x="100" y="78" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">v4.3</text>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="120" fill="none" stroke="rgba(80,184,255,0.1)" stroke-width="2"/>
  <circle cx="1100" cy="100" r="80" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="2"/>
  <circle cx="1100" cy="100" r="40" fill="rgba(139,92,246,0.1)"/>
  
  <!-- Document/News icon -->
  <g transform="translate(900, 60)">
    <rect x="0" y="0" width="70" height="90" rx="8" fill="none" stroke="rgba(80,184,255,0.5)" stroke-width="2"/>
    <line x1="15" y1="25" x2="55" y2="25" stroke="rgba(200,208,220,0.4)" stroke-width="2"/>
    <line x1="15" y1="40" x2="55" y2="40" stroke="rgba(200,208,220,0.3)" stroke-width="2"/>
    <line x1="15" y1="55" x2="40" y2="55" stroke="rgba(200,208,220,0.2)" stroke-width="2"/>
    <line x1="15" y1="70" x2="55" y2="70" stroke="rgba(200,208,220,0.2)" stroke-width="2"/>
    <!-- Corner fold -->
    <path d="M50,0 L70,0 L70,20 L50,20 Z" fill="rgba(80,184,255,0.2)"/>
    <path d="M50,0 L50,20 L70,20" fill="none" stroke="rgba(80,184,255,0.4)" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="50" y="160" font-family="Inter,Arial,sans-serif" font-size="48" font-weight="800" fill="#E8ECF2">Детали новостей</text>
  
  <!-- Subtitle -->
  <text x="50" y="210" font-family="Inter,Arial,sans-serif" font-size="22" fill="rgba(200,208,220,0.7)">Полные страницы новостей и улучшения краш-игры</text>
  
  <!-- Feature list -->
  <g transform="translate(50, 260)">
    <circle cx="8" cy="8" r="4" fill="#50B8FF"/>
    <text x="25" y="14" font-family="Inter,Arial,sans-serif" font-size="16" fill="rgba(200,208,220,0.8)">Страницы обновлений с полными деталями</text>
  </g>
  <g transform="translate(50, 295)">
    <circle cx="8" cy="8" r="4" fill="#8B5CF6"/>
    <text x="25" y="14" font-family="Inter,Arial,sans-serif" font-size="16" fill="rgba(200,208,220,0.8)">Улучшенная плавность краш-игры</text>
  </g>
  <g transform="translate(50, 330)">
    <circle cx="8" cy="8" r="4" fill="#1EE44C"/>
    <text x="25" y="14" font-family="Inter,Arial,sans-serif" font-size="16" fill="rgba(200,208,220,0.8)">Исправление коэффициента вывода</text>
  </g>
  <g transform="translate(450, 260)">
    <circle cx="8" cy="8" r="4" fill="#FF9D42"/>
    <text x="25" y="14" font-family="Inter,Arial,sans-serif" font-size="16" fill="rgba(200,208,220,0.8)">Осветлённые панели кейсов</text>
  </g>
  <g transform="translate(450, 295)">
    <circle cx="8" cy="8" r="4" fill="#C8D0DC"/>
    <text x="25" y="14" font-family="Inter,Arial,sans-serif" font-size="16" fill="rgba(200,208,220,0.8)">Новый аватар RG для бота</text>
  </g>
</svg>
