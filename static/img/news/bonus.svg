<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgBonus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d3a2a"/>
      <stop offset="100%" stop-color="#2a281a"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b888"/>
      <stop offset="100%" stop-color="#8a8060"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgBonus)"/>
  
  <!-- Radial lines -->
  <g stroke="rgba(200,184,136,0.05)" stroke-width="1">
    <line x1="320" y1="180" x2="0" y2="0"/>
    <line x1="320" y1="180" x2="640" y2="0"/>
    <line x1="320" y1="180" x2="0" y2="360"/>
    <line x1="320" y1="180" x2="640" y2="360"/>
    <line x1="320" y1="180" x2="0" y2="180"/>
    <line x1="320" y1="180" x2="640" y2="180"/>
    <line x1="320" y1="180" x2="320" y2="0"/>
    <line x1="320" y1="180" x2="320" y2="360"/>
  </g>
  
  <!-- Decorative rings -->
  <circle cx="320" cy="110" r="80" fill="none" stroke="rgba(200,184,136,0.08)" stroke-width="2"/>
  <circle cx="320" cy="110" r="100" fill="none" stroke="rgba(200,184,136,0.05)" stroke-width="1"/>
  
  <!-- Star/coin icon -->
  <g transform="translate(260, 50)">
    <!-- Coin base -->
    <ellipse cx="60" cy="90" rx="55" ry="20" fill="#6a6050" opacity="0.5"/>
    <!-- Coin stack -->
    <ellipse cx="60" cy="80" rx="50" ry="18" fill="none" stroke="#8a8060" stroke-width="3"/>
    <ellipse cx="60" cy="70" rx="50" ry="18" fill="none" stroke="#a89870" stroke-width="3"/>
    <ellipse cx="60" cy="60" rx="50" ry="18" fill="none" stroke="url(#coinGrad)" stroke-width="4"/>
    <!-- Star on top coin -->
    <polygon points="60,40 66,56 83,56 69,66 75,82 60,72 45,82 51,66 37,56 54,56" fill="#c8b888"/>
    <!-- Shine effect -->
    <path d="M30 50 Q60 45 90 50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>
  
  <!-- Floating plus signs -->
  <g stroke="#c8b888" stroke-width="2" opacity="0.4">
    <g transform="translate(140, 130)">
      <line x1="0" y1="-8" x2="0" y2="8"/>
      <line x1="-8" y1="0" x2="8" y2="0"/>
    </g>
    <g transform="translate(500, 100)">
      <line x1="0" y1="-6" x2="0" y2="6"/>
      <line x1="-6" y1="0" x2="6" y2="0"/>
    </g>
    <g transform="translate(180, 270)">
      <line x1="0" y1="-5" x2="0" y2="5"/>
      <line x1="-5" y1="0" x2="5" y2="0"/>
    </g>
    <g transform="translate(460, 250)">
      <line x1="0" y1="-7" x2="0" y2="7"/>
      <line x1="-7" y1="0" x2="7" y2="0"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">БОНУС</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Ежедневная награда</text>
</svg>