<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg20" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#220A0A"/>
      <stop offset="100%" stop-color="#0C0606"/>
    </radialGradient>
    <linearGradient id="ac20" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <radialGradient id="gl20" cx="50%" cy="20%" rx="45%" ry="35%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg20)" stroke="#DC2626" stroke-opacity="0.12"/>
  <rect y="0" width="320" height="4" rx="2" fill="url(#ac20)"/>
  <ellipse cx="160" cy="30" rx="150" ry="65" fill="url(#gl20)"/>
  <!-- Premium double border effect -->
  <rect x="8" y="8" width="304" height="164" rx="12" fill="none" stroke="#DC2626" stroke-opacity="0.04" stroke-width="0.5"/>
  <!-- Diagonal lines - premium feel -->
  <line x1="0" y1="180" x2="80" y2="100" stroke="#DC2626" stroke-opacity="0.04" stroke-width="0.8"/>
  <line x1="10" y1="180" x2="90" y2="100" stroke="#B91C1C" stroke-opacity="0.03" stroke-width="0.8"/>
  <line x1="240" y1="180" x2="320" y2="100" stroke="#DC2626" stroke-opacity="0.04" stroke-width="0.8"/>
  <line x1="250" y1="180" x2="320" y2="110" stroke="#B91C1C" stroke-opacity="0.03" stroke-width="0.8"/>
  <!-- Floating circles -->
  <circle cx="50" cy="40" r="22" fill="none" stroke="#DC2626" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="280" cy="140" r="28" fill="none" stroke="#B91C1C" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="295" cy="35" r="12" fill="none" stroke="#DC2626" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Door/flag icon -->
  <g transform="translate(252, 45)" opacity="0.2">
    <rect x="8" y="0" width="24" height="40" rx="2" fill="none" stroke="#DC2626" stroke-width="2"/>
    <circle cx="27" cy="22" r="2.5" fill="#DC2626" fill-opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#B91C1C" stroke-width="2"/>
    <polygon points="0,2 18,8 18,18 0,12" fill="#DC2626" fill-opacity="0.25" stroke="#DC2626" stroke-width="1"/>
  </g>
  <!-- Dot accents -->
  <circle cx="35" cy="130" r="1.5" fill="#DC2626" fill-opacity="0.12"/>
  <circle cx="50" cy="145" r="1" fill="#B91C1C" fill-opacity="0.1"/>
  <text x="160" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="white">v2.0</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#DC2626" fill-opacity="0.4" letter-spacing="3">OPEN BETA</text>
