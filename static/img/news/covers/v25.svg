<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg25" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1A0E28"/>
      <stop offset="100%" stop-color="#0A080E"/>
    </radialGradient>
    <linearGradient id="ac25" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="gl25" cx="50%" cy="20%" rx="40%" ry="30%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg25)" stroke="#A855F7" stroke-opacity="0.1"/>
  <rect y="0" width="320" height="4" rx="2" fill="url(#ac25)"/>
  <ellipse cx="160" cy="30" rx="140" ry="60" fill="url(#gl25)"/>
  <!-- Curved paths - flow/feed feel -->
  <path d="M10 130 Q80 100 160 120 T310 100" fill="none" stroke="#A855F7" stroke-opacity="0.04" stroke-width="0.8"/>
  <path d="M10 145 Q80 115 160 135 T310 115" fill="none" stroke="#06B6D4" stroke-opacity="0.03" stroke-width="0.8"/>
  <!-- Floating circles -->
  <circle cx="45" cy="40" r="16" fill="none" stroke="#A855F7" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="25" cy="140" r="20" fill="none" stroke="#06B6D4" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="295" cy="140" r="14" fill="none" stroke="#A855F7" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Dot constellation -->
  <circle cx="280" cy="30" r="1.5" fill="#A855F7" fill-opacity="0.15"/>
  <circle cx="295" cy="38" r="1" fill="#06B6D4" fill-opacity="0.12"/>
  <circle cx="270" cy="42" r="1.2" fill="#A855F7" fill-opacity="0.08"/>
  <circle cx="300" cy="52" r="0.8" fill="#06B6D4" fill-opacity="0.1"/>
  <!-- Gift + feed combined icon -->
  <g transform="translate(248, 44)" opacity="0.2">
    <!-- Gift box -->
    <rect x="0" y="14" width="20" height="16" rx="2" fill="none" stroke="#A855F7" stroke-width="1.8"/>
    <rect x="-2" y="10" width="24" height="6" rx="2" fill="none" stroke="#A855F7" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="10" y2="30" stroke="#A855F7" stroke-width="1.2"/>
    <path d="M10 10 Q5 3 3 5 Q1 7 6 10" fill="none" stroke="#A855F7" stroke-width="1"/>
    <path d="M10 10 Q15 3 17 5 Q19 7 14 10" fill="none" stroke="#A855F7" stroke-width="1"/>
    <!-- Feed lines -->
    <line x1="26" y1="12" x2="42" y2="12" stroke="#06B6D4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="26" y1="19" x2="42" y2="19" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26" y1="26" x2="36" y2="26" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="160" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="900" fill="white">v2.5</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#A855F7" fill-opacity="0.4" letter-spacing="3">CASES &amp; FEED</text>
</svg>