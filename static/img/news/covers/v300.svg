<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg300" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1319"/>
    </radialGradient>
    <linearGradient id="ac300" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar300" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="barBg300" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2f3e"/>
      <stop offset="100%" stop-color="#1e2330"/>
    </linearGradient>
    <radialGradient id="gl300" cx="50%" cy="20%" rx="42%" ry="32%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg300)" stroke="#6366f1" stroke-opacity="0.1"/>
  <rect y="0" width="320" height="4" rx="2" fill="url(#ac300)"/>
  <ellipse cx="160" cy="30" rx="140" ry="60" fill="url(#gl300)"/>
  <!-- Floating particles -->
  <circle cx="40" cy="35" r="1.5" fill="#6366f1" fill-opacity="0.15"/>
  <circle cx="280" cy="45" r="1" fill="#3b82f6" fill-opacity="0.12"/>
  <circle cx="55" cy="145" r="1.2" fill="#6366f1" fill-opacity="0.1"/>
  <circle cx="265" cy="140" r="0.8" fill="#3b82f6" fill-opacity="0.08"/>
  <!-- Decorative circles -->
  <circle cx="290" cy="40" r="18" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="30" cy="140" r="14" fill="none" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Title -->
  <text x="160" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="44" fill="white">v3.0.0</text>
  <text x="160" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="2">COMING SOON</text>
  <!-- Progress bar background -->
  <rect x="60" y="108" width="200" height="10" rx="5" fill="url(#barBg300)"/>
  <!-- Progress bar fill (20%) -->
  <rect x="60" y="108" width="40" height="10" rx="5" fill="url(#bar300)"/>
  <!-- Progress text -->
  <text x="160" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="13" fill="rgba(255,255,255,0.4)">20%</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6366f1" fill-opacity="0.4" letter-spacing="2">IN DEVELOPMENT</text>
</svg>
