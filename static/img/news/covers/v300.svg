<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg300" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent300" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow300" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur300" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg300)"/>
  <!-- Glow effects -->
  <ellipse cx="160" cy="60" rx="100" ry="50" fill="url(#glow300)" filter="url(#blur300)"/>
  <ellipse cx="80" cy="140" rx="60" ry="40" fill="#3b82f6" fill-opacity="0.1" filter="url(#blur300)"/>
  <ellipse cx="240" cy="130" rx="50" ry="35" fill="#8b5cf6" fill-opacity="0.1" filter="url(#blur300)"/>
  <!-- Top accent line -->
  <rect y="0" width="320" height="3" rx="1.5" fill="url(#accent300)"/>
  <!-- Version badge -->
  <rect x="110" y="30" width="100" height="36" rx="18" fill="url(#accent300)" fill-opacity="0.15" stroke="url(#accent300)" stroke-width="1.5"/>
  <text x="160" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="20" fill="white">v3.0.0</text>
  <!-- Title -->
  <text x="160" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="14" fill="white">MAJOR UPDATE</text>
  <!-- Icons row -->
  <g transform="translate(80,105)">
    <circle cx="0" cy="15" r="18" fill="#22c55e" fill-opacity="0.15"/>
    <text x="0" y="21" text-anchor="middle" font-size="18">🎰</text>
  </g>
  <g transform="translate(130,105)">
    <circle cx="0" cy="15" r="18" fill="#3b82f6" fill-opacity="0.15"/>
    <text x="0" y="21" text-anchor="middle" font-size="18">🏆</text>
  </g>
  <g transform="translate(180,105)">
    <circle cx="0" cy="15" r="18" fill="#8b5cf6" fill-opacity="0.15"/>
    <text x="0" y="21" text-anchor="middle" font-size="18">📦</text>
  </g>
  <g transform="translate(230,105)">
    <circle cx="0" cy="15" r="18" fill="#ec4899" fill-opacity="0.15"/>
    <text x="0" y="21" text-anchor="middle" font-size="18">🚀</text>
  </g>
  <!-- Subtitle -->
  <text x="160" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.5)">NFT Апгрейд • Лидерборд • Кейсы • Краш</text>
</svg>
