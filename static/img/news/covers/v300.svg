<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <radialGradient id="bg300" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1319"/>
    </radialGradient>
    <linearGradient id="ac300" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1EE44C"/>
      <stop offset="100%" stop-color="#0098EA"/>
    </linearGradient>
    <linearGradient id="bar300" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1EE44C"/>
      <stop offset="50%" stop-color="#0098EA"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="barBg300" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2f3e"/>
      <stop offset="100%" stop-color="#1e2330"/>
    </linearGradient>
    <radialGradient id="gl300" cx="50%" cy="20%" rx="42%" ry="32%">
      <stop offset="0%" stop-color="#1EE44C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0098EA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg300)"/>
  <rect y="0" width="320" height="3" rx="1.5" fill="url(#ac300)"/>
  <ellipse cx="160" cy="30" rx="140" ry="60" fill="url(#gl300)"/>
  <!-- Decorative dots -->
  <circle cx="40" cy="35" r="1.5" fill="#1EE44C" fill-opacity="0.2"/>
  <circle cx="280" cy="45" r="1" fill="#0098EA" fill-opacity="0.15"/>
  <circle cx="55" cy="145" r="1.2" fill="#6366f1" fill-opacity="0.12"/>
  <circle cx="265" cy="140" r="0.8" fill="#1EE44C" fill-opacity="0.1"/>
  <circle cx="160" cy="28" r="22" fill="none" stroke="#1EE44C" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="290" cy="40" r="14" fill="none" stroke="#0098EA" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Title -->
  <text x="160" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="42" fill="white">v3.0</text>
  <text x="160" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="3">MAJOR UPDATE</text>
  <!-- Progress bar background -->
  <rect x="60" y="106" width="200" height="12" rx="6" fill="url(#barBg300)"/>
  <!-- Progress bar fill (70%) -->
  <rect x="60" y="106" width="140" height="12" rx="6" fill="url(#bar300)"/>
  <!-- Progress glow -->
  <rect x="60" y="106" width="140" height="12" rx="6" fill="url(#bar300)" opacity="0.3" filter="blur(4)"/>
  <!-- Progress text -->
  <text x="160" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="14" fill="rgba(255,255,255,0.55)">70%</text>
  <text x="160" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1EE44C" fill-opacity="0.5" letter-spacing="2.5">В РАЗРАБОТКЕ</text>
</svg>
