<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg310" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent310" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gold310" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="blur310" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg310)"/>
  <!-- Glow effects -->
  <ellipse cx="160" cy="60" rx="100" ry="50" fill="#f59e0b" fill-opacity="0.15" filter="url(#blur310)"/>
  <ellipse cx="80" cy="140" rx="60" ry="40" fill="#ef4444" fill-opacity="0.1" filter="url(#blur310)"/>
  <!-- Top accent line -->
  <rect y="0" width="320" height="3" rx="1.5" fill="url(#accent310)"/>
  <!-- Version badge -->
  <rect x="110" y="30" width="100" height="36" rx="18" fill="url(#accent310)" fill-opacity="0.15" stroke="url(#accent310)" stroke-width="1.5"/>
  <text x="160" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="20" fill="white">v3.1.0</text>
  <!-- Title -->
  <text x="160" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="14" fill="white">BALANCE UPDATE</text>
  <!-- Scale icon -->
  <g transform="translate(160,125)">
    <rect x="-2" y="-12" width="4" height="28" rx="2" fill="url(#gold310)"/>
    <rect x="-32" y="-16" width="64" height="4" rx="2" fill="url(#gold310)"/>
    <circle cx="-26" cy="0" r="14" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="26" cy="0" r="14" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
    <text x="-26" y="5" text-anchor="middle" font-size="14">⚖️</text>
  </g>
  <!-- Subtitle -->
  <text x="160" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.5)">Кейсы • Краш • RTP • Защита</text>
</svg>
