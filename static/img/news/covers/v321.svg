<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg321" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent321" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur321" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="320" height="180" rx="16" fill="url(#bg321)"/>
  <!-- Glow effects -->
  <ellipse cx="160" cy="60" rx="100" ry="50" fill="#10b981" fill-opacity="0.12" filter="url(#blur321)"/>
  <ellipse cx="80" cy="140" rx="60" ry="40" fill="#06b6d4" fill-opacity="0.08" filter="url(#blur321)"/>
  <!-- Top accent line -->
  <rect y="0" width="320" height="3" rx="1.5" fill="url(#accent321)"/>
  <!-- Version badge -->
  <rect x="110" y="30" width="100" height="36" rx="18" fill="url(#accent321)" fill-opacity="0.15" stroke="url(#accent321)" stroke-width="1.5"/>
  <text x="160" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="20" fill="white">v3.2.1</text>
  <!-- Title -->
  <text x="160" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="14" fill="white">BUG FIX</text>
  <!-- Checkmark icon -->
  <g transform="translate(160,120)">
    <circle cx="0" cy="0" r="22" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <path d="M-8 0 L-2 6 L10 -6" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Subtitle -->
  <text x="160" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.5)">Исправления • Оптимизация • Стабильность</text>
</svg>
