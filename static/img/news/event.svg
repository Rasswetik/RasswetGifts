<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgEvent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2f3d"/>
      <stop offset="100%" stop-color="#1a1e2a"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a95a8"/>
      <stop offset="100%" stop-color="#5c6577"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgEvent)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#grid1)"/>
  
  <!-- Decorative circles -->
  <circle cx="520" cy="80" r="120" fill="none" stroke="rgba(138,149,168,0.1)" stroke-width="1"/>
  <circle cx="520" cy="80" r="80" fill="none" stroke="rgba(138,149,168,0.08)" stroke-width="1"/>
  <circle cx="100" cy="300" r="100" fill="none" stroke="rgba(138,149,168,0.06)" stroke-width="1"/>
  
  <!-- Calendar icon -->
  <g transform="translate(270, 100)">
    <rect x="0" y="20" width="100" height="90" rx="12" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
    <path d="M0 50 L100 50" stroke="url(#iconGrad)" stroke-width="2"/>
    <rect x="20" y="10" width="6" height="20" rx="3" fill="#8a95a8"/>
    <rect x="74" y="10" width="6" height="20" rx="3" fill="#8a95a8"/>
    <!-- Calendar dots -->
    <circle cx="30" cy="70" r="6" fill="#6b7585"/>
    <circle cx="50" cy="70" r="6" fill="#6b7585"/>
    <circle cx="70" cy="70" r="6" fill="#8a95a8"/>
    <circle cx="30" cy="90" r="6" fill="#6b7585"/>
    <circle cx="50" cy="90" r="6" fill="#8a95a8"/>
    <circle cx="70" cy="90" r="6" fill="#6b7585"/>
  </g>
  
  <!-- Spark decorations -->
  <g fill="#8a95a8" opacity="0.4">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="460" cy="200" r="2"/>
    <circle cx="140" cy="260" r="2"/>
    <circle cx="500" cy="280" r="3"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">СОБЫТИЕ</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Новое игровое событие</text>
</svg>