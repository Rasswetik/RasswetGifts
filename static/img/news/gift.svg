<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgGift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2a35"/>
      <stop offset="100%" stop-color="#2a1a22"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a88898"/>
      <stop offset="100%" stop-color="#756070"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a8b8"/>
      <stop offset="100%" stop-color="#988090"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGift)"/>
  
  <!-- Confetti pattern -->
  <g fill="rgba(168,136,152,0.1)">
    <rect x="100" y="50" width="8" height="4" rx="2" transform="rotate(25)"/>
    <rect x="500" y="80" width="10" height="5" rx="2" transform="rotate(-15)"/>
    <rect x="150" y="290" width="6" height="3" rx="1" transform="rotate(45)"/>
    <rect x="480" y="260" width="8" height="4" rx="2" transform="rotate(-30)"/>
    <rect x="80" y="180" width="7" height="3" rx="1" transform="rotate(60)"/>
    <rect x="550" y="180" width="9" height="4" rx="2" transform="rotate(-50)"/>
  </g>
  
  <!-- Sparkle circles -->
  <circle cx="530" cy="90" r="40" fill="none" stroke="rgba(200,168,184,0.1)" stroke-width="2"/>
  <circle cx="100" cy="280" r="35" fill="none" stroke="rgba(200,168,184,0.08)" stroke-width="2"/>
  
  <!-- Gift box icon -->
  <g transform="translate(250, 70)">
    <!-- Box body -->
    <rect x="15" y="60" width="110" height="80" rx="6" fill="none" stroke="url(#boxGrad)" stroke-width="4"/>
    <!-- Box lid -->
    <rect x="5" y="40" width="130" height="25" rx="6" fill="none" stroke="url(#boxGrad)" stroke-width="4"/>
    <!-- Vertical ribbon -->
    <rect x="60" y="40" width="20" height="100" fill="#756070" opacity="0.5"/>
    <rect x="62" y="42" width="16" height="96" fill="none" stroke="url(#ribbonGrad)" stroke-width="2"/>
    <!-- Horizontal ribbon -->
    <rect x="15" y="75" width="110" height="15" fill="#756070" opacity="0.5"/>
    <!-- Bow -->
    <ellipse cx="55" cy="32" rx="20" ry="12" fill="none" stroke="url(#ribbonGrad)" stroke-width="3"/>
    <ellipse cx="85" cy="32" rx="20" ry="12" fill="none" stroke="url(#ribbonGrad)" stroke-width="3"/>
    <circle cx="70" cy="35" r="8" fill="#a88898"/>
  </g>
  
  <!-- Floating sparkles -->
  <g fill="#c8a8b8" opacity="0.5">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="460" cy="150" r="2"/>
    <circle cx="200" cy="250" r="2"/>
    <circle cx="440" cy="270" r="3"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">ПОДАРКИ</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Новые подарки в каталоге</text>
</svg>