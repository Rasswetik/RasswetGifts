<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2a"/>
      <stop offset="50%" style="stop-color:#252b3b"/>
      <stop offset="100%" style="stop-color:#1a1e2a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32"/>
      <stop offset="100%" style="stop-color:#a56028"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="100" fill="rgba(255,215,0,0.03)"/>
  <circle cx="560" cy="300" r="120" fill="rgba(255,170,0,0.03)"/>
  
  <!-- Trophy icon -->
  <g transform="translate(280, 60)" filter="url(#glow)">
    <!-- Trophy cup -->
    <path d="M40 20 L40 80 C40 100 20 110 20 130 L60 130 C60 110 40 100 40 80 L40 20 Z
             M40 20 L40 80 C40 100 60 110 60 130 L20 130 C20 110 40 100 40 80 L40 20 Z" 
          fill="url(#goldGrad)" opacity="0.9"/>
    <ellipse cx="40" cy="20" rx="30" ry="12" fill="url(#goldGrad)"/>
    <rect x="10" y="130" width="60" height="8" rx="2" fill="url(#goldGrad)"/>
    <rect x="20" y="138" width="40" height="15" rx="2" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Handles -->
    <path d="M10 30 C-10 30 -10 70 10 70" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
    <path d="M70 30 C90 30 90 70 70 70" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Star on trophy -->
    <polygon points="40,35 44,47 57,47 47,55 51,67 40,59 29,67 33,55 23,47 36,47" fill="#1a1e2a" opacity="0.5"/>
  </g>
  
  <!-- Podium -->
  <g transform="translate(120, 210)">
    <!-- 2nd place -->
    <rect x="0" y="60" width="120" height="90" fill="url(#silverGrad)" opacity="0.3"/>
    <text x="60" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="url(#silverGrad)">2</text>
    
    <!-- 1st place -->
    <rect x="140" y="20" width="120" height="130" fill="url(#goldGrad)" opacity="0.3"/>
    <text x="200" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#goldGrad)">1</text>
    
    <!-- 3rd place -->
    <rect x="280" y="80" width="120" height="70" fill="url(#bronzeGrad)" opacity="0.3"/>
    <text x="340" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="url(#bronzeGrad)">3</text>
  </g>
  
  <!-- Title -->
  <text x="320" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#fff">РЕЙТИНГ ИГРОКОВ</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="180" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="590" cy="120" r="4" fill="#ffd700" opacity="0.4"/>
  <circle cx="80" cy="320" r="2" fill="#ffaa00" opacity="0.5"/>
  <circle cx="560" cy="60" r="2" fill="#ffd700" opacity="0.7"/>
</svg>
