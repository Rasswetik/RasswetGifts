<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgLb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2a3a"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="100%" stop-color="#8a7860"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8b0b8"/>
      <stop offset="100%" stop-color="#707880"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b89878"/>
      <stop offset="100%" stop-color="#806850"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgLb)"/>
  
  <!-- Grid pattern -->
  <pattern id="gridLb" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(168,176,184,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#gridLb)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="280" r="80" fill="none" stroke="rgba(168,176,184,0.05)" stroke-width="2"/>
  <circle cx="540" cy="80" r="60" fill="none" stroke="rgba(168,176,184,0.04)" stroke-width="2"/>
  
  <!-- Trophy icon -->
  <g transform="translate(270, 40)">
    <!-- Cup body -->
    <path d="M50 30 L50 90 C50 120, 100 120, 100 90 L100 30" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
    <!-- Cup top -->
    <ellipse cx="75" cy="30" rx="30" ry="10" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Handles -->
    <path d="M50 45 Q20 50, 20 70 Q20 90, 45 90" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <path d="M100 45 Q130 50, 130 70 Q130 90, 105 90" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <!-- Base -->
    <rect x="55" y="115" width="40" height="10" rx="3" fill="#8a7860"/>
    <rect x="50" y="125" width="50" height="12" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Star on cup -->
    <polygon points="75,50 80,65 95,65 83,75 88,90 75,80 62,90 67,75 55,65 70,65" fill="rgba(200,184,152,0.3)" stroke="url(#goldGrad)" stroke-width="1"/>
  </g>
  
  <!-- Podium -->
  <g transform="translate(170, 200)">
    <!-- 2nd place -->
    <rect x="0" y="40" width="80" height="60" rx="4" fill="none" stroke="url(#silverGrad)" stroke-width="3"/>
    <text x="40" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#a8b0b8">2</text>
    
    <!-- 1st place -->
    <rect x="100" y="10" width="100" height="90" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <text x="150" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#c8b898">1</text>
    
    <!-- 3rd place -->
    <rect x="220" y="55" width="80" height="45" rx="4" fill="none" stroke="url(#bronzeGrad)" stroke-width="3"/>
    <text x="260" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#b89878">3</text>
  </g>
  
  <!-- Sparkles -->
  <g fill="rgba(200,184,152,0.4)">
    <circle cx="200" cy="100" r="3"/>
    <circle cx="440" cy="120" r="2"/>
    <circle cx="180" cy="180" r="2"/>
    <circle cx="460" cy="190" r="3"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#c8d0dc">РЕЙТИНГ</text>
</svg>