<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgMaint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2a3d"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a95a8"/>
      <stop offset="100%" stop-color="#6c6577"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgMaint)"/>
  
  <!-- Hex pattern -->
  <pattern id="hex" width="50" height="43" patternUnits="userSpaceOnUse">
    <path d="M25 0 L50 12.5 L50 37.5 L25 50 L0 37.5 L0 12.5 Z" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#hex)"/>
  
  <!-- Gear decoration -->
  <circle cx="520" cy="70" r="60" fill="none" stroke="rgba(154,149,168,0.08)" stroke-width="8" stroke-dasharray="15 10"/>
  <circle cx="100" cy="290" r="45" fill="none" stroke="rgba(154,149,168,0.06)" stroke-width="6" stroke-dasharray="12 8"/>
  
  <!-- Wrench & Gear icon -->
  <g transform="translate(250, 80)">
    <!-- Gear -->
    <circle cx="70" cy="70" r="35" fill="none" stroke="url(#toolGrad)" stroke-width="4"/>
    <circle cx="70" cy="70" r="18" fill="none" stroke="url(#toolGrad)" stroke-width="3"/>
    <!-- Gear teeth -->
    <g stroke="url(#toolGrad)" stroke-width="4" stroke-linecap="round">
      <line x1="70" y1="30" x2="70" y2="18"/>
      <line x1="70" y1="110" x2="70" y2="122"/>
      <line x1="30" y1="70" x2="18" y2="70"/>
      <line x1="110" y1="70" x2="122" y2="70"/>
      <line x1="42" y1="42" x2="33" y2="33"/>
      <line x1="98" y1="98" x2="107" y2="107"/>
      <line x1="42" y1="98" x2="33" y2="107"/>
      <line x1="98" y1="42" x2="107" y2="33"/>
    </g>
    
    <!-- Wrench -->
    <g transform="translate(-10, 20) rotate(-45, 70, 70)">
      <rect x="60" y="90" width="20" height="60" rx="4" fill="#6c6577"/>
      <path d="M50 75 C50 55, 90 55, 90 75 L90 90 L50 90 Z" fill="#8a8598"/>
      <rect x="62" y="70" width="16" height="8" fill="#1a1a2a"/>
    </g>
  </g>
  
  <!-- Floating elements -->
  <g fill="#9a95a8" opacity="0.3">
    <rect x="150" y="140" width="8" height="8" rx="2"/>
    <rect x="480" y="190" width="6" height="6" rx="1"/>
    <rect x="180" y="260" width="5" height="5" rx="1"/>
    <rect x="450" y="280" width="7" height="7" rx="2"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">ТЕХРАБОТЫ</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Плановое обслуживание</text>
</svg>