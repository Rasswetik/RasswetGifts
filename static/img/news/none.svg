<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2a"/>
      <stop offset="100%" style="stop-color:#252b3b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGrad)"/>
  
  <!-- Center placeholder icon -->
  <g transform="translate(280, 140)">
    <!-- Image frame icon -->
    <rect x="0" y="0" width="80" height="60" rx="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
    <circle cx="25" cy="20" r="8" fill="rgba(255,255,255,0.15)"/>
    <path d="M10 50 L30 35 L45 45 L55 38 L70 50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.3)">Изображение не загружено</text>
</svg>
