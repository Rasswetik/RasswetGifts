<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgNone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252830"/>
      <stop offset="100%" stop-color="#1a1c22"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#606570"/>
      <stop offset="100%" stop-color="#404550"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgNone)"/>
  
  <!-- Subtle pattern -->
  <pattern id="dotNone" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="rgba(96,101,112,0.15)"/>
  </pattern>
  <rect width="640" height="360" fill="url(#dotNone)"/>
  
  <!-- Image frame icon (centered) -->
  <g transform="translate(260, 100)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="120" height="100" rx="12" fill="none" stroke="url(#frameGrad)" stroke-width="4"/>
    <!-- Inner frame line -->
    <rect x="10" y="10" width="100" height="80" rx="6" fill="none" stroke="rgba(96,101,112,0.3)" stroke-width="2"/>
    
    <!-- Mountain/landscape icon -->
    <path d="M25 75 L45 50 L60 65 L80 40 L95 75 Z" fill="none" stroke="url(#frameGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Sun circle -->
    <circle cx="35" cy="35" r="10" fill="none" stroke="url(#frameGrad)" stroke-width="2"/>
    
    <!-- Diagonal line through (missing/broken indicator) -->
    <line x1="110" y1="10" x2="130" y2="-10" stroke="rgba(96,101,112,0.4)" stroke-width="2" stroke-linecap="round"/>
    <line x1="130" y1="-10" x2="150" y2="-30" stroke="rgba(96,101,112,0.3)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4"/>
  </g>
  
  <!-- Question marks -->
  <g fill="rgba(96,101,112,0.2)" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">
    <text x="180" y="140">?</text>
    <text x="450" y="200">?</text>
  </g>
  
  <!-- Text -->
  <text x="320" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="rgba(200,208,220,0.4)">Изображение не загружено</text>
  <text x="320" y="285" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="rgba(200,208,220,0.25)">Выберите обложку для новости</text>
</svg>