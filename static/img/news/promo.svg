<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgPromo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3d2d"/>
      <stop offset="100%" stop-color="#1a2a1c"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88a892"/>
      <stop offset="100%" stop-color="#5a7560"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgPromo)"/>
  
  <!-- Diagonal lines -->
  <pattern id="diag" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M0 20 L20 0" stroke="rgba(136,168,146,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#diag)"/>
  
  <!-- Abstract shapes -->
  <ellipse cx="550" cy="100" rx="100" ry="60" fill="none" stroke="rgba(136,168,146,0.1)" stroke-width="2"/>
  <ellipse cx="80" cy="280" rx="80" ry="50" fill="none" stroke="rgba(136,168,146,0.08)" stroke-width="2"/>
  
  <!-- Price tag icon -->
  <g transform="translate(245, 80)">
    <path d="M150 70 L85 5 L5 5 L5 85 L70 150 Z" fill="none" stroke="url(#tagGrad)" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="40" cy="40" r="15" fill="none" stroke="url(#tagGrad)" stroke-width="3"/>
    <!-- Percent sign -->
    <g transform="translate(70, 45)" fill="#88a892">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#88a892" stroke-width="2"/>
      <circle cx="40" cy="40" r="10" fill="none" stroke="#88a892" stroke-width="2"/>
      <line x1="5" y1="45" x2="35" y2="-5" stroke="#88a892" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Stars -->
  <g fill="#88a892" opacity="0.4">
    <polygon points="160,130 163,140 173,140 165,147 168,157 160,150 152,157 155,147 147,140 157,140"/>
    <polygon points="490,200 492,207 499,207 493,212 495,219 490,214 485,219 487,212 481,207 488,207" transform="scale(0.8)"/>
    <polygon points="580,280 583,290 593,290 585,297 588,307 580,300 572,307 575,297 567,290 577,290" transform="scale(0.7)"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">АКЦИЯ</text>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Специальное предложение</text>
</svg>