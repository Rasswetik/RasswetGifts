<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2a"/>
      <stop offset="50%" style="stop-color:#252b3b"/>
      <stop offset="100%" style="stop-color:#1a1e2a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="rgba(0,255,136,0.03)"/>
  <circle cx="540" cy="280" r="150" fill="rgba(0,204,255,0.03)"/>
  <circle cx="320" cy="180" r="200" fill="rgba(255,255,255,0.01)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="60" x2="640" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="640" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="180" x2="640" y2="180" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="640" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="640" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="360" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Rocket icon -->
  <g transform="translate(120, 100)" filter="url(#glow)">
    <path d="M60 10 C60 10 100 50 100 100 C100 130 80 150 60 160 C40 150 20 130 20 100 C20 50 60 10 60 10Z" 
          fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <circle cx="60" cy="80" r="15" fill="none" stroke="url(#accentGrad)" stroke-width="2"/>
    <path d="M35 140 L25 170 L45 160 Z" fill="url(#accentGrad)" opacity="0.7"/>
    <path d="M85 140 L95 170 L75 160 Z" fill="url(#accentGrad)" opacity="0.7"/>
    <path d="M50 155 L50 180 L60 200 L70 180 L70 155 Z" fill="url(#accentGrad)" opacity="0.5"/>
  </g>
  
  <!-- Version badge -->
  <rect x="360" y="100" width="180" height="80" rx="16" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.3)" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#accentGrad)">v4.1</text>
  
  <!-- Title -->
  <text x="320" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#fff">ОБНОВЛЕНИЕ</text>
  <text x="320" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.5)">Новые функции и улучшения</text>
  
  <!-- Decorative stars -->
  <circle cx="50" cy="50" r="2" fill="#00ff88" opacity="0.8"/>
  <circle cx="590" cy="80" r="3" fill="#00ccff" opacity="0.6"/>
  <circle cx="600" cy="320" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="40" cy="300" r="2" fill="#00ccff" opacity="0.7"/>
  <circle cx="200" cy="40" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="50" r="2" fill="#fff" opacity="0.3"/>
</svg>
