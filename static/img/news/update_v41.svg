<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgUpdate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2d3d"/>
      <stop offset="100%" stop-color="#1a1c2a"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98a5b8"/>
      <stop offset="100%" stop-color="#606878"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgUpdate)"/>
  
  <!-- Diagonal pattern -->
  <pattern id="diagUp" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M0 30 L30 0" stroke="rgba(152,165,184,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#diagUp)"/>
  
  <!-- Motion lines -->
  <g stroke="rgba(152,165,184,0.1)" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="250" x2="180" y2="250"/>
    <line x1="80" y1="280" x2="200" y2="280"/>
    <line x1="120" y1="220" x2="160" y2="220"/>
  </g>
  
  <!-- Stars decoration -->
  <g fill="rgba(152,165,184,0.15)">
    <circle cx="500" cy="60" r="3"/>
    <circle cx="550" cy="100" r="2"/>
    <circle cx="480" cy="120" r="2"/>
    <circle cx="530" cy="80" r="4"/>
    <circle cx="180" cy="100" r="2"/>
    <circle cx="140" cy="150" r="3"/>
  </g>
  
  <!-- Rocket icon -->
  <g transform="translate(240, 60)">
    <!-- Rocket body -->
    <path d="M80 20 L110 70 L110 130 L80 160 L50 130 L50 70 Z" fill="none" stroke="url(#rocketGrad)" stroke-width="4" stroke-linejoin="round"/>
    <!-- Nose cone -->
    <path d="M80 20 Q60 40, 50 70 M80 20 Q100 40, 110 70" fill="none" stroke="url(#rocketGrad)" stroke-width="3"/>
    <!-- Window -->
    <circle cx="80" cy="85" r="18" fill="none" stroke="#98a5b8" stroke-width="3"/>
    <circle cx="80" cy="85" r="10" fill="rgba(152,165,184,0.2)"/>
    <!-- Fins -->
    <path d="M50 110 L30 140 L50 130" fill="none" stroke="#606878" stroke-width="3" stroke-linejoin="round"/>
    <path d="M110 110 L130 140 L110 130" fill="none" stroke="#606878" stroke-width="3" stroke-linejoin="round"/>
    <!-- Exhaust -->
    <ellipse cx="80" cy="165" rx="20" ry="8" fill="none" stroke="rgba(152,165,184,0.4)" stroke-width="2"/>
    <ellipse cx="80" cy="175" rx="15" ry="6" fill="none" stroke="rgba(152,165,184,0.3)" stroke-width="2"/>
  </g>
  
  <!-- Version badge -->
  <g transform="translate(375, 85)">
    <rect x="0" y="0" width="80" height="40" rx="10" fill="rgba(152,165,184,0.1)" stroke="rgba(152,165,184,0.3)" stroke-width="2"/>
    <text x="40" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#98a5b8">v4.1</text>
  </g>
  
  <!-- Text -->
  <text x="320" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c8d0dc">ОБНОВЛЕНИЕ</text>
  <text x="320" y="290" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(200,208,220,0.5)">Новая версия приложения</text>
</svg>