<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bgV42" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28293a"/>
      <stop offset="100%" stop-color="#18192a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgV42)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="gridV42" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0L0 0 0 60" fill="none" stroke="rgba(150,160,180,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="640" height="360" fill="url(#gridV42)"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="300" r="120" fill="none" stroke="rgba(150,160,180,0.06)" stroke-width="2"/>
  <circle cx="560" cy="60" r="100" fill="none" stroke="rgba(150,160,180,0.05)" stroke-width="2"/>
  
  <!-- Floating dots -->
  <g fill="rgba(150,160,180,0.2)">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="540" cy="280" r="4"/>
    <circle cx="180" cy="200" r="2"/>
    <circle cx="460" cy="150" r="3"/>
    <circle cx="520" cy="200" r="2"/>
  </g>
  
  <!-- Main version text -->
  <text x="320" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="100" font-weight="900" fill="#6a7080" letter-spacing="-5">V4.2</text>
  
  <!-- Subtitle -->
  <text x="320" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(150,160,180,0.6)">ОБНОВЛЕНИЕ</text>
  
  <!-- Decorative lines -->
  <line x1="200" y1="290" x2="260" y2="290" stroke="rgba(150,160,180,0.15)" stroke-width="2" stroke-linecap="round"/>
  <line x1="380" y1="290" x2="440" y2="290" stroke="rgba(150,160,180,0.15)" stroke-width="2" stroke-linecap="round"/>
</svg>