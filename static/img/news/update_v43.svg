<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bgNews" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2636"/>
      <stop offset="100%" style="stop-color:#0E1218"/>
    </linearGradient>
    <linearGradient id="accentNews" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50B8FF"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" rx="16" fill="url(#bgNews)"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="318" height="178" rx="15" fill="none" stroke="rgba(200,208,220,0.1)" stroke-width="1"/>
  
  <!-- Grid pattern -->
  <g stroke="rgba(200,208,220,0.04)" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="240" y1="0" x2="240" y2="180"/>
    <line x1="0" y1="60" x2="320" y2="60"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
  </g>
  
  <!-- Document icon -->
  <g transform="translate(125, 35)">
    <rect x="0" y="0" width="70" height="90" rx="8" fill="none" stroke="url(#accentNews)" stroke-width="2"/>
    <line x1="15" y1="20" x2="55" y2="20" stroke="rgba(200,208,220,0.5)" stroke-width="2"/>
    <line x1="15" y1="35" x2="55" y2="35" stroke="rgba(200,208,220,0.4)" stroke-width="2"/>
    <line x1="15" y1="50" x2="40" y2="50" stroke="rgba(200,208,220,0.3)" stroke-width="2"/>
    <line x1="15" y1="65" x2="55" y2="65" stroke="rgba(200,208,220,0.3)" stroke-width="2"/>
    <!-- Corner fold -->
    <path d="M50,0 L70,0 L70,20 L50,20 Z" fill="rgba(80,184,255,0.15)"/>
    <path d="M50,0 L50,20 L70,20" fill="none" stroke="url(#accentNews)" stroke-width="2"/>
  </g>
  
  <!-- Version badge -->
  <rect x="20" y="20" width="60" height="26" rx="13" fill="url(#accentNews)"/>
  <text x="50" y="39" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">v4.3</text>
  
  <!-- Title -->
  <text x="160" y="155" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="rgba(200,208,220,0.9)" text-anchor="middle">Детали новостей</text>
  
  <!-- Decorative circles -->
  <circle cx="280" cy="40" r="25" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <circle cx="40" cy="140" r="20" fill="none" stroke="rgba(80,184,255,0.15)" stroke-width="1"/>
</svg>
