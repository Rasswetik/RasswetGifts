<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A303C"/>
      <stop offset="50%" style="stop-color:#1E2330"/>
      <stop offset="100%" style="stop-color:#12151C"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8ECF2"/>
      <stop offset="50%" style="stop-color:#C8D0DC"/>
      <stop offset="100%" style="stop-color:#A0AABC"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(200,208,220,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(200,208,220,0)"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Subtle border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="rgba(200,208,220,0.15)" stroke-width="3"/>
  
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(200,208,220,0.08)" stroke-width="1"/>
  
  <!-- Top glow accent -->
  <ellipse cx="256" cy="120" rx="150" ry="80" fill="url(#glowGrad)"/>
  
  <!-- Grid pattern background -->
  <g opacity="0.05">
    <line x1="100" y1="256" x2="412" y2="256" stroke="#C8D0DC" stroke-width="1"/>
    <line x1="256" y1="140" x2="256" y2="372" stroke="#C8D0DC" stroke-width="1"/>
    <line x1="140" y1="180" x2="372" y2="332" stroke="#C8D0DC" stroke-width="0.5"/>
    <line x1="372" y1="180" x2="140" y2="332" stroke="#C8D0DC" stroke-width="0.5"/>
  </g>
  
  <!-- Main RG text -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="180" font-weight="800" fill="url(#textGrad)" filter="url(#textShadow)">
    RG
  </text>
  
  <!-- Subtle shine on text -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="180" font-weight="800" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#glow)">
    RG
  </text>
  
  <!-- Small accent dots -->
  <circle cx="120" cy="256" r="4" fill="rgba(200,208,220,0.3)"/>
  <circle cx="392" cy="256" r="4" fill="rgba(200,208,220,0.3)"/>
  <circle cx="256" cy="130" r="3" fill="rgba(200,208,220,0.2)"/>
  <circle cx="256" cy="382" r="3" fill="rgba(200,208,220,0.2)"/>
  
  <!-- Corner accents -->
  <path d="M80,160 L80,100 L140,100" fill="none" stroke="rgba(200,208,220,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M432,160 L432,100 L372,100" fill="none" stroke="rgba(200,208,220,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M80,352 L80,412 L140,412" fill="none" stroke="rgba(200,208,220,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M432,352 L432,412 L372,412" fill="none" stroke="rgba(200,208,220,0.2)" stroke-width="2" stroke-linecap="round"/>
</svg>
