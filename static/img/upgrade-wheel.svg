<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  
  <!-- Outer gray ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2d3748" stroke-width="4"/>
  
  <!-- Concentric circles with tick marks -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1e2736" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#1a212d" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#171d27" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#151a22" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#131820" stroke-width="1.5"/>
  
  <!-- Tick marks on outer ring -->
  <g stroke="#3d4a5c" stroke-width="1">
    <line x1="100" y1="4" x2="100" y2="12"/>
    <line x1="100" y1="188" x2="100" y2="196"/>
    <line x1="4" y1="100" x2="12" y2="100"/>
    <line x1="188" y1="100" x2="196" y2="100"/>
    <line x1="32" y1="32" x2="38" y2="38"/>
    <line x1="162" y1="162" x2="168" y2="168"/>
    <line x1="168" y1="32" x2="162" y2="38"/>
    <line x1="38" y1="162" x2="32" y2="168"/>
  </g>
  
  <!-- Small tick marks -->
  <g stroke="#2a3544" stroke-width="0.5">
    <line x1="50" y1="10" x2="52" y2="16"/>
    <line x1="150" y1="10" x2="148" y2="16"/>
    <line x1="10" y1="50" x2="16" y2="52"/>
    <line x1="10" y1="150" x2="16" y2="148"/>
    <line x1="190" y1="50" x2="184" y2="52"/>
    <line x1="190" y1="150" x2="184" y2="148"/>
    <line x1="50" y1="190" x2="52" y2="184"/>
    <line x1="150" y1="190" x2="148" y2="184"/>
  </g>
  
  <!-- Center dark circle with border -->
  <circle cx="100" cy="100" r="38" fill="#0d1117" stroke="#2a3544" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="36" fill="none" stroke="#1a212d" stroke-width="0.5" stroke-dasharray="2 2"/>
</svg>