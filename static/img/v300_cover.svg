<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0f1319"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a2f3e"/>
      <stop offset="100%" style="stop-color:#1e2330"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="180" rx="16" fill="url(#bg)"/>
  <rect width="320" height="180" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Title -->
  <text x="160" y="58" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="28" fill="#fff" letter-spacing="2">v3.0.0</text>
  <!-- Subtitle -->
  <text x="160" y="80" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="1">COMING SOON</text>
  <!-- Progress bar background -->
  <rect x="40" y="100" width="240" height="12" rx="6" fill="url(#barBg)"/>
  <!-- Progress bar fill (35%) -->
  <rect x="40" y="100" width="84" height="12" rx="6" fill="url(#bar)"/>
  <!-- Progress glow -->
  <rect x="40" y="100" width="84" height="12" rx="6" fill="url(#bar)" opacity="0.4" filter="blur(4px)"/>
  <!-- Progress text -->
  <text x="160" y="135" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="14" fill="rgba(255,255,255,0.5)">35%</text>
  <!-- Counter -->
  <text x="160" y="158" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="11" fill="rgba(255,255,255,0.25)">34 / 100</text>
</svg>
