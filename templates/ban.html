<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="/static/img/logo.png">
<title>Доступ ограничен</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
    font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    color:#fff;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

.ban-container{
    text-align:center;
    padding:40px 24px;
    max-width:400px;
}

.ban-icon{
    width:120px;
    height:120px;
    margin:0 auto 24px;
    background:linear-gradient(145deg, #3a3a3a, #2a2a2a);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.ban-icon svg{
    width:60px;
    height:60px;
    color:#ff4444;
}

.ban-title{
    font-size:28px;
    font-weight:700;
    color:#ff4444;
    margin-bottom:12px;
}

.ban-subtitle{
    font-size:16px;
    color:#888;
    margin-bottom:32px;
    line-height:1.5;
}

.ban-reason-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;
}

.ban-label{
    font-size:12px;
    color:#666;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:8px;
}

.ban-reason{
    font-size:16px;
    color:#ccc;
    font-weight:500;
}

.ban-until-box{
    background:rgba(255,68,68,0.1);
    border:1px solid rgba(255,68,68,0.2);
    border-radius:12px;
    padding:16px;
    margin-bottom:32px;
}

.ban-until-label{
    font-size:12px;
    color:#ff6666;
    margin-bottom:4px;
}

.ban-until{
    font-size:18px;
    color:#ff4444;
    font-weight:600;
}

.ban-permanent{
    color:#ff4444;
    font-weight:600;
}

.support-text{
    font-size:14px;
    color:#555;
    line-height:1.6;
}

.support-link{
    color:#4a9eff;
    text-decoration:none;
}

.support-link:hover{
    text-decoration:underline;
}

/* Анимация появления */
.ban-container{
    animation:fadeIn 0.5s ease-out;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="ban-container">
    <div class="ban-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
    </div>
    
    <h1 class="ban-title">Аккаунт заблокирован</h1>
    <p class="ban-subtitle">Ваш доступ к платформе ограничен администратором</p>
    
    <div class="ban-reason-box">
        <div class="ban-label">Причина</div>
        <div class="ban-reason" id="banReason">Загрузка...</div>
    </div>
    
    <div class="ban-until-box" id="banUntilBox" style="display:none">
        <div class="ban-until-label">Блокировка до</div>
        <div class="ban-until" id="banUntil"></div>
    </div>
    
    <div class="ban-permanent" id="banPermanent" style="display:none">
        Блокировка бессрочная
    </div>
    
    <p class="support-text">
        Если вы считаете, что произошла ошибка,<br>
        свяжитесь с <a href="https://t.me/rasswet_support" class="support-link">поддержкой</a>
    </p>
</div>

<script>
(function(){
    var tg = window.Telegram && window.Telegram.WebApp;
    if(tg){
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#1a1a1a');
        tg.setBackgroundColor('#0d0d0d');
    }
    
    // Получаем данные о бане
    var userId = null;
    if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
        userId = tg.initDataUnsafe.user.id;
    }
    
    if(userId){
        fetch('/api/check-ban?user_id=' + userId)
            .then(function(r){ return r.json(); })
            .then(function(d){
                if(d.success && d.banned){
                    document.getElementById('banReason').textContent = d.reason || 'Нарушение правил';
                    
                    if(d.until){
                        var date = new Date(d.until);
                        var formatted = date.toLocaleString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        document.getElementById('banUntil').textContent = formatted;
                        document.getElementById('banUntilBox').style.display = 'block';
                    } else {
                        document.getElementById('banPermanent').style.display = 'block';
                    }
                } else {
                    // Не забанен, редирект на главную
                    window.location.href = '/';
                }
            })
            .catch(function(){
                document.getElementById('banReason').textContent = 'Нарушение правил';
                document.getElementById('banPermanent').style.display = 'block';
            });
    } else {
        document.getElementById('banReason').textContent = 'Нарушение правил';
        document.getElementById('banPermanent').style.display = 'block';
    }
})();
</script>

</body>
</html>
