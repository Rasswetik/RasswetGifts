<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1A1E2A">
    <title>Rasswet Gifts - Кейсы</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/global.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-cyrillic-wght-normal.DqGufNeO.woff2) format("woff2-variations");unicode-range:U+301,U+400-45F,U+490-491,U+4B0-4B1,U+2116}
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-latin-wght-normal.Dx4kXJAl.woff2) format("woff2-variations");unicode-range:U+??,U+131,U+152-153,U+2BB-2BC,U+2C6,U+2DA,U+2DC,U+304,U+308,U+329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

        *{margin:0;padding:0;box-sizing:border-box}
        html{font-synthesis:none;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        
        :root{
            --bg:#1A1E2A;
            --surface:#242936;
            --surface-2:#2C3142;
            --border:rgba(255,255,255,.06);
            --text:#fff;
            --text-2:#828AA4;
            --primary:#0098EA;
            --accent:#1EE44C;
            --gold:#FDA100;
            --blue:#0098EA;
        }

        body{
            font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                radial-gradient(circle at 20% 50%,rgba(140,160,190,.08) 0%,transparent 50%),
                radial-gradient(circle at 80% 50%,rgba(140,160,190,.06) 0%,transparent 50%);
            z-index:-1;
        }

        /* ═══════════ LOADING ═══════════ */
        .loader{
            position:fixed;inset:0;
            background:#1A1E2A;
            z-index:9999;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:24px;
            transition:opacity .4s,visibility .4s;
        }
        .loader.hide{opacity:0;visibility:hidden;pointer-events:none}
        .loader-gif{width:100px;height:100px;border-radius:20px;animation:float 2.5s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        .loader-bar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
        .loader-bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .3s}

        /* ═══════════ HEADER ═══════════ */
        .header{
            position:fixed;top:env(safe-area-inset-top,0);left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:56px;padding:0 16px;
            background:rgba(26,30,42,.85);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;gap:10px;
        }
        .h-online{
            display:flex;align-items:center;gap:5px;
            padding:6px 12px;border-radius:16px;
            background:rgba(30,228,76,.08);border:1px solid rgba(30,228,76,.15);
            font-size:12px;font-weight:700;color:var(--accent);
        }
        .h-online svg{width:14px;height:14px}
        .h-spacer{flex:1}
        .h-bal{
            display:flex;align-items:center;gap:6px;
            padding:6px 14px;border-radius:20px;
            background:rgba(255,255,255,.06);border:1px solid var(--border);
            font-size:14px;font-weight:700;
        }
        .h-bal img{width:16px;height:16px}
        .h-add{
            width:28px;height:28px;border-radius:50%;border:none;
            background:rgba(255,255,255,.08);
            color:#fff;font-size:18px;font-weight:500;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:background .2s;
        }
        .h-add:hover{background:rgba(255,255,255,.15)}

        /* ═══════════ MAIN ═══════════ */
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,0) + 100px) 16px 100px;
        }

        /* ═══════════ LIVE FEED ═══════════ */
        .feed{
            display:flex;align-items:center;gap:10px;
            margin-bottom:16px;
            overflow:hidden;
        }
        .feed-dot{
            width:8px;height:8px;border-radius:50%;
            background:var(--accent);
            animation:blink 2s ease-in-out infinite;
            flex-shrink:0;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .feed-label{
            font-size:11px;font-weight:700;color:#e53935;
            text-transform:uppercase;flex-shrink:0;
        }
        .feed-scroll{
            flex:1;display:flex;gap:8px;
            overflow:hidden;
        }
        .feed-track{
            display:flex;gap:8px;
            /* Static until new wins - no auto-scroll animation */
        }
        @keyframes feedScrollIn{
            0%{transform:translateX(-44px);opacity:0}
            100%{transform:translateX(0);opacity:1}
        }
        .feed-track .feed-item.new{
            animation:feedScrollIn .4s ease;
        }
        .feed-item{
            width:36px;height:36px;
            background:rgba(255,255,255,.04);
            border-radius:8px;
            padding:4px;flex-shrink:0;
        }
        .feed-item img{width:100%;height:100%;object-fit:contain;border-radius:4px}

        /* ═══════════ TABS ═══════════ */
        .tabs{
            display:flex;gap:12px;margin-bottom:16px;
        }
        .tab{
            padding:8px 0;border:none;background:transparent;
            color:var(--text-2);
            font-family:inherit;font-size:16px;font-weight:700;
            cursor:pointer;transition:color .2s;
            position:relative;
        }
        .tab.active{color:var(--text)}
        .tab.active::after{
            content:'';position:absolute;bottom:0;left:0;right:0;
            height:2px;background:var(--primary);border-radius:1px;
        }

        /* ═══════════ CASES GRID ═══════════ */
        .cases{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
        }

        .case{
            position:relative;
            border-radius:20px;
            overflow:hidden;
            cursor:pointer;
            transition:transform .2s,box-shadow .2s;
        }
        .case:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.6)}
        
        .case-glow{
            position:absolute;inset:0;
            border-radius:20px;
            padding:3px;
            background:linear-gradient(160deg,rgba(255,255,255,.25),rgba(255,255,255,.1) 40%,transparent 70%);
            animation:glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse{
            0%,100%{opacity:0.8;filter:brightness(1)}
            50%{opacity:1;filter:brightness(1.3)}
        }
        .case-inner{
            background:linear-gradient(160deg,#3A4560,#252A38);
            border-radius:17px;
            padding:10px;
            height:100%;
            display:flex;flex-direction:column;
        }

        .case.g-yellow .case-glow{background:linear-gradient(160deg,rgba(255,210,50,0.7),rgba(253,190,19,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(253,190,19,0.3)}
        .case.g-yellow .case-inner{background:linear-gradient(160deg,#6a6035,#3A352A)}
        .case.g-blue .case-glow{background:linear-gradient(160deg,rgba(50,180,255,0.7),rgba(0,152,234,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(0,152,234,0.3)}
        .case.g-blue .case-inner{background:linear-gradient(160deg,#3A5580,#253040)}
        .case.g-purple .case-glow{background:linear-gradient(160deg,rgba(170,120,255,0.7),rgba(139,92,246,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(139,92,246,0.3)}
        .case.g-purple .case-inner{background:linear-gradient(160deg,#553a80,#2E2548)}
        .case.g-green .case-glow{background:linear-gradient(160deg,rgba(80,255,120,0.7),rgba(30,228,76,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(30,228,76,0.3)}
        .case.g-green .case-inner{background:linear-gradient(160deg,#3A7050,#253830)}
        .case.g-orange .case-glow{background:linear-gradient(160deg,rgba(255,160,80,0.7),rgba(255,120,50,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(255,120,50,0.3)}
        .case.g-orange .case-inner{background:linear-gradient(160deg,#705040,#3A3028)}
        .case.g-red .case-glow{background:linear-gradient(160deg,rgba(255,100,100,0.7),rgba(239,68,68,0.4) 40%,transparent 70%);box-shadow:0 0 25px rgba(239,68,68,0.3)}
        .case.g-red .case-inner{background:linear-gradient(160deg,#703A3A,#3A2828)}

        .case-prices{
            display:flex;align-items:center;gap:8px;
            margin-bottom:8px;
        }
        .case-price{
            display:flex;align-items:center;gap:4px;
            font-size:12px;font-weight:700;
        }
        .case-price img{width:12px;height:12px}
        .case-price.ton{color:var(--blue)}

        .case-img{
            flex:1;display:flex;align-items:center;justify-content:center;
            padding:4px;min-height:150px;
        }
        .case-img img{
            width:110%;max-width:130%;height:auto;
            object-fit:contain;
            transition:transform .3s,filter .3s;
            filter:drop-shadow(0 10px 20px rgba(0,0,0,.5)) brightness(1.1);
        }
        .case:hover .case-img img{transform:scale(1.2) rotate(-3deg);filter:drop-shadow(0 14px 28px rgba(0,0,0,.6)) brightness(1.2)}

        /* ═══════════ BOTTOM NAV ═══════════ */
        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(26,30,42,.85);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-top:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);
            transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.08)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}

        /* ═══════════ CASE MODAL ═══════════ */
        .modal-overlay{
            position:fixed;inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            z-index:200;
            opacity:0;visibility:hidden;
            transition:opacity .3s,visibility .3s;
        }
        .modal-overlay.open{opacity:1;visibility:visible}

        .modal{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
            z-index:201;width:100%;max-width:480px;
            max-height:92vh;
            background:var(--surface);
            border-radius:24px 24px 0 0;
            overflow:hidden;
            transition:transform .35s cubic-bezier(.32,.72,0,1);
        }
        .modal-overlay.open .modal{transform:translateX(-50%) translateY(0)}

        .modal-scroll{
            max-height:92vh;overflow-y:auto;
            padding:12px 16px calc(env(safe-area-inset-bottom,0) + 24px);
        }

        .modal-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}

        .modal-hdr{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:20px;
        }
        .modal-name{font-size:18px;font-weight:700}
        .modal-price{
            display:flex;align-items:center;gap:6px;
            padding:8px 14px;border-radius:12px;
            background:rgba(0,152,234,.12);border:1px solid rgba(0,152,234,.25);
            font-size:15px;font-weight:700;color:var(--blue);
        }
        .modal-price img{width:18px;height:18px}

        /* ═══════════ IDLE ROULETTE ═══════════ */
        .roulette-wrap{
            position:relative;
            height:168px;margin:0 -16px 20px;
            background:rgba(0,0,0,.25);
            overflow:hidden;
        }
        .roulette-track{
            display:flex;gap:10px;
            padding:10px 0 10px 10px;
            will-change:transform;
            backface-visibility:hidden;
            -webkit-backface-visibility:hidden;
            transform:translateZ(0);
        }
        .roulette-track.idle{animation:idleScroll 20s linear infinite}
        .roulette-track.spinning{animation:none}
        @keyframes idleScroll{
            0%{transform:translateX(0)}
            100%{transform:translateX(-50%)}
        }
        .roulette-item{
            flex-shrink:0;width:110px;height:150px;
            background:rgba(255,255,255,.04);
            border:none;
            border-radius:14px;
            padding:10px;
            display:flex;flex-direction:column;align-items:center;
            justify-content:space-between;
        }
        .roulette-item-name{
            font-size:10px;font-weight:600;color:var(--text);
            text-align:center;line-height:1.2;
            max-width:100%;overflow:hidden;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
            min-height:24px;
        }
        .roulette-item img{
            width:60px;height:60px;object-fit:contain;
            image-rendering:-webkit-optimize-contrast;
            image-rendering:crisp-edges;
            backface-visibility:hidden;
            -webkit-backface-visibility:hidden;
        }
        .roulette-item-price{
            display:flex;align-items:center;gap:3px;
            padding:4px 8px;border-radius:8px;
            background:rgba(0,152,234,.12);
            font-size:10px;font-weight:700;color:var(--blue);
        }
        .roulette-item-price img{width:12px;height:12px}
        .roulette-pointer{
            position:absolute;top:0;left:50%;transform:translateX(-50%);
            width:3px;height:100%;
            background:linear-gradient(180deg,var(--accent),transparent 90%);
            z-index:5;
        }
        .roulette-pointer::before{
            content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
            border:8px solid transparent;border-top:12px solid var(--accent);
        }
        .roulette-wrap.won .roulette-pointer{background:linear-gradient(180deg,#FDA100,transparent 90%)}
        .roulette-wrap.won .roulette-pointer::before{border-top-color:#FDA100}

        /* ═══════════ MODAL WIN ═══════════ */
        .modal-win{
            text-align:center;
            padding:20px 0;
            animation:winFadeIn .4s ease;
        }
        @keyframes winFadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        .modal-win-badge{
            display:inline-block;
            padding:8px 20px;border-radius:20px;
            background:linear-gradient(135deg,var(--accent),#19A93A);
            color:#090B11;font-size:14px;font-weight:700;
            margin-bottom:16px;
        }
        .modal-win-img{
            width:120px;height:120px;
            object-fit:contain;
            margin:0 auto 12px;
            display:block;
            filter:drop-shadow(0 8px 20px rgba(30,228,76,.3));
            animation:modalWinFloat 2s ease-in-out infinite;
        }
        @keyframes modalWinFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        .modal-win-name{font-size:18px;font-weight:700;margin-bottom:8px}
        .modal-win-value{
            display:inline-flex;align-items:center;gap:6px;
            padding:8px 16px;border-radius:12px;
            background:rgba(0,152,234,.12);
            font-size:16px;font-weight:700;color:var(--blue);
        }
        .modal-win-value img{width:18px;height:18px}
        .modal-win-btns{
            display:flex;gap:10px;
            margin-top:20px;
        }
        .modal-win-btn{
            flex:1;padding:14px;border-radius:14px;
            border:none;
            background:rgba(255,255,255,.04);
            color:#fff;
            font-family:inherit;font-size:14px;font-weight:600;
            cursor:pointer;transition:all .2s;
        }
        .modal-win-btn:hover{background:rgba(255,255,255,.1)}
        .modal-win-btn.primary{
            background:linear-gradient(135deg,var(--accent),#19A93A);
            border:none;color:#fff;
        }

        /* ═══════════ PROMO INPUT ═══════════ */
        .promo-input-wrap{
            margin:0 0 16px;
            padding:16px;
            background:rgba(253,161,0,.08);
            border:1px solid rgba(253,161,0,.2);
            border-radius:16px;
        }
        .promo-input-label{
            font-size:12px;font-weight:700;color:var(--gold);
            margin-bottom:10px;
        }
        .promo-input-row{
            display:flex;gap:10px;
        }
        .promo-input{
            flex:1;padding:12px 14px;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(255,255,255,.1);
            border-radius:12px;
            color:#fff;
            font-family:inherit;font-size:14px;font-weight:600;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .promo-input::placeholder{color:var(--text-2);text-transform:none;letter-spacing:0}
        .promo-input:focus{outline:none;border-color:var(--gold)}
        .promo-btn{
            padding:12px 20px;
            background:linear-gradient(135deg,var(--gold),#E08C00);
            border:none;border-radius:12px;
            color:#090B11;font-family:inherit;
            font-size:14px;font-weight:700;
            cursor:pointer;transition:all .2s;
        }
        .promo-btn:hover{transform:scale(1.02)}
        .promo-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* ═══════════ SLIDE TO OPEN ═══════════ */
        .slider-wrap{
            margin:20px 0;
            position:relative;
        }
        .slider{
            position:relative;
            height:56px;
            background:linear-gradient(90deg,rgba(0,152,234,.2),rgba(0,152,234,.1));
            border:1px solid rgba(0,152,234,.3);
            border-radius:28px;
            overflow:hidden;
        }
        .slider-bg{
            position:absolute;inset:0;
            background:linear-gradient(90deg,var(--primary),#0077CC);
            transform:scaleX(0);
            transform-origin:left;
            transition:transform .1s;
        }
        .slider-text{
            position:absolute;inset:0;
            display:flex;align-items:center;justify-content:center;
            gap:8px;
            font-size:15px;font-weight:700;color:rgba(255,255,255,.6);
            pointer-events:none;
            z-index:2;
        }
        .slider-text svg{width:20px;height:20px;animation:slideArrow 1.5s ease-in-out infinite}
        @keyframes slideArrow{
            0%,100%{transform:translateX(0);opacity:.6}
            50%{transform:translateX(8px);opacity:1}
        }
        .slider-thumb{
            position:absolute;top:4px;left:4px;
            width:48px;height:48px;
            background:linear-gradient(135deg,var(--primary),#0077CC);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            cursor:grab;
            z-index:3;
            transition:box-shadow .2s;
            touch-action:none;
        }
        .slider-thumb:active{cursor:grabbing;box-shadow:0 0 20px rgba(0,152,234,.5)}
        .slider-thumb img{width:24px;height:24px;pointer-events:none;user-select:none;-webkit-user-drag:none}

        /* ═══════════ RANGE SLIDER ═══════════ */
        input[type="range"]{
            -webkit-appearance:none;appearance:none;
            width:100%;height:6px;
            background:rgba(255,255,255,.1);
            border-radius:3px;outline:none;
            cursor:pointer;
        }
        input[type="range"]::-webkit-slider-thumb{
            -webkit-appearance:none;appearance:none;
            width:20px;height:20px;
            background:var(--blue);
            border-radius:50%;
            cursor:pointer;
            border:3px solid #fff;
            box-shadow:0 2px 8px rgba(0,152,234,.4);
            transition:transform .2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover{
            transform:scale(1.15);
        }
        input[type="range"]::-moz-range-thumb{
            width:20px;height:20px;
            background:var(--blue);
            border-radius:50%;
            cursor:pointer;
            border:3px solid #fff;
            box-shadow:0 2px 8px rgba(0,152,234,.4);
        }
        input[type="range"]::-webkit-slider-runnable-track{
            height:6px;border-radius:3px;
        }
        input[type="range"]::-moz-range-track{
            height:6px;background:rgba(255,255,255,.1);border-radius:3px;
        }

        /* ═══════════ CONTENTS SECTION ═══════════ */
        .contents{margin-top:24px}
        .contents-title{
            font-size:13px;font-weight:700;color:var(--text-2);
            text-transform:uppercase;letter-spacing:.5px;
            margin-bottom:12px;
        }
        .contents-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
        }
        .content-item{
            background:rgba(255,255,255,.04);
            border:none;
            border-radius:16px;
            padding:14px;
            display:flex;flex-direction:column;
            align-items:center;
        }
        .content-item-name{
            font-size:12px;font-weight:600;color:var(--text);
            margin-bottom:10px;
            text-align:center;
            line-height:1.3;
            min-height:32px;
            display:flex;align-items:center;justify-content:center;
        }
        .content-item img{
            width:90px;height:90px;
            object-fit:contain;
            margin-bottom:10px;
        }
        .content-price{
            display:inline-flex;align-items:center;justify-content:center;gap:4px;
            padding:6px 12px;
            background:rgba(0,152,234,.12);

        const $ = id => document.getElementById(id);
        const tg = window.Telegram?.WebApp;
        
        // Gift prices in TON
        const GIFT_PRICES = {

            "Low Rider":52,"Lunar Snake":4.3,"Lush Bouquet":6.55,"Mad Pumpkin":13.8,
            "Magic Potion":80.9,"Mighty Arm":171.9,"Mini Oscar":103.7,"Money Pot":4.66,

            "Jester Hat":4.83,"Jolly Chimp":7.3,"Joyful Bundle":7.11,"Khabib's Papakha":25.9,
            "Kissed Frog":67.8,"Light Sword":6.3,"Lol Pop":4.5,"Hanging Star":9.93,

            "Instant Ramen":4.38,"Desk Calendar":6.78,"Durov's Cap":708,"Jingle Bells":9.53,

            "Bonded Ring":58.2,"Bow Tie":6.3,"Bunny Muffin":8.28,"Candy Cane":4.31,
            "Clover Pin":4.7,"Cookie Heart":4.95,"Crystal Ball":12,"Cupid Charm":22.5,
            "Diamond Ring":29.4,"Easter Egg":5.63,"Electric Skull":33.9,"Eternal Candle":6.58,
            "Eternal Rose":29.4,"Evil Eye":7.94,"Faith Amulet":4.7,"Flying Broom":14,
            "Fresh Socks":4.43,"Gem Signet":72.3,"Genie Lamp":50,"Ginger Cookie":4.9
        };
        
        function getGiftPrice(gift) {
            // ton_balance uses ton_amount directly
            if (gift.type === 'ton_balance' && gift.ton_amount) {
                return Number(gift.ton_amount);
            }
            const name = (gift.name || '').replace(' (Random)', '');
            if (GIFT_PRICES[name]) return GIFT_PRICES[name];
            // Value is already in TON, no conversion needed
            return Number(gift.value || 0);
        }
        
        // Get appropriate TON SVG based on amount
        function getTonSvg(amount) {
            if (amount <= 25) return '/static/img/tons/ton_1.svg';
            if (amount <= 50) return '/static/img/tons/ton_2.svg';
            if (amount <= 100) return '/static/img/tons/ton_3.svg';
            if (amount <= 250) return '/static/img/tons/ton_4.svg';
            return '/static/img/tons/ton_5.svg';
        }
        
        // Get gift name, special handling for ton_balance
        function getGiftName(gift) {
            if (gift.type === 'ton_balance') {
                return 'Ton Balance';
            }
            return (gift.name || 'Подарок').replace(' (Random)', '');
        }
        
        function getGiftImage(gift) {
            // TON balance gifts show TON SVG based on amount
            if (gift.type === 'ton_balance') {
                const amount = gift.ton_amount || 0;
                return getTonSvg(amount);
            }
            
            const img = gift.image || '';
            const slug = gift.fragment_slug || '';
            
            // Local fallback mapping for common gifts
            const LOCAL_MAP = {
                'toybear': '/static/gifs/gifts/Toy_Bear.gif',
                'moon': '/static/gifs/gifts/star.gif',
                'moussecake': '/static/gifs/gifts/Mousse_Cake.gif',
                'petsnake': '/static/gifs/gifts/Pet_Snake.png',
                'heartlocket': '/static/gifs/gifts/hl.gif',
                'vintagecigar': '/static/gifs/gifts/vintage_cigar.gif',
                'jinglebells': '/static/gifs/gifts/JingleBells.png',
                'hangingstar': '/static/gifs/gifts/hstarr.gif',
                'crystalball': '/static/gifs/gifts/Crystal_Ball.png',
                'bdaycandle': '/static/gifs/gifts/BDCandle.png',
                'icecream': '/static/gifs/gifts/ice_cream.gif',
                'lushbouquet': '/static/gifs/gifts/pp.png',
                'jellybunny': '/static/gifs/gifts/Jelly_Bunny.png',
                'holidaydrink': '/static/gifs/gifts/Holiday_Drink.png',
                'xmasstocking': '/static/gifs/gifts/Xmas_Stocking.gif',
                'westsidesign': '/static/gifs/gifts/Westside_Sign.gif',
                'nekohelmet': '/static/gifs/gifts/Neko_Helmet.png',
                'sakuraflower': '/static/gifs/gifts/Sakura_Flower.png',
                'nailbracelet': '/static/gifs/gifts/Nail_Bracelet.gif',
                'lootbag': '/static/gifs/gifts/Loot_Bag.gif',
                'mightyarm': '/static/gifs/gifts/Mighty_Arm.gif',
                'minioscar': '/static/gifs/gifts/Mini_Oscar.gif',
                'magicpotion': '/static/gifs/gifts/Magic_Potion.gif',
                'genielamp': '/static/gifs/gifts/Genie_Lamp.gif',
                'kissedfrog': '/static/gifs/gifts/Kissed_Frog.gif',
                'perfumebottle': '/static/gifs/gifts/perfume_bottle.gif',
                'heroichelmet': '/static/gifs/gifts/heroic_helmet.gif',
                'iongem': '/static/gifs/gifts/Ion_Gem.gif',
                'electricskull': '/static/gifs/gifts/electric_skull.gif',
                'bondedring': '/static/gifs/gifts/Bonded_Ring.gif',
                'eternalrose': '/static/gifs/gifts/EternalRose.png',
                'diamondring': '/static/gifs/gifts/Diamond_Ring.png',
                'cupidcharm': '/static/gifs/gifts/Cupid_Charm.png'
            };
            
            // Try local mapping first
            if (slug && LOCAL_MAP[slug.toLowerCase()]) {
                return LOCAL_MAP[slug.toLowerCase()];
            }
            
            // Extract slug from Fragment URL
            if (img && img.includes('fragment.com/file/gifts/')) {
                const extractedSlug = img.split('/gifts/')[1]?.split('/')[0];
                if (extractedSlug && LOCAL_MAP[extractedSlug.toLowerCase()]) {
                    return LOCAL_MAP[extractedSlug.toLowerCase()];
                }
            }
            
            // Use original image (Fragment URL or other)
            if (img && img.startsWith('/')) return img;
            if (img) return img;
            return '/static/img/gift.png';
        }
        
        let allCases = [];
        let currentTab = 'paid';
        let currentCase = null;
        let userId = null;
        let userBalance = 0;
        let selectedDeposit = 10;
        let lastWonGift = null;
        let isOpening = false;

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            if (tg) {
                tg.expand();
                tg.setHeaderColor('#1A1E2A');
                tg.setBackgroundColor('#1A1E2A');
                tg.ready();
                userId = tg.initDataUnsafe?.user?.id;
            }
            
            // Fallback for testing outside Telegram
            if (!userId) {
                const params = new URLSearchParams(window.location.search);
                userId = params.get('user_id') || null;
            }
            
            console.log('Init userId:', userId);
            
            // Проверка бана
            if (userId) {
                try {
                    const banRes = await fetch('/api/check-ban?user_id=' + userId);
                    const banData = await banRes.json();
                    if (banData.success && banData.banned) {
                        window.location.href = '/ban';
                        return;
                    }
                } catch(e) { console.warn('Ban check failed:', e); }
            }

            const bar = $('loaderBar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                bar.style.width = progress + '%';
            }, 100);

            try {
                await Promise.all([loadCases(), loadUser(), loadFeed()]);
                progress = 100;
                bar.style.width = '100%';
                clearInterval(interval);
                setTimeout(() => $('loader').classList.add('hide'), 300);
            } catch (e) {
                console.error('Init error:', e);
                clearInterval(interval);
                bar.style.width = '100%';
                setTimeout(() => $('loader').classList.add('hide'), 300);
            }

            initSlider();
            updateOnline();
            setInterval(updateOnline, 30000);
            setInterval(loadFeed, 15000);
        }

        async function loadCases() {
            try {
                const res = await fetch('/api/cases');
                const data = await res.json();
                if (data.success && data.cases) {
                    allCases = data.cases;
                    allCases.sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
                    renderCases();
                } else {
                    $('casesContainer').innerHTML = '<div class="empty"><p>Ошибка загрузки кейсов</p></div>';
                }
            } catch (e) {
                console.error('Cases load error:', e);
                $('casesContainer').innerHTML = '<div class="empty"><p>Ошибка подключения</p></div>';
            }
        }

        async function loadUser() {
            if (!userId) {
                console.log('No user ID yet');
                $('balanceDisplay').textContent = '0,00';
                return;
            }
            try {
                const res = await fetch('/api/user/' + userId);
                const data = await res.json();
                if (data.success && data.user) {
                    userBalance = data.user.balance_stars || 0;
                    $('balanceDisplay').textContent = formatTon(starsToTon(userBalance));
                } else {
                    $('balanceDisplay').textContent = '0,00';
                }
            } catch (e) {
                console.error('User load error:', e);
                $('balanceDisplay').textContent = '0,00';
            }
        }

        async function loadFeed() {
            try {
                const res = await fetch('/api/recent-wins?limit=20');
                const data = await res.json();
                if (data.success && data.wins && data.wins.length) {
                    renderFeed(data.wins);
                } else {
                    $('feedTrack').innerHTML = '';
                }
            } catch (e) {
                console.error('Feed load error:', e);
                $('feedTrack').innerHTML = '';
            }
        }

        async function updateOnline() {
            try {
                const res = await fetch('/api/online');
                const data = await res.json();
                if (data.online !== undefined) {
                    $('onlineCount').textContent = data.online;
                }
            } catch (e) {}
        }

        function starsToTon(stars) {
            return Number(stars || 0) / 100;
        }

        function formatTon(ton) {
            const val = Math.round(Number(ton) * 100) / 100;
            return val.toFixed(2).replace('.', ',');
        }

        function renderFeed(wins) {
            const track = $('feedTrack');
            const items = [...wins, ...wins].map(w => `
                <div class="feed-item">
                    <img src="${w.gift_image || w.image || '/static/img/gift.png'}" alt="" onerror="this.src='/static/img/gift.png'">
                </div>
            `).join('');
            track.innerHTML = items;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            renderCases();
        }

        function getGradient(caseItem) {
            const id = caseItem.id || 0;
            const grads = ['g-yellow', 'g-blue', 'g-purple', 'g-green', 'g-orange', 'g-red'];
            return grads[id % grads.length];
        }

        function renderCases() {
            const container = $('casesContainer');
            const filtered = allCases.filter(c => {
                const isFree = c.cost === 0 || c.promo;
                return currentTab === 'free' ? isFree : !isFree;
            });

            if (!filtered.length) {
                container.innerHTML = `
                    <div class="empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
                        </svg>
                        <p>Нет доступных кейсов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="cases">
                    ${filtered.map(c => {
                        const grad = getGradient(c);
                        return `
                            <div class="case ${grad}" onclick="openCaseModal(${c.id})">
                                <div class="case-glow"></div>
                                <div class="case-inner">
                                    <div class="case-prices">
                                        <div class="case-price ton">
                                            <img src="/static/img/ton.png" alt="">
                                            ${formatTon(c.cost || 0)}
                                        </div>
                                    </div>
                                    <div class="case-img">
                                        <img src="${c.image || '/static/img/gift.png'}" alt="" onerror="this.src='/static/img/gift.png'">
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function openCaseModal(caseId) {
            try {
                const res = await fetch(`/api/cases/${caseId}`);
                const data = await res.json();
                if (data.success && data.case) {
                    currentCase = data.case;
                    isOpening = false;
                    renderModal();
                    $('caseModal').classList.add('open');
                    resetSlider();
                }
            } catch (e) {
                showToast('Ошибка загрузки кейса', 'err');
            }
        }

        function renderModal() {
            if (!currentCase) return;
            
            const price = currentCase.cost || 0;
            $('modalName').textContent = currentCase.name || 'Кейс';
            $('modalPrice').querySelector('span').textContent = formatTon(price);

            const rawGifts = currentCase.gifts_details || currentCase.gifts || [];
            const isPromoCase = currentCase.promo === true;
            
            // Sort gifts by price (expensive first)
            const gifts = [...rawGifts].sort((a, b) => getGiftPrice(b) - getGiftPrice(a));
            
            // Hide win section, show controls
            $('modalWin').style.display = 'none';
            $('rouletteWrap').style.display = 'block';
            $('rouletteWrap').classList.remove('won');
            $('contentsSection').style.display = 'block';
            
            // Show promo input for promo cases, hide slider
            if (isPromoCase) {
                $('promoInputWrap').style.display = 'block';
                $('sliderWrap').style.display = 'none';
                $('promoInput').value = '';
            } else {
                $('promoInputWrap').style.display = 'none';
                $('sliderWrap').style.display = 'block';
            }
            
            if (!gifts.length) {
                $('rouletteTrack').innerHTML = '<div style="padding:40px 20px;color:#828AA4;text-align:center;width:100%;">Нет подарков</div>';
                $('contentsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#828AA4;padding:20px;">Загрузка...</div>';
                return;
            }
            
            // Roulette items with names (name top, img center, price bottom)
            const rouletteItems = [];
            for (let i = 0; i < 30; i++) {
                const g = gifts[i % gifts.length];
                const gPrice = getGiftPrice(g);
                const gName = getGiftName(g);
                const tonIcon = g.type === 'ton_balance' ? getTonSvg(gPrice) : '/static/img/ton.png';
                rouletteItems.push(`
                    <div class="roulette-item">
                        <div class="roulette-item-name">${escapeHtml(gName)}</div>
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="roulette-item-price">
                            <img src="${tonIcon}" alt="">
                            ${formatTon(gPrice)}
                        </div>
                    </div>
                `);
            }
            const track = $('rouletteTrack');
            track.innerHTML = rouletteItems.join('') + rouletteItems.join('');
            track.classList.add('idle');
            track.classList.remove('spinning');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            // Contents with names (name top, img center, price bottom)
            $('contentsGrid').innerHTML = gifts.map(g => {
                const gPrice = getGiftPrice(g);
                const gName = getGiftName(g);
                const tonIcon = g.type === 'ton_balance' ? getTonSvg(gPrice) : '/static/img/ton.png';
                return `
                    <div class="content-item">
                        <div class="content-item-name">${escapeHtml(gName)}</div>
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="content-price">
                            <img src="${tonIcon}" alt="">
                            ${formatTon(gPrice)} TON
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // SLIDER LOGIC
        function initSlider() {
            const thumb = $('sliderThumb');
            const slider = $('slider');
            const bg = $('sliderBg');
            
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            const maxX = () => slider.offsetWidth - thumb.offsetWidth - 8;

            function onStart(e) {
                if (isOpening) return;
                isDragging = true;
                startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                thumb.style.transition = 'none';
                bg.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const diff = clientX - startX;
                currentX = Math.max(0, Math.min(diff, maxX()));
                thumb.style.left = (4 + currentX) + 'px';
                bg.style.transform = `scaleX(${currentX / maxX()})`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                thumb.style.transition = 'left .3s';
                bg.style.transition = 'transform .3s';

                if (currentX >= maxX() * 0.9) {
                    // Успешный свайп - открываем кейс
                    thumb.style.left = (4 + maxX()) + 'px';
                    bg.style.transform = 'scaleX(1)';
                    openCase();
                } else {
                    // Возврат
                    thumb.style.left = '4px';
                    bg.style.transform = 'scaleX(0)';
                }
                currentX = 0;
            }

            thumb.addEventListener('mousedown', onStart);
            thumb.addEventListener('touchstart', onStart, {passive: true});
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, {passive: true});
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);
        }

        function resetSlider() {
            const thumb = $('sliderThumb');
            const bg = $('sliderBg');
            thumb.style.transition = 'none';
            bg.style.transition = 'none';
            thumb.style.left = '4px';
            bg.style.transform = 'scaleX(0)';
        }

        async function openCase() {
            if (!currentCase || isOpening) return;
            
            if (!userId) {
                showToast('Откройте через Telegram', 'err');
                resetSlider();
                return;
            }

            // Convert cost to stars if cost_type is 'ton' (1 TON = 100 stars)
            const rawCost = currentCase.cost || 0;
            const totalCostInStars = currentCase.cost_type === 'ton' ? rawCost * 100 : rawCost;
            if (userBalance < totalCostInStars) {
                showToast('Недостаточно средств', 'err');
                openDeposit();
                resetSlider();
                return;
            }

            isOpening = true;

            try {
                const res = await fetch('/api/cases/open', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        case_id: currentCase.id,
                        quantity: 1
                    })
                });
                const data = await res.json();
                if (data.success) {
                    userBalance = data.new_balance ? data.new_balance.stars : (userBalance - totalCost);
                    $('balanceDisplay').textContent = formatTon(starsToTon(userBalance));
                    runSpinRoulette(data.won_gifts || [data.won_gift]);
                } else {
                    showToast(data.error || 'Ошибка открытия', 'err');
                    isOpening = false;
                    resetSlider();
                }
            } catch (e) {
                showToast('Ошибка сети', 'err');
                isOpening = false;
                resetSlider();
            }
        }

        async function openWithPromo() {
            if (!currentCase || isOpening) return;
            
            if (!userId) {
                showToast('Откройте через Telegram', 'err');
                return;
            }
            
            const promoCode = $('promoInput').value.trim().toUpperCase();
            if (!promoCode) {
                showToast('Введите промокод', 'err');
                return;
            }
            
            isOpening = true;
            $('promoBtn').disabled = true;
            
            try {
                const res = await fetch('/api/open-case', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        case_id: currentCase.id,
                        promo_code: promoCode,
                        is_promo: true
                    })
                });
                const data = await res.json();
                if (data.success) {
                    runSpinRoulette(data.won_gifts || [data.won_gift]);
                } else {
                    showToast(data.error || 'Неверный промокод', 'err');
                    isOpening = false;
                }
            } catch (e) {
                showToast('Ошибка сети', 'err');
                isOpening = false;
            }
            $('promoBtn').disabled = false;
        }

        function runSpinRoulette(wonGifts) {
            const wonGift = Array.isArray(wonGifts) ? wonGifts[0] : wonGifts;
            lastWonGift = wonGift;
            
            // Get all gifts including ton_balance
            const allGifts = currentCase.gifts_details || currentCase.gifts || [];
            const gifts = allGifts;
            const track = $('rouletteTrack');
            
            // Stop idle animation
            track.classList.remove('idle');
            track.classList.add('spinning');
            
            // Generate spin items with winner at position 42
            const items = [];
            for (let i = 0; i < 50; i++) {
                const g = gifts.length ? gifts[Math.floor(Math.random() * gifts.length)] : wonGift;
                items.push(g);
            }
            items[42] = wonGift;

            track.innerHTML = items.map(g => {
                const gPrice = getGiftPrice(g);
                const gName = getGiftName(g);
                const tonIcon = g.type === 'ton_balance' ? getTonSvg(gPrice) : '/static/img/ton.png';
                return `
                    <div class="roulette-item">
                        <div class="roulette-item-name">${escapeHtml(gName)}</div>
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="roulette-item-price">
                            <img src="${tonIcon}" alt="">
                            ${formatTon(gPrice)}
                        </div>
                    </div>
                `;
            }).join('');

            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const itemWidth = 120; // 110px + 10px gap
                    const wrap = $('rouletteWrap');
                    const centerOffset = wrap.offsetWidth / 2;
                    const targetPos = itemWidth * 42 + itemWidth / 2;
                    track.style.transition = 'transform 4s cubic-bezier(.1,.9,.2,1)';
                    track.style.transform = `translateX(${centerOffset - targetPos}px)`;
                });
            });

            setTimeout(() => showWinResultInModal(wonGift), 4300);
        }

        function showWinResultInModal(gift) {
            // Show won state
            $('rouletteWrap').classList.add('won');
            $('sliderWrap').style.display = 'none';
            $('contentsSection').style.display = 'none';
            
            // Show win section in modal
            $('modalWinImg').src = getGiftImage(gift);
            $('modalWinName').textContent = getGiftName(gift);
            $('modalWinValue').querySelector('span').textContent = formatTon(getGiftPrice(gift));
            $('modalWin').style.display = 'block';
            
            isOpening = false;
        }
        
        function closeModalAndReset() {
            closeModal();
            lastWonGift = null;
        }
        
        function openAgain() {
            if (!currentCase) return;
            $('modalWin').style.display = 'none';
            renderModal();
            resetSlider();
        }

        function closeModal() {
            $('caseModal').classList.remove('open');
            currentCase = null;
        }

        $('caseModal').addEventListener('click', e => {
            if (e.target === $('caseModal')) closeModal();
        });

        function openDeposit() {
            // Check if Stars button should be disabled
            const starsBtn = $('starsDepositBtn');
            if(starsBtn){
                if(!tg){
                    starsBtn.classList.add('disabled');
                    starsBtn.onclick = null;
                } else {
                    starsBtn.classList.remove('disabled');
                    starsBtn.onclick = function(){ closeDeposit(); openStarsDeposit(); };
                }
            }
            $('depositOverlay').classList.add('open');
        }

        function closeDeposit() {
            $('depositOverlay').classList.remove('open');
        }

        function openTonDeposit() {
            // Redirect to crash page TON deposit or show message
            showToast('TON депозит доступен в разделе Краш', 'ok');
            window.location.href = '/crash';
        }

        function openStarsDeposit() {
            if(!tg){
                showToast('Stars депозит только в Telegram', 'err');
                return;
            }
            $('starsDepositOverlay').classList.add('show');
            $('starsDepositError').style.display = 'none';
        }

        function closeStarsDeposit() {
            $('starsDepositOverlay').classList.remove('show');
        }

        // Update stars pay button on input
        $('starsDepositAmount').addEventListener('input', function(){
            var v = parseInt(this.value) || 0;
            $('starsPayAmount').textContent = v > 0 ? v : '0';
        });

        // Stars overlay click outside
        $('starsDepositOverlay').addEventListener('click', function(e){
            if(e.target === this) closeStarsDeposit();
        });
        $('depositOverlay').addEventListener('click', function(e){
            if(e.target === this) closeDeposit();
        });

        async function payWithStars() {
            const amount = parseInt($('starsDepositAmount').value) || 0;
            if(amount < 1 || amount > 10000){
                $('starsDepositError').textContent = 'Введите от 1 до 10000 Stars';
                $('starsDepositError').style.display = 'block';
                return;
            }
            $('starsDepositError').style.display = 'none';
            $('starsPayBtn').disabled = true;
            $('starsPayBtn').textContent = 'Загрузка...';

            try {
                const res = await fetch('/api/stars/create-invoice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, amount: amount})
                });
                const data = await res.json();
                if(data.success && data.invoice_link){
                    if(tg && tg.openInvoice){
                        tg.openInvoice(data.invoice_link, function(status){
                            if(status === 'paid'){
                                showToast('Оплата успешна! +' + amount + ' Stars', 'ok');
                                closeStarsDeposit();
                                loadUser();
                            } else if(status === 'cancelled'){
                                showToast('Оплата отменена', 'err');
                            }
                            $('starsPayBtn').disabled = false;
                            $('starsPayBtn').innerHTML = '<img src="/static/img/star.png" alt=""> Оплатить <span id="starsPayAmount">' + amount + '</span> Stars';
                        });
                    } else {
                        window.open(data.invoice_link, '_blank');
                        $('starsPayBtn').disabled = false;
                        $('starsPayBtn').innerHTML = '<img src="/static/img/star.png" alt=""> Оплатить <span id="starsPayAmount">' + amount + '</span> Stars';
                    }
                } else {
                    $('starsDepositError').textContent = data.error || 'Ошибка создания счета';
                    $('starsDepositError').style.display = 'block';
                    $('starsPayBtn').disabled = false;
                    $('starsPayBtn').innerHTML = '<img src="/static/img/star.png" alt=""> Оплатить <span id="starsPayAmount">' + amount + '</span> Stars';
                }
            } catch(e) {
                $('starsDepositError').textContent = 'Ошибка сети';
                $('starsDepositError').style.display = 'block';
                $('starsPayBtn').disabled = false;
                $('starsPayBtn').innerHTML = '<img src="/static/img/star.png" alt=""> Оплатить <span id="starsPayAmount">' + amount + '</span> Stars';
            }
        }

        function showToast(msg, type = 'ok') {
            const toast = $('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
