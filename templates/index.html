<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#090B11">
    <title>Rasswet Gifts - Кейсы</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-cyrillic-wght-normal.DqGufNeO.woff2) format("woff2-variations");unicode-range:U+301,U+400-45F,U+490-491,U+4B0-4B1,U+2116}
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-latin-wght-normal.Dx4kXJAl.woff2) format("woff2-variations");unicode-range:U+??,U+131,U+152-153,U+2BB-2BC,U+2C6,U+2DA,U+2DC,U+304,U+308,U+329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

        *{margin:0;padding:0;box-sizing:border-box}
        html{font-synthesis:none;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        
        :root{
            --bg:#090B11;
            --surface:#161923;
            --surface-2:#1A1E2A;
            --border:rgba(255,255,255,.05);
            --text:#fff;
            --text-2:#828AA4;
            --primary:#0098EA;
            --accent:#1EE44C;
            --gold:#FDA100;
            --blue:#0098EA;
        }

        body{
            font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
        }

        /* ═══════════ LOADING ═══════════ */
        .loader{
            position:fixed;inset:0;
            background:#0e1015;
            z-index:9999;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:24px;
            transition:opacity .4s,visibility .4s;
        }
        .loader.hide{opacity:0;visibility:hidden;pointer-events:none}
        .loader-gif{width:100px;height:100px;border-radius:20px;animation:float 2.5s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        .loader-bar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
        .loader-bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .3s}

        /* ═══════════ HEADER ═══════════ */
        .header{
            position:fixed;top:env(safe-area-inset-top,0);left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:56px;padding:0 16px;
            background:rgba(9,11,17,.95);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
        }
        .h-online{
            display:flex;align-items:center;gap:5px;
            padding:6px 12px;border-radius:16px;
            background:rgba(30,228,76,.08);border:1px solid rgba(30,228,76,.15);
            font-size:12px;font-weight:700;color:var(--accent);
        }
        .h-online svg{width:14px;height:14px}
        .h-spacer{flex:1}
        .h-bal{
            display:flex;align-items:center;gap:6px;
            padding:6px 14px;border-radius:20px;
            background:rgba(255,255,255,.06);border:1px solid var(--border);
            font-size:14px;font-weight:700;
        }
        .h-bal img{width:16px;height:16px}
        .h-add{
            width:28px;height:28px;border-radius:50%;border:none;
            background:rgba(255,255,255,.08);
            color:#fff;font-size:18px;font-weight:500;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:background .2s;
        }
        .h-add:hover{background:rgba(255,255,255,.15)}

        /* ═══════════ MAIN ═══════════ */
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,0) + 72px) 16px 100px;
        }

        /* ═══════════ LIVE FEED ═══════════ */
        .feed{
            display:flex;align-items:center;gap:10px;
            margin-bottom:16px;
            overflow:hidden;
        }
        .feed-dot{
            width:8px;height:8px;border-radius:50%;
            background:var(--accent);
            animation:blink 2s ease-in-out infinite;
            flex-shrink:0;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .feed-label{
            font-size:11px;font-weight:700;color:#e53935;
            text-transform:uppercase;flex-shrink:0;
        }
        .feed-scroll{
            flex:1;display:flex;gap:8px;
            overflow:hidden;
        }
        .feed-track{
            display:flex;gap:8px;
            animation:feedScroll 30s linear infinite;
        }
        @keyframes feedScroll{
            0%{transform:translateX(0)}
            100%{transform:translateX(-50%)}
        }
        .feed-item{
            width:36px;height:36px;
            background:rgba(255,255,255,.06);
            border-radius:8px;
            padding:4px;flex-shrink:0;
        }
        .feed-item img{width:100%;height:100%;object-fit:contain;border-radius:4px}

        /* ═══════════ TABS ═══════════ */
        .tabs{
            display:flex;gap:12px;margin-bottom:16px;
        }
        .tab{
            padding:8px 0;border:none;background:transparent;
            color:var(--text-2);
            font-family:inherit;font-size:16px;font-weight:700;
            cursor:pointer;transition:color .2s;
            position:relative;
        }
        .tab.active{color:var(--text)}
        .tab.active::after{
            content:'';position:absolute;bottom:0;left:0;right:0;
            height:2px;background:var(--primary);border-radius:1px;
        }

        /* ═══════════ CASES GRID ═══════════ */
        .cases{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
        }

        .case{
            position:relative;
            border-radius:20px;
            overflow:hidden;
            cursor:pointer;
            transition:transform .2s,box-shadow .2s;
        }
        .case:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
        
        .case-glow{
            position:absolute;inset:0;
            border-radius:20px;
            padding:2px;
            background:linear-gradient(160deg,rgba(255,255,255,.15),transparent 60%);
        }
        .case-inner{
            background:linear-gradient(160deg,#1E2330,#12151C);
            border-radius:18px;
            padding:12px;
            height:100%;
            display:flex;flex-direction:column;
        }

        .case.g-yellow .case-glow{background:linear-gradient(160deg,rgba(253,190,19,.4),transparent 60%)}
        .case.g-yellow .case-inner{background:linear-gradient(160deg,#3D3520,#1A1A14)}
        .case.g-blue .case-glow{background:linear-gradient(160deg,rgba(0,152,234,.4),transparent 60%)}
        .case.g-blue .case-inner{background:linear-gradient(160deg,#1A3050,#0D1524)}
        .case.g-purple .case-glow{background:linear-gradient(160deg,rgba(139,92,246,.4),transparent 60%)}
        .case.g-purple .case-inner{background:linear-gradient(160deg,#2A1A50,#14102A)}
        .case.g-green .case-glow{background:linear-gradient(160deg,rgba(30,228,76,.4),transparent 60%)}
        .case.g-green .case-inner{background:linear-gradient(160deg,#1A4028,#0D1A14)}
        .case.g-orange .case-glow{background:linear-gradient(160deg,rgba(255,120,50,.4),transparent 60%)}
        .case.g-orange .case-inner{background:linear-gradient(160deg,#402818,#1A140D)}
        .case.g-red .case-glow{background:linear-gradient(160deg,rgba(239,68,68,.4),transparent 60%)}
        .case.g-red .case-inner{background:linear-gradient(160deg,#401A1A,#1A0D0D)}

        .case-prices{
            display:flex;align-items:center;gap:8px;
            margin-bottom:8px;
        }
        .case-price{
            display:flex;align-items:center;gap:4px;
            font-size:12px;font-weight:700;
        }
        .case-price img{width:12px;height:12px}
        .case-price.ton{color:var(--blue)}
        .case-price.stars{color:#FDBE13}
        .case-price.stars img{filter:brightness(0) saturate(100%) invert(82%) sepia(46%) saturate(1000%) hue-rotate(359deg) brightness(103%) contrast(103%)}

        .case-img{
            flex:1;display:flex;align-items:center;justify-content:center;
            padding:8px;min-height:100px;
        }
        .case-img img{
            width:100%;max-width:110px;height:auto;
            object-fit:contain;
            transition:transform .3s;
            filter:drop-shadow(0 8px 16px rgba(0,0,0,.4));
        }
        .case:hover .case-img img{transform:scale(1.1) rotate(-2deg)}

        /* ═══════════ BOTTOM NAV ═══════════ */
        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(9,11,17,.98);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);
            transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.08)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}

        /* ═══════════ CASE MODAL ═══════════ */
        .modal-overlay{
            position:fixed;inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            z-index:200;
            opacity:0;visibility:hidden;
            transition:opacity .3s,visibility .3s;
        }
        .modal-overlay.open{opacity:1;visibility:visible}

        .modal{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
            z-index:201;width:100%;max-width:480px;
            max-height:92vh;
            background:var(--surface);
            border-radius:24px 24px 0 0;
            overflow:hidden;
            transition:transform .35s cubic-bezier(.32,.72,0,1);
        }
        .modal-overlay.open .modal{transform:translateX(-50%) translateY(0)}

        .modal-scroll{
            max-height:92vh;overflow-y:auto;
            padding:12px 16px calc(env(safe-area-inset-bottom,0) + 24px);
        }

        .modal-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}

        .modal-hdr{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:20px;
        }
        .modal-name{font-size:18px;font-weight:700}
        .modal-price{
            display:flex;align-items:center;gap:6px;
            padding:8px 14px;border-radius:12px;
            background:rgba(0,152,234,.12);border:1px solid rgba(0,152,234,.25);
            font-size:15px;font-weight:700;color:var(--blue);
        }
        .modal-price img{width:18px;height:18px}

        /* ═══════════ IDLE ROULETTE ═══════════ */
        .roulette-wrap{
            position:relative;
            height:168px;margin:0 -16px 20px;
            background:rgba(0,0,0,.25);
            overflow:hidden;
        }
        .roulette-track{
            display:flex;gap:10px;
            padding:10px 0 10px 10px;
            will-change:transform;
        }
        .roulette-track.idle{animation:idleScroll 20s linear infinite}
        .roulette-track.spinning{animation:none}
        @keyframes idleScroll{
            0%{transform:translateX(0)}
            100%{transform:translateX(-50%)}
        }
        .roulette-item{
            flex-shrink:0;width:100px;height:148px;
            background:rgba(255,255,255,.04);
            border:1px solid var(--border);
            border-radius:14px;
            padding:8px;
            display:flex;flex-direction:column;align-items:center;
            justify-content:space-between;
            position:relative;
        }
        .roulette-item img{width:65px;height:65px;object-fit:contain;flex-shrink:0}
        .roulette-item-price{
            position:absolute;top:4px;right:4px;
            display:flex;align-items:center;gap:2px;
            padding:2px 5px;border-radius:5px;
            background:rgba(0,152,234,.15);
            font-size:9px;font-weight:700;color:var(--blue);
        }
        .roulette-item-price img{width:9px;height:9px}
        .roulette-item-name{
            font-size:9px;font-weight:600;color:var(--text-2);
            text-align:center;line-height:1.2;
            max-width:100%;overflow:hidden;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
        }
        .roulette-pointer{
            position:absolute;top:0;left:50%;transform:translateX(-50%);
            width:3px;height:100%;
            background:linear-gradient(180deg,var(--accent),transparent 90%);
            z-index:5;
        }
        .roulette-pointer::before{
            content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
            border:8px solid transparent;border-top:12px solid var(--accent);
        }
        .roulette-wrap.won .roulette-pointer{background:linear-gradient(180deg,#FDA100,transparent 90%)}
        .roulette-wrap.won .roulette-pointer::before{border-top-color:#FDA100}

        /* ═══════════ MODAL WIN ═══════════ */
        .modal-win{
            text-align:center;
            padding:20px 0;
            animation:winFadeIn .4s ease;
        }
        @keyframes winFadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        .modal-win-badge{
            display:inline-block;
            padding:8px 20px;border-radius:20px;
            background:linear-gradient(135deg,var(--accent),#19A93A);
            color:#090B11;font-size:14px;font-weight:700;
            margin-bottom:16px;
        }
        .modal-win-img{
            width:120px;height:120px;
            object-fit:contain;
            margin:0 auto 12px;
            display:block;
            filter:drop-shadow(0 8px 20px rgba(30,228,76,.3));
            animation:modalWinFloat 2s ease-in-out infinite;
        }
        @keyframes modalWinFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        .modal-win-name{font-size:18px;font-weight:700;margin-bottom:8px}
        .modal-win-value{
            display:inline-flex;align-items:center;gap:6px;
            padding:8px 16px;border-radius:12px;
            background:rgba(0,152,234,.12);
            font-size:16px;font-weight:700;color:var(--blue);
        }
        .modal-win-value img{width:18px;height:18px}
        .modal-win-btns{
            display:flex;gap:10px;
            margin-top:20px;
        }
        .modal-win-btn{
            flex:1;padding:14px;border-radius:14px;
            border:1px solid var(--border);
            background:rgba(255,255,255,.04);
            color:var(--text);
            font-family:inherit;font-size:14px;font-weight:600;
            cursor:pointer;transition:all .2s;
        }
        .modal-win-btn:hover{background:rgba(255,255,255,.08)}
        .modal-win-btn.primary{
            background:linear-gradient(135deg,var(--accent),#19A93A);
            border:none;color:#090B11;
        }

        /* ═══════════ PROMO INPUT ═══════════ */
        .promo-input-wrap{
            margin:0 0 16px;
            padding:16px;
            background:rgba(253,161,0,.08);
            border:1px solid rgba(253,161,0,.2);
            border-radius:16px;
        }
        .promo-input-label{
            font-size:12px;font-weight:700;color:var(--gold);
            margin-bottom:10px;
        }
        .promo-input-row{
            display:flex;gap:10px;
        }
        .promo-input{
            flex:1;padding:12px 14px;
            background:rgba(0,0,0,.3);
            border:1px solid rgba(255,255,255,.1);
            border-radius:12px;
            color:var(--text);
            font-family:inherit;font-size:14px;font-weight:600;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .promo-input::placeholder{color:var(--text-2);text-transform:none;letter-spacing:0}
        .promo-input:focus{outline:none;border-color:var(--gold)}
        .promo-btn{
            padding:12px 20px;
            background:linear-gradient(135deg,var(--gold),#E08C00);
            border:none;border-radius:12px;
            color:#090B11;font-family:inherit;
            font-size:14px;font-weight:700;
            cursor:pointer;transition:all .2s;
        }
        .promo-btn:hover{transform:scale(1.02)}
        .promo-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* ═══════════ SLIDE TO OPEN ═══════════ */
        .slider-wrap{
            margin:20px 0;
            position:relative;
        }
        .slider{
            position:relative;
            height:56px;
            background:linear-gradient(90deg,rgba(0,152,234,.2),rgba(0,152,234,.1));
            border:1px solid rgba(0,152,234,.3);
            border-radius:28px;
            overflow:hidden;
        }
        .slider-bg{
            position:absolute;inset:0;
            background:linear-gradient(90deg,var(--primary),#0077CC);
            transform:scaleX(0);
            transform-origin:left;
            transition:transform .1s;
        }
        .slider-text{
            position:absolute;inset:0;
            display:flex;align-items:center;justify-content:center;
            gap:8px;
            font-size:15px;font-weight:700;color:rgba(255,255,255,.6);
            pointer-events:none;
            z-index:2;
        }
        .slider-text svg{width:20px;height:20px;animation:slideArrow 1.5s ease-in-out infinite}
        @keyframes slideArrow{
            0%,100%{transform:translateX(0);opacity:.6}
            50%{transform:translateX(8px);opacity:1}
        }
        .slider-thumb{
            position:absolute;top:4px;left:4px;
            width:48px;height:48px;
            background:linear-gradient(135deg,var(--primary),#0077CC);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            cursor:grab;
            z-index:3;
            transition:box-shadow .2s;
            touch-action:none;
        }
        .slider-thumb:active{cursor:grabbing;box-shadow:0 0 20px rgba(0,152,234,.5)}
        .slider-thumb img{width:24px;height:24px;pointer-events:none;user-select:none;-webkit-user-drag:none}

        /* ═══════════ CONTENTS SECTION ═══════════ */
        .contents{margin-top:24px}
        .contents-title{
            font-size:13px;font-weight:700;color:var(--text-2);
            text-transform:uppercase;letter-spacing:.5px;
            margin-bottom:12px;
        }
        .contents-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }
        .content-item{
            background:rgba(255,255,255,.03);
            border:1px solid var(--border);
            border-radius:14px;
            padding:12px;
            text-align:center;
        }
        .content-item img{
            width:100%;aspect-ratio:1/1;
            object-fit:contain;
            border-radius:8px;
            margin-bottom:8px;
        }
        .content-item-name{
            font-size:11px;font-weight:600;color:var(--text);
            margin-bottom:6px;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        }
        .content-price{
            display:flex;align-items:center;justify-content:center;gap:4px;
            font-size:13px;font-weight:700;color:var(--blue);
        }
        .content-price img{width:14px;height:14px}

        /* ═══════════ DEPOSIT OVERLAY ═══════════ */
        .deposit-overlay{
            position:fixed;inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            z-index:400;
            display:none;align-items:flex-end;justify-content:center;
        }
        .deposit-overlay.open{display:flex}
        .deposit-sheet{
            width:100%;max-width:480px;
            background:var(--surface);
            border-radius:24px 24px 0 0;
            padding:20px 16px calc(env(safe-area-inset-bottom,0) + 24px);
        }
        .deposit-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 20px}
        .deposit-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px}
        .deposit-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
        .deposit-amt{
            padding:16px;border-radius:14px;border:1px solid var(--border);
            background:rgba(255,255,255,.04);
            text-align:center;cursor:pointer;transition:all .2s;
        }
        .deposit-amt:hover,.deposit-amt.selected{border-color:var(--blue);background:rgba(0,152,234,.1)}
        .deposit-amt-val{font-size:18px;font-weight:700;color:var(--blue)}
        .deposit-btn{
            width:100%;padding:16px;border-radius:14px;border:none;
            background:linear-gradient(135deg,#0098EA,#0077CC);
            color:#fff;font-family:inherit;font-size:16px;font-weight:700;
            cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }

        /* ═══════════ TOAST ═══════════ */
        .toast{
            position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
            padding:12px 20px;border-radius:12px;
            background:var(--surface-2);border:1px solid var(--border);
            font-size:13px;font-weight:600;
            z-index:9999;
            opacity:0;visibility:hidden;
            transition:all .3s;
        }
        .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
        .toast.ok{border-color:rgba(30,228,76,.3);color:var(--accent)}
        .toast.err{border-color:rgba(239,68,68,.3);color:#ef4444}

        /* ═══════════ EMPTY ═══════════ */
        .empty{
            text-align:center;padding:60px 20px;color:var(--text-2);
        }
        .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
        .empty p{font-size:14px}

        @media(prefers-reduced-motion:reduce){
            *{animation:none!important;transition:none!important}
        }
    </style>
</head>
<body>
    <!-- LOADER -->
    <div class="loader" id="loader">
        <img src="/static/gifs/loading.gif" alt="" class="loader-gif">
        <div class="loader-bar"><span id="loaderBar"></span></div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="h-online">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
            <span id="onlineCount">0</span>
        </div>
        <div class="h-spacer"></div>
        <div class="h-bal">
            <img src="/static/img/ton.png" alt="">
            <span id="balanceDisplay">0</span>
        </div>
        <button class="h-add" onclick="openDeposit()">+</button>
    </header>

    <!-- MAIN -->
    <main class="main" id="mainApp">
        <!-- LIVE FEED -->
        <div class="feed">
            <div class="feed-dot"></div>
            <div class="feed-label">Live</div>
            <div class="feed-scroll">
                <div class="feed-track" id="feedTrack"></div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" data-tab="paid" onclick="switchTab('paid')">Платные</button>
            <button class="tab" data-tab="free" onclick="switchTab('free')">Бесплатные</button>
        </div>

        <!-- CASES -->
        <div id="casesContainer"></div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bnav">
        <a href="/crash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            <span>Краш</span>
        </a>
        <a href="/cases" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            <span>Кейсы</span>
        </a>
        <a href="/leaderboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="/inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <!-- CASE MODAL -->
    <div class="modal-overlay" id="caseModal">
        <div class="modal">
            <div class="modal-scroll">
                <div class="modal-handle"></div>
                
                <div class="modal-hdr">
                    <div class="modal-name" id="modalName">Кейс</div>
                    <div class="modal-price" id="modalPrice">
                        <img src="/static/img/ton.png" alt="">
                        <span>0</span>
                    </div>
                </div>

                <!-- ROULETTE (unified) -->
                <div class="roulette-wrap" id="rouletteWrap">
                    <div class="roulette-track idle" id="rouletteTrack"></div>
                    <div class="roulette-pointer"></div>
                </div>

                <!-- WIN RESULT IN MODAL -->
                <div class="modal-win" id="modalWin" style="display:none">
                    <div class="modal-win-badge">Вы выиграли!</div>
                    <img class="modal-win-img" id="modalWinImg" src="">
                    <div class="modal-win-name" id="modalWinName"></div>
                    <div class="modal-win-value" id="modalWinValue">
                        <img src="/static/img/ton.png" alt="">
                        <span>0</span>
                    </div>
                    <div class="modal-win-btns">
                        <button class="modal-win-btn" onclick="closeModalAndReset()">Закрыть</button>
                        <button class="modal-win-btn primary" onclick="openAgain()">Ещё раз</button>
                    </div>
                </div>

                <!-- PROMO INPUT (for promo cases) -->
                <div class="promo-input-wrap" id="promoInputWrap" style="display:none">
                    <div class="promo-input-label">Введите промокод</div>
                    <div class="promo-input-row">
                        <input type="text" class="promo-input" id="promoInput" placeholder="PROMO2025" maxlength="20" autocomplete="off">
                        <button class="promo-btn" id="promoBtn" onclick="openWithPromo()">Открыть</button>
                    </div>
                </div>

                <!-- SLIDE TO OPEN -->
                <div class="slider-wrap" id="sliderWrap">
                    <div class="slider" id="slider">
                        <div class="slider-bg" id="sliderBg"></div>
                        <div class="slider-text">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            Свайпни для открытия
                        </div>
                        <div class="slider-thumb" id="sliderThumb">
                            <img src="/static/img/ton.png" alt="" draggable="false" ondragstart="return false">
                        </div>
                    </div>
                </div>

                <!-- CONTENTS -->
                <div class="contents" id="contentsSection">
                    <div class="contents-title">Что в кейсе?</div>
                    <div class="contents-grid" id="contentsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- DEPOSIT OVERLAY -->
    <div class="deposit-overlay" id="depositOverlay" onclick="closeDeposit(event)">
        <div class="deposit-sheet" onclick="event.stopPropagation()">
            <div class="deposit-handle"></div>
            <div class="deposit-title">Пополнить баланс</div>
            <div class="deposit-amounts" id="depositAmounts">
                <div class="deposit-amt" data-ton="1" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">1 TON</div>
                </div>
                <div class="deposit-amt" data-ton="5" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">5 TON</div>
                </div>
                <div class="deposit-amt selected" data-ton="10" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">10 TON</div>
                </div>
                <div class="deposit-amt" data-ton="25" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">25 TON</div>
                </div>
                <div class="deposit-amt" data-ton="50" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">50 TON</div>
                </div>
                <div class="deposit-amt" data-ton="100" onclick="selectDeposit(this)">
                    <div class="deposit-amt-val">100 TON</div>
                </div>
            </div>
            <button class="deposit-btn" onclick="processDeposit()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                Оплатить через TON
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        const $ = id => document.getElementById(id);
        const tg = window.Telegram?.WebApp;
        
        // Gift prices in TON
        const GIFT_PRICES = {
            "UFC Strike":15.3,"Valentine Box":11.7,"Victory Medal":4.98,"Vintage Cigar":33.9,
            "Voodoo Doll":30.9,"Westside Sign":111.9,"Whip Cupcake":4.4,"Winter Wreath":4.49,
            "Witch Hat":6.29,"Xmas Stocking":4.33,"Swag Bag":5.19,"Swiss Watch":55.8,
            "Tama Gadget":4.65,"Top Hat":12.8,"Toy Bear":44.9,"Trapped Heart":14.5,
            "Moon":5.64,"Mousse Cake":4.96,"Nail Bracelet":145.9,"Neko Helmet":41.1,
            "Party Sparkler":4.3,"Perfume Bottle":97.9,"Pet Snake":4.55,"Precious Peach":438,
            "Pretty Posy":4.7,"Rare Bird":29.9,"Record":5.61,"Restless Jar":11.3,
            "Sakura Flower":48.9,"Santa Hat":12.5,"Scared Cat":4.5,"Sharp Tongue":5.08,
            "Signet Ring":5.48,"Skull Flower":7.2,"Sky Stilettos":5.49,"Sleigh Bell":5.83,
            "Snake Box":6.17,"Loot Bag":162.9,"Love Candle":12.3,"Love Potion":17,
            "Low Rider":52,"Lunar Snake":4.3,"Lush Bouquet":6.55,"Mad Pumpkin":13.8,
            "Magic Potion":80.9,"Mighty Arm":171.9,"Mini Oscar":103.7,"Money Pot":4.66,
            "Ion Gem":98.5,"Ionic Dryer":18.7,"Jack-in-the-Box":4.94,"Jelly Bunny":8.03,
            "Jester Hat":4.83,"Jolly Chimp":7.3,"Joyful Bundle":7.11,"Khabib's Papakha":25.9,
            "Kissed Frog":67.8,"Light Sword":6.3,"Lol Pop":4.5,"Hanging Star":9.93,
            "Happy Brownie":4.65,"Heroic Helmet":255.7,"Hex Pot":4.99,"Holiday Drink":4.4,
            "Homemade Cake":5.06,"Hypno Lollipop":4.84,"Ice Cream":4.44,"Input Key":6.19,
            "Instant Ramen":4.38,"Desk Calendar":6.78,"Durov's Cap":708,"Jingle Bells":9.53,
            "Plush Pepe":7999,"Heart Locket":2199,"Artisan Brick":97.7,"Astral Shard":199.9,
            "B-Day Candle":4.3,"Berry Box":8.81,"Big Year":4.72,"Bling Binky":35.3,
            "Bonded Ring":58.2,"Bow Tie":6.3,"Bunny Muffin":8.28,"Candy Cane":4.31,
            "Clover Pin":4.7,"Cookie Heart":4.95,"Crystal Ball":12,"Cupid Charm":22.5,
            "Diamond Ring":29.4,"Easter Egg":5.63,"Electric Skull":33.9,"Eternal Candle":6.58,
            "Eternal Rose":29.4,"Evil Eye":7.94,"Faith Amulet":4.7,"Flying Broom":14,
            "Fresh Socks":4.43,"Gem Signet":72.3,"Genie Lamp":50,"Ginger Cookie":4.9
        };
        
        function getGiftPrice(gift) {
            const name = (gift.name || '').replace(' (Random)', '');
            if (GIFT_PRICES[name]) return GIFT_PRICES[name];
            // Value is already in TON, no conversion needed
            return Number(gift.value || 0);
        }
        
        function getGiftImage(gift) {
            const img = gift.image || '';
            // Fragment URLs often blocked - use local proxy or default
            if (img.includes('fragment.com/file')) {
                // Try to get slug from image URL or gift
                const slug = gift.fragment_slug || img.split('/gifts/')[1]?.split('/')[0] || '';
                if (slug) {
                    // Try local gif/png
                    return '/static/gifs/gifts/' + slug + '.gif';
                }
            }
            if (img && !img.startsWith('http')) return img;
            if (img) return img;
            return '/static/img/gift.png';
        }
        
        let allCases = [];
        let currentTab = 'paid';
        let currentCase = null;
        let userId = null;
        let userBalance = 0;
        let selectedDeposit = 10;
        let lastWonGift = null;
        let isOpening = false;

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            if (tg) {
                tg.expand();
                tg.setHeaderColor('#090B11');
                tg.setBackgroundColor('#090B11');
                tg.ready();
                userId = tg.initDataUnsafe?.user?.id;
            }
            
            // Fallback for testing outside Telegram
            if (!userId) {
                const params = new URLSearchParams(window.location.search);
                userId = params.get('user_id') || null;
            }
            
            console.log('Init userId:', userId);

            const bar = $('loaderBar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                bar.style.width = progress + '%';
            }, 100);

            try {
                await Promise.all([loadCases(), loadUser(), loadFeed()]);
                progress = 100;
                bar.style.width = '100%';
                clearInterval(interval);
                setTimeout(() => $('loader').classList.add('hide'), 300);
            } catch (e) {
                console.error('Init error:', e);
                clearInterval(interval);
                bar.style.width = '100%';
                setTimeout(() => $('loader').classList.add('hide'), 300);
            }

            initSlider();
            updateOnline();
            setInterval(updateOnline, 30000);
            setInterval(loadFeed, 15000);
        }

        async function loadCases() {
            try {
                const res = await fetch('/api/cases');
                const data = await res.json();
                if (data.success && data.cases) {
                    allCases = data.cases;
                    allCases.sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
                    renderCases();
                } else {
                    $('casesContainer').innerHTML = '<div class="empty"><p>Ошибка загрузки кейсов</p></div>';
                }
            } catch (e) {
                console.error('Cases load error:', e);
                $('casesContainer').innerHTML = '<div class="empty"><p>Ошибка подключения</p></div>';
            }
        }

        async function loadUser() {
            if (!userId) {
                console.log('No user ID yet');
                $('balanceDisplay').textContent = '0,00';
                return;
            }
            try {
                const res = await fetch('/api/user/' + userId);
                const data = await res.json();
                if (data.success && data.user) {
                    userBalance = data.user.balance_stars || 0;
                    $('balanceDisplay').textContent = formatTon(starsToTon(userBalance));
                } else {
                    $('balanceDisplay').textContent = '0,00';
                }
            } catch (e) {
                console.error('User load error:', e);
                $('balanceDisplay').textContent = '0,00';
            }
        }

        async function loadFeed() {
            try {
                const res = await fetch('/api/recent-wins?limit=20');
                const data = await res.json();
                if (data.success && data.wins && data.wins.length) {
                    renderFeed(data.wins);
                } else {
                    $('feedTrack').innerHTML = '';
                }
            } catch (e) {
                console.error('Feed load error:', e);
                $('feedTrack').innerHTML = '';
            }
        }

        async function updateOnline() {
            try {
                const res = await fetch('/api/online');
                const data = await res.json();
                if (data.online !== undefined) {
                    $('onlineCount').textContent = data.online;
                }
            } catch (e) {}
        }

        function starsToTon(stars) {
            return Number(stars || 0) / 100;
        }

        function formatTon(ton) {
            const val = Math.round(Number(ton) * 100) / 100;
            return val.toFixed(2).replace('.', ',');
        }

        function renderFeed(wins) {
            const track = $('feedTrack');
            const items = [...wins, ...wins].map(w => `
                <div class="feed-item">
                    <img src="${w.image || '/static/img/gift.png'}" alt="" onerror="this.src='/static/img/gift.png'">
                </div>
            `).join('');
            track.innerHTML = items;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            renderCases();
        }

        function getGradient(caseItem) {
            const id = caseItem.id || 0;
            const grads = ['g-yellow', 'g-blue', 'g-purple', 'g-green', 'g-orange', 'g-red'];
            return grads[id % grads.length];
        }

        function renderCases() {
            const container = $('casesContainer');
            const filtered = allCases.filter(c => {
                const isFree = c.cost === 0 || c.promo;
                return currentTab === 'free' ? isFree : !isFree;
            });

            if (!filtered.length) {
                container.innerHTML = `
                    <div class="empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
                        </svg>
                        <p>Нет доступных кейсов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="cases">
                    ${filtered.map(c => {
                        const grad = getGradient(c);
                        const priceTon = starsToTon(c.cost || 0);
                        return `
                            <div class="case ${grad}" onclick="openCaseModal(${c.id})">
                                <div class="case-glow"></div>
                                <div class="case-inner">
                                    <div class="case-prices">
                                        <div class="case-price ton">
                                            <img src="/static/img/ton.png" alt="">
                                            ${formatTon(priceTon)}
                                        </div>
                                    </div>
                                    <div class="case-img">
                                        <img src="${c.image || '/static/img/gift.png'}" alt="" onerror="this.src='/static/img/gift.png'">
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function openCaseModal(caseId) {
            try {
                const res = await fetch(`/api/cases/${caseId}`);
                const data = await res.json();
                if (data.success && data.case) {
                    currentCase = data.case;
                    isOpening = false;
                    renderModal();
                    $('caseModal').classList.add('open');
                    resetSlider();
                }
            } catch (e) {
                showToast('Ошибка загрузки кейса', 'err');
            }
        }

        function renderModal() {
            if (!currentCase) return;
            
            const price = starsToTon(currentCase.cost || 0);
            $('modalName').textContent = currentCase.name || 'Кейс';
            $('modalPrice').querySelector('span').textContent = formatTon(price);

            const gifts = currentCase.gifts_details || currentCase.gifts || [];
            const isPromoCase = currentCase.promo === true;
            
            // Hide win section, show controls
            $('modalWin').style.display = 'none';
            $('rouletteWrap').style.display = 'block';
            $('rouletteWrap').classList.remove('won');
            $('contentsSection').style.display = 'block';
            
            // Show promo input for promo cases, hide slider
            if (isPromoCase) {
                $('promoInputWrap').style.display = 'block';
                $('sliderWrap').style.display = 'none';
                $('promoInput').value = '';
            } else {
                $('promoInputWrap').style.display = 'none';
                $('sliderWrap').style.display = 'block';
            }
            
            if (!gifts.length) {
                $('rouletteTrack').innerHTML = '<div style="padding:40px 20px;color:#828AA4;text-align:center;width:100%;">Нет подарков</div>';
                $('contentsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#828AA4;padding:20px;">Загрузка...</div>';
                return;
            }
            
            // Roulette items with names
            const rouletteItems = [];
            for (let i = 0; i < 30; i++) {
                const g = gifts[i % gifts.length];
                const gPrice = getGiftPrice(g);
                const gName = g.name || 'Подарок';
                rouletteItems.push(`
                    <div class="roulette-item">
                        <div class="roulette-item-price">
                            <img src="/static/img/ton.png" alt="">
                            ${formatTon(gPrice)}
                        </div>
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="roulette-item-name">${escapeHtml(gName)}</div>
                    </div>
                `);
            }
            const track = $('rouletteTrack');
            track.innerHTML = rouletteItems.join('') + rouletteItems.join('');
            track.classList.add('idle');
            track.classList.remove('spinning');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            // Contents with names
            $('contentsGrid').innerHTML = gifts.map(g => {
                const gPrice = getGiftPrice(g);
                const gName = g.name || 'Подарок';
                return `
                    <div class="content-item">
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="content-item-name">${escapeHtml(gName)}</div>
                        <div class="content-price">
                            <img src="/static/img/ton.png" alt="">
                            ${formatTon(gPrice)}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // SLIDER LOGIC
        function initSlider() {
            const thumb = $('sliderThumb');
            const slider = $('slider');
            const bg = $('sliderBg');
            
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            const maxX = () => slider.offsetWidth - thumb.offsetWidth - 8;

            function onStart(e) {
                if (isOpening) return;
                isDragging = true;
                startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                thumb.style.transition = 'none';
                bg.style.transition = 'none';
            }

            function onMove(e) {
                if (!isDragging) return;
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const diff = clientX - startX;
                currentX = Math.max(0, Math.min(diff, maxX()));
                thumb.style.left = (4 + currentX) + 'px';
                bg.style.transform = `scaleX(${currentX / maxX()})`;
            }

            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                thumb.style.transition = 'left .3s';
                bg.style.transition = 'transform .3s';

                if (currentX >= maxX() * 0.9) {
                    // Успешный свайп - открываем кейс
                    thumb.style.left = (4 + maxX()) + 'px';
                    bg.style.transform = 'scaleX(1)';
                    openCase();
                } else {
                    // Возврат
                    thumb.style.left = '4px';
                    bg.style.transform = 'scaleX(0)';
                }
                currentX = 0;
            }

            thumb.addEventListener('mousedown', onStart);
            thumb.addEventListener('touchstart', onStart, {passive: true});
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, {passive: true});
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);
        }

        function resetSlider() {
            const thumb = $('sliderThumb');
            const bg = $('sliderBg');
            thumb.style.transition = 'none';
            bg.style.transition = 'none';
            thumb.style.left = '4px';
            bg.style.transform = 'scaleX(0)';
        }

        async function openCase() {
            if (!currentCase || isOpening) return;
            
            if (!userId) {
                showToast('Откройте через Telegram', 'err');
                resetSlider();
                return;
            }

            const totalCost = currentCase.cost || 0;
            if (userBalance < totalCost) {
                showToast('Недостаточно средств', 'err');
                openDeposit();
                resetSlider();
                return;
            }

            isOpening = true;

            try {
                const res = await fetch('/api/cases/open', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        case_id: currentCase.id,
                        quantity: 1
                    })
                });
                const data = await res.json();
                if (data.success) {
                    userBalance = data.new_balance || userBalance - totalCost;
                    $('balanceDisplay').textContent = formatTon(starsToTon(userBalance));
                    runSpinRoulette(data.won_gifts || [data.won_gift]);
                } else {
                    showToast(data.error || 'Ошибка открытия', 'err');
                    isOpening = false;
                    resetSlider();
                }
            } catch (e) {
                showToast('Ошибка сети', 'err');
                isOpening = false;
                resetSlider();
            }
        }

        async function openWithPromo() {
            if (!currentCase || isOpening) return;
            
            if (!userId) {
                showToast('Откройте через Telegram', 'err');
                return;
            }
            
            const promoCode = $('promoInput').value.trim().toUpperCase();
            if (!promoCode) {
                showToast('Введите промокод', 'err');
                return;
            }
            
            isOpening = true;
            $('promoBtn').disabled = true;
            
            try {
                const res = await fetch('/api/open-case', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        case_id: currentCase.id,
                        promo_code: promoCode,
                        is_promo: true
                    })
                });
                const data = await res.json();
                if (data.success) {
                    runSpinRoulette(data.won_gifts || [data.won_gift]);
                } else {
                    showToast(data.error || 'Неверный промокод', 'err');
                    isOpening = false;
                }
            } catch (e) {
                showToast('Ошибка сети', 'err');
                isOpening = false;
            }
            $('promoBtn').disabled = false;
        }

        function runSpinRoulette(wonGifts) {
            const wonGift = Array.isArray(wonGifts) ? wonGifts[0] : wonGifts;
            lastWonGift = wonGift;
            
            const gifts = currentCase.gifts_details || currentCase.gifts || [];
            const track = $('rouletteTrack');
            
            // Stop idle animation
            track.classList.remove('idle');
            track.classList.add('spinning');
            
            // Generate spin items with winner at position 42
            const items = [];
            for (let i = 0; i < 50; i++) {
                const g = gifts[Math.floor(Math.random() * gifts.length)];
                items.push(g);
            }
            items[42] = wonGift;

            track.innerHTML = items.map(g => {
                const gPrice = getGiftPrice(g);
                const gName = g.name || 'Подарок';
                return `
                    <div class="roulette-item">
                        <div class="roulette-item-price">
                            <img src="/static/img/ton.png" alt="">
                            ${formatTon(gPrice)}
                        </div>
                        <img src="${getGiftImage(g)}" alt="" onerror="this.src='/static/img/gift.png'">
                        <div class="roulette-item-name">${escapeHtml(gName)}</div>
                    </div>
                `;
            }).join('');

            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const itemWidth = 110; // 100px + 10px gap
                    const wrap = $('rouletteWrap');
                    const centerOffset = wrap.offsetWidth / 2;
                    const targetPos = itemWidth * 42 + itemWidth / 2;
                    track.style.transition = 'transform 5s cubic-bezier(.08,.82,.17,1)';
                    track.style.transform = `translateX(${centerOffset - targetPos}px)`;
                });
            });

            setTimeout(() => showWinResultInModal(wonGift), 5300);
        }

        function showWinResultInModal(gift) {
            // Show won state
            $('rouletteWrap').classList.add('won');
            $('sliderWrap').style.display = 'none';
            $('contentsSection').style.display = 'none';
            
            // Show win section in modal
            $('modalWinImg').src = getGiftImage(gift);
            $('modalWinName').textContent = gift.name || 'Подарок';
            $('modalWinValue').querySelector('span').textContent = formatTon(getGiftPrice(gift));
            $('modalWin').style.display = 'block';
            
            isOpening = false;
        }
        
        function closeModalAndReset() {
            closeModal();
            lastWonGift = null;
        }
        
        function openAgain() {
            if (!currentCase) return;
            $('modalWin').style.display = 'none';
            renderModal();
            resetSlider();
        }

        function closeModal() {
            $('caseModal').classList.remove('open');
            currentCase = null;
        }

        $('caseModal').addEventListener('click', e => {
            if (e.target === $('caseModal')) closeModal();
        });

        function openDeposit() {
            $('depositOverlay').classList.add('open');
        }

        function closeDeposit(e) {
            if (e && e.target !== $('depositOverlay')) return;
            $('depositOverlay').classList.remove('open');
        }

        function selectDeposit(el) {
            document.querySelectorAll('.deposit-amt').forEach(a => a.classList.remove('selected'));
            el.classList.add('selected');
            selectedDeposit = parseInt(el.dataset.ton);
        }

        async function processDeposit() {
            showToast('Депозит скоро будет доступен', 'ok');
            closeDeposit();
        }

        function showToast(msg, type = 'ok') {
            const toast = $('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
