<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090B11">
<title>Rasswet — Инвентарь</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#090B11;color:#fff;-webkit-font-smoothing:antialiased;
  min-height:100vh;min-height:100dvh;
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

:root{
  --blue:#236CD9;--blue-light:#2C7CF3;
  --green:#1EE44C;--gold:#FDA100;
  --bg:#090B11;--surface:#161923;--surface2:#1A1E2A;
  --border:rgba(255,255,255,.06);
  --text-muted:#828AA4;--text-dim:#646C86;
  --nav-h:72px;--safe-b:env(safe-area-inset-bottom,0px);
}

/* ===== LOADING ===== */
.ld-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .4s;
}
.ld-screen.hidden{opacity:0;pointer-events:none}
.ld-spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{margin-top:16px;font-size:12px;color:var(--text-dim);letter-spacing:1px;font-weight:600}

/* ===== APP ===== */
.app{
  max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  padding-bottom:calc(var(--nav-h) + var(--safe-b));
}

/* ===== TOP BAR ===== */
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;position:sticky;top:0;z-index:50;
  background:rgba(9,11,17,.92);backdrop-filter:blur(12px);
}
.top-bar-left{display:flex;align-items:center;gap:10px}
.back-btn{
  width:36px;height:36px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.back-btn:active{background:rgba(255,255,255,.12)}
.back-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.page-title{font-size:16px;font-weight:800;letter-spacing:.3px}
.top-bar-right{display:flex;align-items:center;gap:6px}
.bal-box{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700;
}
.bal-box svg{width:18px;height:18px}
.deposit-btn{
  width:38px;height:38px;border-radius:12px;
  background:rgba(35,108,217,.15);border:1px solid rgba(35,108,217,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;color:var(--blue);transition:background .2s;
}
.deposit-btn:active{background:rgba(35,108,217,.3)}

/* ===== STATS BAR ===== */
.stats-bar{
  display:flex;gap:8px;padding:8px 16px 4px;
}
.stat-chip{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:12px;text-align:center;
}
.stat-val{font-size:20px;font-weight:800;color:var(--gold)}
.stat-label{font-size:10px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ===== QUICK ACTIONS ===== */
.quick-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:10px 16px;
}
.qa-btn{
  padding:12px;border-radius:14px;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.qa-btn:active{transform:scale(.97)}
.qa-promo{
  background:rgba(35,108,217,.15);border:1px solid rgba(35,108,217,.25);
  color:var(--blue-light);
}
.qa-sell{
  background:rgba(253,161,0,.12);border:1px solid rgba(253,161,0,.2);
  color:var(--gold);
}
.qa-btn svg{width:18px;height:18px;flex-shrink:0}

/* ===== INVENTORY GRID ===== */
.inv-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  padding:8px 16px 20px;
}
.gift-card{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);overflow:hidden;
  position:relative;padding:14px 10px 12px;text-align:center;
  animation:cardIn .4s ease backwards;
  transition:transform .15s;
}
.gift-card:active{transform:scale(.97)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.gift-card.is-crate{border-color:rgba(35,108,217,.3);background:rgba(35,108,217,.06)}
.gift-img{
  width:68px;height:68px;object-fit:contain;margin:0 auto 8px;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));
}
.gift-name{
  font-size:12px;font-weight:700;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.gift-value{
  font-size:14px;font-weight:800;color:var(--gold);margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.gift-value img{width:14px;height:14px}
.gift-btns{display:flex;gap:6px}
.g-btn{
  flex:1;padding:8px 4px;border-radius:10px;
  font-size:11px;font-weight:700;transition:all .2s;
}
.g-btn:active{transform:scale(.96)}
.g-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.g-btn-sell{background:rgba(249,105,153,.12);border:1px solid rgba(249,105,153,.2);color:#F96999}
.g-btn-withdraw{background:rgba(35,108,217,.15);border:1px solid rgba(35,108,217,.25);color:var(--blue-light)}
.g-btn-open{background:var(--blue);color:#fff;width:100%;padding:8px;font-size:13px;border-radius:10px}
.withdrawing-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(253,161,0,.12);color:var(--gold);
  padding:3px 8px;border-radius:8px;
  font-size:9px;font-weight:700;border:1px solid rgba(253,161,0,.2);
}
.crate-count-badge{
  position:absolute;top:6px;right:6px;z-index:2;
  background:var(--blue);color:#fff;font-weight:800;
  font-size:12px;min-width:24px;height:24px;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  padding:0 6px;
}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:50px 20px}
.empty-state h3{font-size:16px;font-weight:800;color:var(--text-muted);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.empty-state .go-cases{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:14px;
  background:var(--blue);color:#fff;font-size:14px;font-weight:700;
  transition:opacity .2s;
}
.empty-state .go-cases:active{opacity:.8}

/* ===== CRATE OVERLAY ===== */
.crate-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.crate-overlay.show{display:flex}
.crate-title{font-size:18px;font-weight:800;margin-bottom:20px;text-align:center}
.crate-remaining{font-size:13px;color:var(--text-muted);margin-bottom:12px;text-align:center}
.crate-remaining span{color:var(--blue-light);font-weight:800}
.crate-roulette-container{
  width:90%;max-width:360px;height:130px;overflow:hidden;position:relative;
  border-radius:14px;border:2px solid rgba(35,108,217,.3);
  background:rgba(15,15,25,.9);
}
.crate-roulette-strip{display:flex;position:absolute;top:0;left:0;height:100%}
.crate-roulette-item{
  width:120px;min-width:120px;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid rgba(255,255,255,.05);
}
.crate-roulette-item img,.crate-roulette-item video{
  width:55px;height:55px;object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));
}
.crate-roulette-item video{border-radius:8px}
.crate-roulette-item-name{
  font-size:10px;color:var(--text-dim);margin-top:6px;text-align:center;
  max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.crate-roulette-pointer{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:3px;height:100%;z-index:2;
}
.crate-roulette-pointer::before,.crate-roulette-pointer::after{
  content:'';position:absolute;left:50%;transform:translateX(-50%);
  border:6px solid transparent;
}
.crate-roulette-pointer::before{top:0;border-top-color:var(--blue)}
.crate-roulette-pointer::after{bottom:0;border-bottom-color:var(--blue)}
.crate-roulette-container::before,.crate-roulette-container::after{
  content:'';position:absolute;top:0;width:40px;height:100%;z-index:1;
}
.crate-roulette-container::before{left:0;background:linear-gradient(90deg,rgba(15,15,25,.9),transparent)}
.crate-roulette-container::after{right:0;background:linear-gradient(-90deg,rgba(15,15,25,.9),transparent)}
.crate-result{
  margin-top:24px;text-align:center;
  opacity:0;transform:scale(.8);transition:all .5s cubic-bezier(.34,1.56,.64,1);
}
.crate-result.show{opacity:1;transform:scale(1)}
.crate-result-rarity{
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:8px;
}
.crate-result-rarity.common{color:#a8a8a8;background:rgba(168,168,168,.1);border:1px solid rgba(168,168,168,.2)}
.crate-result-rarity.rare{color:#60a5fa;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2)}
.crate-result-rarity.epic{color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2)}
.crate-result-rarity.legendary{color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2)}
.crate-result-text{font-size:18px;font-weight:800;margin-bottom:8px}
.crate-comp-text{font-size:12px;color:var(--gold);margin-bottom:16px}
.crate-btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.crate-close-btn{
  background:var(--blue);border-radius:14px;padding:14px 40px;
  color:#fff;font-weight:800;font-size:15px;transition:opacity .2s;
}
.crate-close-btn:active{opacity:.8}
.crate-collect-btn{
  background:var(--green);border-radius:14px;padding:14px 40px;
  color:#000;font-weight:800;font-size:15px;transition:opacity .2s;
  margin-top:8px;
}
.crate-collect-btn:active{opacity:.8}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(0deg,#0A0C12 60%,rgba(10,12,18,.95));
  border-top:1px solid var(--border);padding-bottom:var(--safe-b);
}
.bottom-nav-inner{
  max-width:480px;margin:0 auto;display:flex;justify-content:space-around;
  align-items:center;height:var(--nav-h);padding:0 8px;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 12px;color:var(--text-dim);transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.nav-item span{font-size:10px;font-weight:600;letter-spacing:.3px}
.nav-item.active{color:var(--blue)}
.nav-icon-wrap{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s;
}
.nav-item.active .nav-icon-wrap{
  background:linear-gradient(180deg,#2C79FD 0%,#2246E4 46%,#18408F 100%);
  box-shadow:0 4px 12px rgba(35,108,217,.4);
}
.nav-icon-wrap svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-item.active .nav-icon-wrap svg{stroke:#fff}
.nav-item.disabled{opacity:.4;pointer-events:none}

/* ===== DEPOSIT OVERLAY ===== */
.deposit-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:260;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
}
.deposit-overlay.show{opacity:1;visibility:visible}
.deposit-sheet{
  max-width:480px;width:100%;background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + var(--safe-b));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);
}
.deposit-overlay.show .deposit-sheet{transform:translateY(0)}
.drag-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}
.deposit-option{
  display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;
  background:var(--bg);border:1px solid var(--border);margin-bottom:8px;
  cursor:pointer;transition:background .2s;
}
.deposit-option:active{background:rgba(255,255,255,.06)}
.deposit-option svg{width:28px;height:28px;flex-shrink:0}
.deposit-opt-text{flex:1}
.deposit-opt-text strong{display:block;font-size:14px;font-weight:700}
.deposit-opt-text span{font-size:12px;color:var(--text-muted)}

/* ===== PROMO MODAL ===== */
.promo-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
}
.promo-modal.show{opacity:1;visibility:visible}
.promo-card{
  max-width:340px;width:90%;background:var(--surface);border-radius:20px;
  padding:24px;text-align:center;
}
.promo-card h3{font-size:16px;font-weight:800;margin-bottom:4px}
.promo-card .promo-sub{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.promo-card input{
  width:100%;padding:14px;border-radius:14px;
  background:var(--bg);border:1px solid var(--border);
  color:#fff;font-size:15px;font-weight:700;text-align:center;
  text-transform:uppercase;letter-spacing:1px;outline:none;
  margin-bottom:14px;transition:border-color .2s;
}
.promo-card input:focus{border-color:var(--blue)}
.promo-card .promo-btns{display:flex;gap:10px}
.promo-cancel{
  flex:1;padding:13px;border-radius:14px;
  background:rgba(255,255,255,.06);color:var(--text-muted);font-size:13px;font-weight:700;
}
.promo-confirm{
  flex:2;padding:13px;border-radius:14px;
  background:var(--blue);color:#fff;font-size:13px;font-weight:700;
}

/* ===== PROMO SUCCESS OVERLAY ===== */
.promo-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s;
}
.promo-overlay.active{opacity:1;visibility:visible}
.sparkles-container{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.sparkle{
  position:absolute;width:8px;height:8px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 15px 5px rgba(253,161,0,.6);
  animation:sparkleFloat 2s ease-in-out infinite;
}
@keyframes sparkleFloat{0%,100%{transform:translateY(0) scale(1);opacity:.8}50%{transform:translateY(-30px) scale(1.3);opacity:1}}
.promo-content{text-align:center;z-index:401;animation:promoReveal .8s ease forwards}
@keyframes promoReveal{0%{opacity:0;transform:scale(.5)}50%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
.promo-icon-big{
  width:100px;height:100px;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--blue),#1948A0);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(35,108,217,.5);animation:iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 40px rgba(35,108,217,.4)}50%{box-shadow:0 0 80px rgba(35,108,217,.8)}}
.promo-icon-big img{width:50px;height:50px}
.promo-big-title{font-size:28px;font-weight:900;margin-bottom:10px}
.promo-code-display{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:25px;text-transform:uppercase;letter-spacing:2px}
.promo-rewards{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin-bottom:30px}
.promo-reward-item{
  background:rgba(255,255,255,.08);border:2px solid rgba(253,161,0,.3);
  border-radius:16px;padding:20px 30px;text-align:center;
  animation:rewardPop .5s ease forwards;animation-delay:calc(var(--i,0)*.15s);
  opacity:0;transform:scale(.8);
}
@keyframes rewardPop{to{opacity:1;transform:scale(1)}}
.promo-reward-item .reward-value{
  font-weight:900;font-size:32px;color:var(--gold);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.promo-reward-item .reward-value img{width:28px;height:28px}
.promo-reward-item .reward-label{font-size:12px;color:var(--text-dim);margin-top:5px;text-transform:uppercase;letter-spacing:1px}
.promo-special-label{
  font-size:14px;font-weight:700;color:var(--green);margin-bottom:15px;
  padding:8px 16px;background:rgba(30,228,76,.1);
  border:1px solid rgba(30,228,76,.3);border-radius:20px;display:inline-block;
}
.promo-close-big{
  background:var(--blue);border-radius:16px;padding:16px 50px;
  color:#fff;font-weight:800;font-size:16px;transition:opacity .2s;
}
.promo-close-big:active{opacity:.8}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);
  left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;
  background:var(--surface2);border:1px solid var(--border);color:#fff;
  z-index:9000;white-space:nowrap;animation:toastIn .3s ease;
}
.toast.ok{border-color:rgba(30,228,76,.3);color:var(--green)}
.toast.err{border-color:rgba(249,105,153,.3);color:#F96999}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="ld-screen" id="ldScreen">
  <div class="ld-spinner"></div>
  <div class="ld-text">RASSWET</div>
</div>

<div class="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="back-btn" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="page-title">Инвентарь</div>
    </div>
    <div class="top-bar-right">
      <div class="bal-box">
        <svg viewBox="0 0 24 24"><polygon points="12,2 15,10 24,10 17,15 19,23 12,18 5,23 7,15 0,10 9,10" fill="var(--gold)" stroke="none"/></svg>
        <span id="balVal">0</span>
      </div>
      <button class="deposit-btn" onclick="openDeposit()">+</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-chip">
      <div class="stat-val" id="statCount">0</div>
      <div class="stat-label">Предметов</div>
    </div>
    <div class="stat-chip">
      <div class="stat-val" id="statValue">0</div>
      <div class="stat-label">Стоимость</div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <button class="qa-btn qa-promo" onclick="openPromoModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 010-4h12V2"/><path d="M4 6v14a2 2 0 002 2h14"/><circle cx="18" cy="14" r="2"/></svg>
      Промокод
    </button>
    <button class="qa-btn qa-sell" onclick="sellAllGifts()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15,10 24,10 17,15 19,23 12,18 5,23 7,15 0,10 9,10"/></svg>
      Продать всё
    </button>
  </div>

  <!-- INVENTORY -->
  <div id="invContainer">
    <div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px">Загрузка инвентаря...</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/crash" class="nav-item">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M4.5 16.5L12 3l7.5 13.5H4.5z" stroke-linejoin="round"/><path d="M12 3v10M8 20h8" stroke-linecap="round"/></svg>
      </div>
      <span>Краш</span>
    </a>

<script>
/* ===== GLOBALS ===== */
let user = null;
let inventory = [];
let currencyMode = 'stars';
let crateOpening = false;
let crateQueue = [];
let crateQueueIndex = 0;
let crateQueueName = '';
const TON_RATE = 100;

const tg = window.Telegram && Telegram.WebApp;
if(tg) tg.expand();

/* ===== CURRENCY HELPERS ===== */
function getCurrencyMode(){ return currencyMode === 'ton' ? 'ton' : 'stars' }
function formatMoney(v){
  v = Number(v||0);
  if(getCurrencyMode()==='ton'){
    const t = v / TON_RATE;
    return (Math.round(t*100)/100).toString().replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
  }
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(1)+'K';
  return Math.round(v).toString();
}
function getMoneyIcon(){
  return getCurrencyMode()==='ton' ? '/static/img/ton.png' : '/static/img/star.png';
}
function getMoneySuffix(){
  return getCurrencyMode()==='ton' ? ' TON' : ' звёзд';
}

/* ===== GIFT IMAGE RESOLUTION ===== */
function slugify(name){
  return String(name||'').replace(/\s*\(Random\)\s*/ig,'').toLowerCase().replace(/[^a-z0-9]+/g,'');
}
function localImg(gift,fb){
  return String((gift&&(gift.gift_image||gift.image))||'').trim() || fb || '/static/img/gift.png';
}
function resolveGiftImage(gift,fb){
  fb = fb || '/static/img/gift.png';
  const raw = String((gift&&(gift.gift_image||gift.image))||'');
  if(raw.indexOf('fragment.com/file/')!==-1) return raw;
  const slug = String((gift&&gift.fragment_slug)||slugify(gift&&(gift.gift_name||gift.name)||'')).trim().toLowerCase();
  if(slug) return 'https://fragment.com/file/gifts/'+slug+'/thumb.webp';
  return localImg(gift,fb);
}
function giftOnError(gift,fb){
  const f = localImg(gift,fb).replace(/'/g,"\\'");
  return "this.onerror=null;this.src='"+f+"'";
}

/* ===== INIT ===== */
async function initApp(){
  try{
    if(!tg||!tg.initDataUnsafe||!tg.initDataUnsafe.user){
      showToast('Откройте в Telegram','err');return;
    }
    const tgUser = tg.initDataUnsafe.user;

    const authR = await fetch('/api/auth',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id:tgUser.id,first_name:tgUser.first_name||'',
        last_name:tgUser.last_name||'',username:tgUser.username||'',
        photo_url:tgUser.photo_url||'',language_code:tgUser.language_code||'ru',
        start_param:tg.initDataUnsafe.start_param||''
      })
    });
    const authD = await authR.json();
    if(!authD.success){showToast('Ошибка авторизации','err');return}
    user = authD.user;
    currencyMode = (user.currency_mode==='ton') ? 'ton' : 'stars';

    updateBalance();
    await loadInventory();

  }catch(e){
    console.error(e);
    showToast('Ошибка загрузки','err');
  }finally{
    const ld = document.getElementById('ldScreen');
    ld.classList.add('hidden');
    setTimeout(()=>ld.remove(),500);
  }
}
document.addEventListener('DOMContentLoaded',initApp);

/* ===== UPDATE BALANCE ===== */
function updateBalance(){
  if(!user) return;
  document.getElementById('balVal').textContent = formatMoney(user.balance_stars||0);
}

/* ===== LOAD INVENTORY ===== */
async function loadInventory(){
  try{
    const r = await fetch('/api/inventory/'+user.id);
    const d = await r.json();
    if(d.success){
      inventory = d.inventory||[];
      renderInventory();
    } else showToast('Ошибка загрузки инвентаря','err');
  }catch(e){showToast('Ошибка загрузки','err')}
}

/* ===== RENDER INVENTORY ===== */
function renderInventory(){
  const c = document.getElementById('invContainer');
  const count = inventory.length;
  const totalVal = inventory.reduce((s,i)=>s+(i.gift_value||0),0);

  document.getElementById('statCount').textContent = count;
  document.getElementById('statValue').textContent = formatMoney(totalVal);

  if(!count){
    c.innerHTML = `
      <div class="empty-state">
        <h3>Инвентарь пуст</h3>
        <p>Открывайте кейсы, чтобы получить подарки!</p>
        <button class="go-cases" onclick="location.href='/cases'">Открыть кейсы</button>
      </div>`;
    return;
  }

  /* Group crates by crate_id */
  const regularItems = [];
  const crateGroups = {};
  inventory.forEach(item=>{
    if(item.crate_id){
      if(!crateGroups[item.crate_id]){
        crateGroups[item.crate_id] = {
          crate_id:item.crate_id,
          crate_name:item.crate_name||'Ящик',
          crate_image:item.crate_image||'/static/img/star2.png',
          ids:[]
        };
      }
      crateGroups[item.crate_id].ids.push(item.id);
    } else regularItems.push(item);
  });

  let html = '';
  let idx = 0;

  /* Crates first */
  for(const cid in crateGroups){
    const g = crateGroups[cid];
    const cnt = g.ids.length;
    html += `<div class="gift-card is-crate" style="animation-delay:${idx*.05}s">
      ${cnt>1?'<div class="crate-count-badge">x'+cnt+'</div>':''}
      <img class="gift-img" src="${g.crate_image}" alt="${g.crate_name}" onerror="this.src='/static/img/star2.png'">
      <div class="gift-name">${g.crate_name}</div>
      <div class="gift-value" style="color:var(--text-dim);font-size:11px">Ящик${cnt>1?' ('+cnt+' шт.)':''}</div>
      <div class="gift-btns">
        <button class="g-btn g-btn-open" onclick='openCrateStack(${JSON.stringify(g.ids)},"${g.crate_name.replace(/"/g,'\\"')}")'>Открыть${cnt>1?' ('+cnt+')':''}</button>
      </div>
    </div>`;
    idx++;
  }

  /* Regular items */
  regularItems.forEach((item,i)=>{
    const img = resolveGiftImage(item,'/static/img/gift.png');
    const onErr = giftOnError(item,'/static/img/gift.png');
    html += `<div class="gift-card" style="animation-delay:${(idx+i)*.05}s">
      ${item.is_withdrawing?'<div class="withdrawing-badge">Вывод</div>':''}
      <img class="gift-img" src="${img}" alt="${item.gift_name}" onerror="${onErr}">
      <div class="gift-name">${item.gift_name}</div>
      <div class="gift-value">
        ${formatMoney(item.gift_value)}
        <img src="${getMoneyIcon()}" onerror="this.src='/static/img/star.png'">
      </div>
      <div class="gift-btns">
        <button class="g-btn g-btn-sell" onclick="sellGift(${item.id})" ${item.is_withdrawing?'disabled':''}>Продать</button>
        <button class="g-btn g-btn-withdraw" onclick="withdrawGift(${item.id})" ${item.is_withdrawing?'disabled':''}>Вывести</button>
      </div>
    </div>`;
  });

  c.innerHTML = '<div class="inv-grid">' + html + '</div>';
}

/* ===== SELL ===== */
async function sellGift(id){
  if(!confirm('Продать этот подарок?')) return;
  try{
    const r = await fetch('/api/sell-gift',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:user.id,gift_id:id})
    });
    const d = await r.json();
    if(d.success){
      showToast('Продано!','ok');
      haptic('medium');
      await refreshUser();
      await loadInventory();
    } else showToast(d.error||'Ошибка','err');
  }catch(e){showToast('Ошибка сети','err')}
}

/* ===== SELL ALL ===== */
async function sellAllGifts(){
  const sellable = inventory.filter(i=>!i.is_withdrawing&&!i.crate_id);
  if(!sellable.length){showToast('Нет предметов для продажи','err');return}
  const total = sellable.reduce((s,i)=>s+(i.gift_value||0),0);
  if(!confirm('Продать все предметы за '+formatMoney(total)+getMoneySuffix()+'?')) return;
  try{
    const r = await fetch('/api/sell-all-gifts',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:user.id})
    });
    const d = await r.json();
    if(d.success){
      showToast('Продано '+d.sold_count+' за '+formatMoney(d.total_value||0)+getMoneySuffix(),'ok');
      haptic('success');
      await refreshUser();
      await loadInventory();
    } else showToast(d.error||'Ошибка','err');
  }catch(e){showToast('Ошибка сети','err')}
}

/* ===== WITHDRAW ===== */
async function withdrawGift(id){
  if(!confirm('Отправить заявку на вывод?')) return;
  try{
    const r = await fetch('/api/withdraw-gift',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:user.id,gift_id:id})
    });
    const d = await r.json();
    if(d.success){
      showToast('Заявка на вывод создана!','ok');
      haptic('medium');
      await loadInventory();
    } else showToast(d.error||'Ошибка','err');
  }catch(e){showToast('Ошибка сети','err')}
}

/* ===== REFRESH USER ===== */
async function refreshUser(){
  try{
    const r = await fetch('/api/user/'+user.id);
    const d = await r.json();
    if(d.success){
      user = d.user;
      if(user.currency_mode) currencyMode = user.currency_mode==='ton'?'ton':'stars';
      updateBalance();
    }
  }catch(e){}
}

/* ===== DEPOSIT ===== */
function openDeposit(){document.getElementById('depositOverlay').classList.add('show')}
function closeDeposit(){document.getElementById('depositOverlay').classList.remove('show')}
function depositStars(){
  closeDeposit();
  /* Simple Stars deposit — ask amount */
  const amount = prompt('Сумма пополнения (10-10000 Stars):','100');
  if(!amount) return;
  const a = parseInt(amount);
  if(!a||a<10||a>10000){showToast('Сумма от 10 до 10,000','err');return}
  fetch('/api/stars/create-invoice',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user_id:user.id,amount:a})
  }).then(r=>r.json()).then(d=>{
    if(d.success&&d.invoice_url){
      if(tg) tg.openInvoice(d.invoice_url,function(s){
        if(s==='paid'){showToast('Оплачено!','ok');haptic('success');refreshUser()}
      });
    } else showToast(d.error||'Ошибка','err');
  }).catch(()=>showToast('Ошибка сети','err'));
}
function depositTon(){
  closeDeposit();
  fetch('/api/ton-wallet-address').then(r=>r.json()).then(d=>{
    if(d.success&&d.address){
      navigator.clipboard.writeText(d.address).then(()=>{
        showToast('TON адрес скопирован!','ok');
      }).catch(()=>{
        prompt('TON адрес для пополнения:',d.address);
      });
    }
  }).catch(()=>showToast('Ошибка','err'));
}

/* ===== PROMO ===== */
function openPromoModal(){
  document.getElementById('promoModal').classList.add('show');
  document.getElementById('promoInput').value='';
  document.getElementById('promoActivateBtn').disabled=false;
  document.getElementById('promoActivateBtn').textContent='Активировать';
  setTimeout(()=>document.getElementById('promoInput').focus(),100);
}
function closePromoModal(){
  document.getElementById('promoModal').classList.remove('show');
}
document.getElementById('promoInput').addEventListener('keypress',function(e){
  if(e.key==='Enter') activatePromo();
});

async function activatePromo(){
  const code = document.getElementById('promoInput').value.trim().toUpperCase();
  if(!code){showToast('Введите промокод','err');return}
  const btn = document.getElementById('promoActivateBtn');
  btn.disabled=true;btn.textContent='Проверка...';
  try{
    const r = await fetch('/api/activate-promo',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:user.id,promo_code:code})
    });
    const d = await r.json();
    if(d.success){
      closePromoModal();
      showPromoOverlay(code,d);
      refreshUser();
    } else {
      showToast(d.error||'Ошибка','err');
      btn.disabled=false;btn.textContent='Активировать';
    }
  }catch(e){
    showToast('Ошибка сети','err');
    btn.disabled=false;btn.textContent='Активировать';
  }
}

/* ===== PROMO SUCCESS OVERLAY ===== */
function createSparkles(){
  const c = document.getElementById('sparklesContainer');
  c.innerHTML = '';
  const colors = ['#fda100','#ff6b6b','#4ecdc4','#236CD9','#1EE44C','#ff9500'];
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.background=colors[Math.floor(Math.random()*colors.length)];
    s.style.animationDelay=Math.random()*2+'s';
    s.style.width=(Math.random()*6+4)+'px';
    s.style.height=s.style.width;
    c.appendChild(s);
  }
}

function showPromoOverlay(code,data){
  document.getElementById('promoCodeDisplay').textContent=code;
  const rewardsDiv=document.getElementById('promoRewardsDisplay');
  const specialLabel=document.getElementById('promoSpecialLabel');
  const iconImg=document.getElementById('promoIconImg');
  rewardsDiv.innerHTML='';
  specialLabel.style.display='none';
  iconImg.src='/static/img/star.png';

  let ri=0;
  const starsAmt=data.stars||data.reward_stars||0;
  const ticketsAmt=data.tickets||data.reward_tickets||0;

  if(starsAmt>0){
    const item=document.createElement('div');
    item.className='promo-reward-item';
    item.style.setProperty('--i',ri++);
    item.innerHTML=`<div class="reward-value"><img src="${getMoneyIcon()}" alt="">${formatMoney(starsAmt)}</div><div class="reward-label">${getCurrencyMode()==='ton'?'TON':'Звезд'}</div>`;
    rewardsDiv.appendChild(item);
  }
  if(ticketsAmt>0){
    const item=document.createElement('div');
    item.className='promo-reward-item';
    item.style.setProperty('--i',ri++);
    item.innerHTML=`<div class="reward-value"><img src="/static/img/ticket.png" alt="">${ticketsAmt}</div><div class="reward-label">Билетов</div>`;
    rewardsDiv.appendChild(item);
  }

  if(data.reward_type){
    switch(data.reward_type){
      case 'crash_vip':
        specialLabel.textContent='VIP CRASH АКТИВИРОВАН';specialLabel.style.display='inline-block';
        break;
      case 'case_discount':
        specialLabel.textContent='СКИДКА НА КЕЙСЫ';specialLabel.style.display='inline-block';
        break;
      case 'inventory_gift':
        specialLabel.textContent='ПОДАРОК ПОЛУЧЕН';specialLabel.style.display='inline-block';
        specialLabel.style.color='var(--gold)';
        if(data.gift_name){
          const gi=document.createElement('div');gi.className='promo-reward-item';gi.style.setProperty('--i',ri++);
          gi.innerHTML=`<div class="reward-value" style="font-size:18px;color:#fff">${data.gift_name}</div><div class="reward-label">В инвентаре</div>`;
          rewardsDiv.appendChild(gi);
        }
        break;
    }
  }

  createSparkles();
  document.getElementById('promoOverlay').classList.add('active');
  haptic('success');
}

function hidePromoOverlay(){
  document.getElementById('promoOverlay').classList.remove('active');
  refreshUser();
  loadInventory();
}

/* ===== CRATE OPENING ===== */
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playSound(type){
  try{
    const ctx=getAudioCtx();const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);const t=ctx.currentTime;
    if(type==='tick'){
      osc.type='sine';osc.frequency.setValueAtTime(800+Math.random()*400,t);
      gain.gain.setValueAtTime(.08,t);gain.gain.exponentialRampToValueAtTime(.001,t+.06);
      osc.start(t);osc.stop(t+.06);
    } else if(type==='win'){
      osc.type='sine';
      osc.frequency.setValueAtTime(523,t);osc.frequency.setValueAtTime(659,t+.1);
      osc.frequency.setValueAtTime(784,t+.2);osc.frequency.setValueAtTime(1047,t+.3);
      gain.gain.setValueAtTime(.15,t);gain.gain.exponentialRampToValueAtTime(.001,t+.5);
      osc.start(t);osc.stop(t+.5);
    }
  }catch(e){}
}

function getCrateItemSrc(item){
  if(item.item_type==='rocket') return '/static/gifs/'+(item.item_id||'crash')+'.gif';
  if(item.item_type==='background') return '/static/img/'+(item.item_id||'phone')+'.mp4';
  if(item.item_type==='stars') return '/static/img/star.png';
  if(item.item_type==='tickets') return '/static/img/ticket.png';
  return '/static/img/star.png';
}
function getCrateItemMediaHtml(item){
  if(item.item_type==='background'){
    const src='/static/img/'+(item.item_id||'phone')+'.mp4';
    return '<video src="'+src+'" autoplay muted loop playsinline onerror="this.outerHTML=\'<img src=/static/img/'+(item.item_id||'phone')+'.png onerror=this.src=\\x27/static/img/star.png\\x27>\'"></video>';
  }
  return '<img src="'+getCrateItemSrc(item)+'" onerror="this.src=\'/static/img/star.png\'" alt="">';
}
function getCrateItemLabel(item){
  if(item.item_type==='stars') return '+'+(item.item_id||'10')+' Stars';
  if(item.item_type==='tickets') return '+'+(item.item_id||'1')+' Билетов';
  return item.item_name||item.item_id||'Предмет';
}

function openCrateStack(ids,name){
  if(crateOpening||!user||!ids||!ids.length) return;
  crateQueue=ids.slice();crateQueueIndex=0;crateQueueName=name||'Ящик';
  openNextCrate();
}

function openNextCrate(){
  if(crateQueueIndex>=crateQueue.length){closeCrateOverlay();return}
  const inventoryId=crateQueue[crateQueueIndex];
  crateQueueIndex++;
  openInventoryCrate(inventoryId);
}

async function openInventoryCrate(inventoryId){
  if(crateOpening||!user) return;
  crateOpening=true;
  try{
    const r=await fetch('/api/inventory/open-crate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:user.id,inventory_id:inventoryId})
    });
    const d=await r.json();
    if(!d.success){showToast(d.error||'Ошибка','err');crateOpening=false;return}
    if(d.new_balance_stars!==undefined) user.balance_stars=d.new_balance_stars;
    if(d.new_balance_tickets!==undefined) user.balance_tickets=d.new_balance_tickets;
    updateBalance();
    const remaining=crateQueue.length-crateQueueIndex;
    showCrateRoulette(crateQueueName||'Ящик',d.won_item,d.all_items,d.reward_desc,d.comp_desc,remaining);
  }catch(e){
    console.error(e);showToast('Ошибка сети','err');crateOpening=false;
  }
}

function showCrateRoulette(crateName,wonItem,allItems,rewardDesc,compDesc,remaining){
  const overlay=document.getElementById('crateOverlay');
  const strip=document.getElementById('crateRouletteStrip');
  const result=document.getElementById('crateResult');
  const resultText=document.getElementById('crateResultText');
  const resultRarity=document.getElementById('crateResultRarity');
  const compText=document.getElementById('crateCompText');
  const title=document.getElementById('crateOpenTitle');
  const remainingEl=document.getElementById('crateRemaining');
  const remainingCount=document.getElementById('crateRemainingCount');
  const nextBtn=document.getElementById('crateNextBtn');
  const collectBtn=document.getElementById('crateCollectBtn');

  if(!overlay||!strip){crateOpening=false;return}

  title.textContent=crateName;
  result.classList.remove('show');
  compText.textContent='';

  if(remaining>0){
    remainingEl.style.display='block';
    remainingCount.textContent=remaining;
  } else remainingEl.style.display='none';

  const totalItems=50;
  const winPosition=38+Math.floor(Math.random()*6);

  let stripItems=[];
  for(let i=0;i<totalItems;i++){
    let item;
    if(i===winPosition){
      item={...wonItem,_isWinner:true};
    } else {
      const totalChance=allItems.reduce((s,it)=>s+it.chance,0);
      let roll=Math.random()*totalChance;let cumul=0;
      item={...allItems[0]};
      for(let j=0;j<allItems.length;j++){
        cumul+=allItems[j].chance;
        if(roll<=cumul){item={...allItems[j]};break}
      }
      item._isWinner=false;
    }
    stripItems.push(item);
  }

  strip.innerHTML=stripItems.map(it=>
    '<div class="crate-roulette-item'+(it._isWinner?' winner':'')+'">'+
      getCrateItemMediaHtml(it)+
      '<div class="crate-roulette-item-name">'+getCrateItemLabel(it)+'</div>'+
    '</div>'
  ).join('');

  const containerW=Math.min(window.innerWidth*.9,360);
  const itemW=120;
  const randomOffset=(Math.random()-.5)*60;
  const targetX=-(winPosition*itemW)+(containerW/2)-(itemW/2)+randomOffset;

  strip.style.transition='none';
  strip.style.transform='translateX(0)';
  void strip.offsetWidth;

  overlay.classList.add('show');

  let tickTimeout;
  const totalTicks=winPosition;
  let currentTick=0;

  function scheduleTick(){
    if(currentTick>=totalTicks) return;
    const progress=currentTick/totalTicks;
    let interval;
    if(progress<.15) interval=150-progress*600;
    else if(progress<.7) interval=50+Math.random()*15;
    else{const decel=(progress-.7)/.3;interval=60+decel*decel*300;}
    tickTimeout=setTimeout(()=>{
      playSound('tick');currentTick++;scheduleTick();
    },interval);
  }

  setTimeout(()=>{
    strip.style.transition='transform 5s cubic-bezier(.08,.82,.17,1)';
    strip.style.transform='translateX('+targetX+'px)';
    scheduleTick();

    setTimeout(()=>{
      clearTimeout(tickTimeout);
      playSound('win');
      const winEl=strip.querySelector('.crate-roulette-item.winner');
      if(winEl) winEl.style.background='radial-gradient(ellipse at center,rgba(35,108,217,.2),transparent)';

      const rarityNames={common:'Обычный',rare:'Редкий',epic:'Эпический',legendary:'Легендарный'};
      resultRarity.textContent=rarityNames[wonItem.rarity]||'Обычный';
      resultRarity.className='crate-result-rarity '+(wonItem.rarity||'common');
      resultText.textContent=rewardDesc||getCrateItemLabel(wonItem);
      if(compDesc) compText.textContent=compDesc;

      const hasMore=crateQueueIndex<crateQueue.length;
      if(hasMore){
        nextBtn.style.display='inline-block';
        nextBtn.textContent='Следующий ('+( crateQueue.length-crateQueueIndex)+')';
        collectBtn.style.display='inline-block';collectBtn.textContent='Забрать всё';
      } else {
        nextBtn.style.display='none';
        collectBtn.style.display='inline-block';collectBtn.textContent='Забрать';
      }

      result.classList.add('show');
      crateOpening=false;
      haptic('success');
    },5300);
  },400);
}

function closeCrateOverlay(){
  document.getElementById('crateOverlay').classList.remove('show');
  crateOpening=false;crateQueue=[];crateQueueIndex=0;crateQueueName='';
  refreshUser();loadInventory();
}

/* ===== HAPTIC ===== */
function haptic(type){
  try{if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type||'success');}catch(e){}
}

/* ===== TOAST ===== */
function showToast(msg,type){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{
    t.style.opacity='0';t.style.transform='translateX(-50%) translateY(6px)';
    t.style.transition='opacity .3s,transform .3s';
    setTimeout(()=>t.remove(),300);
  },2500);
}
