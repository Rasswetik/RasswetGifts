<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#090B11">
    <title>Rasswet Gifts - Топ</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-cyrillic-wght-normal.DqGufNeO.woff2) format("woff2-variations");unicode-range:U+301,U+400-45F,U+490-491,U+4B0-4B1,U+2116}
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-latin-wght-normal.Dx4kXJAl.woff2) format("woff2-variations");unicode-range:U+??,U+131,U+152-153,U+2BB-2BC,U+2C6,U+2DA,U+2DC,U+304,U+308,U+329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#090B11;
            --surface:#161923;
            --border:rgba(255,255,255,.05);
            --text:#fff;
            --text-2:#828AA4;
            --primary:#0098EA;
            --accent:#1EE44C;
            --gold:#FDA100;
        }
        body{
            font-family:'Inter Variable','Inter',-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }
        .header{
            position:fixed;top:env(safe-area-inset-top,0);left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:56px;padding:0 16px;
            background:rgba(9,11,17,.95);
            backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;
        }
        .header-title{font-size:18px;font-weight:700}
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,0) + 72px) 16px 100px;
        }
        .period{
            display:flex;align-items:center;justify-content:center;gap:12px;
            padding:16px;margin-bottom:20px;
            background:var(--surface);border:1px solid var(--border);
            border-radius:16px;text-align:center;
        }
        .period-label{font-size:12px;color:var(--text-2)}
        .period-time{font-size:20px;font-weight:700;color:var(--gold)}
        .prize-pool{
            text-align:center;margin-bottom:24px;
        }
        .prize-pool-label{font-size:12px;color:var(--text-2);margin-bottom:4px}
        .prize-pool-val{
            font-size:28px;font-weight:700;
            background:linear-gradient(90deg,var(--gold),#FFD700);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        }
        .top3{
            display:flex;justify-content:center;align-items:flex-end;gap:12px;
            margin-bottom:24px;
        }
        .top-card{
            flex:1;max-width:110px;
            background:var(--surface);border:1px solid var(--border);
            border-radius:16px;padding:16px 8px;
            text-align:center;
        }
        .top-card.first{
            order:2;
            background:linear-gradient(160deg,#3D3520,#1A1A14);
            border-color:rgba(253,161,0,.3);
            transform:scale(1.1);
        }
        .top-card.second{order:1}
        .top-card.third{order:3}
        .top-rank{
            width:28px;height:28px;margin:0 auto 8px;
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:14px;font-weight:700;
        }
        .first .top-rank{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000}
        .second .top-rank{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#000}
        .third .top-rank{background:linear-gradient(135deg,#CD7F32,#B87333);color:#fff}
        .top-avatar{
            width:50px;height:50px;border-radius:50%;
            background:rgba(255,255,255,.1);
            margin:0 auto 8px;overflow:hidden;
        }
        .top-avatar img{width:100%;height:100%;object-fit:cover}
        .top-name{font-size:12px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .top-score{font-size:11px;color:var(--gold);font-weight:700}
        .top-prize{font-size:10px;color:var(--accent);margin-top:4px}
        .list{display:flex;flex-direction:column;gap:8px}
        .list-item{
            display:flex;align-items:center;gap:12px;
            padding:12px 16px;
            background:var(--surface);border:1px solid var(--border);
            border-radius:14px;
        }
        .list-rank{
            width:28px;height:28px;border-radius:8px;
            background:rgba(255,255,255,.06);
            display:flex;align-items:center;justify-content:center;
            font-size:13px;font-weight:700;color:var(--text-2);
            flex-shrink:0;
        }
        .list-avatar{
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,.1);overflow:hidden;flex-shrink:0;
        }
        .list-avatar img{width:100%;height:100%;object-fit:cover}
        .list-info{flex:1;min-width:0}
        .list-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .list-score{font-size:11px;color:var(--text-2)}
        .list-prize{font-size:12px;font-weight:700;color:var(--accent)}
        .empty{text-align:center;padding:60px 20px;color:var(--text-2)}
        .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(9,11,17,.98);
            backdrop-filter:blur(16px);
            border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);
            transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.08)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">🏆 Топ игроков</div>
    </header>

    <main class="main">
        <div class="period" id="period">
            <span class="period-label">До конца сезона:</span>
            <span class="period-time" id="countdown">--:--:--</span>
        </div>

        <div class="prize-pool">
            <div class="prize-pool-label">Призовой фонд</div>
            <div class="prize-pool-val" id="prizePool">0 TON</div>
        </div>

        <div class="top3" id="top3"></div>

        <div class="list" id="leaderList"></div>
    </main>

    <nav class="bnav">
        <a href="/crash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            <span>Краш</span>
        </a>
        <a href="/cases">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            <span>Кейсы</span>
        </a>
        <a href="/leaderboard" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="/inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.setHeaderColor('#090B11');
            tg.setBackgroundColor('#090B11');
        }

        let endTime = null;

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                if (!data.success || !data.active) {
                    document.getElementById('top3').innerHTML = '';
                    document.getElementById('leaderList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Лидерборд пока не активен</p>
                        </div>
                    `;
                    return;
                }

                const config = data.config;
                const users = data.leaderboard || [];

                // Prize pool
                const totalPrize = (config.prizes || []).reduce((s, p) => s + (p.amount || 0), 0) / 100;
                document.getElementById('prizePool').textContent = totalPrize.toFixed(2) + ' TON';

                // End time
                if (config.end_time) {
                    endTime = new Date(config.end_time).getTime();
                    updateCountdown();
                }

                // Top 3
                const top3 = users.slice(0, 3);
                const prizes = config.prizes || [];
                document.getElementById('top3').innerHTML = top3.map((u, i) => {
                    const cls = i === 0 ? 'first' : i === 1 ? 'second' : 'third';
                    const prize = prizes[i] ? (prizes[i].amount / 100).toFixed(2) : '0';
                    return `
                        <div class="top-card ${cls}">
                            <div class="top-rank">${i + 1}</div>
                            <div class="top-avatar">
                                <img src="${u.avatar || '/static/img/avatar-default.png'}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                            </div>
                            <div class="top-name">${escapeHtml(u.display_name || 'Игрок')}</div>
                            <div class="top-score">${formatScore(u.score)}</div>
                            <div class="top-prize">+${prize} TON</div>
                        </div>
                    `;
                }).join('');

                // Rest of list
                const rest = users.slice(3, 20);
                document.getElementById('leaderList').innerHTML = rest.map((u, i) => {
                    const rank = i + 4;
                    const prize = prizes[rank - 1] ? (prizes[rank - 1].amount / 100).toFixed(2) : null;
                    return `
                        <div class="list-item">
                            <div class="list-rank">${rank}</div>
                            <div class="list-avatar">
                                <img src="${u.avatar || '/static/img/avatar-default.png'}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                            </div>
                            <div class="list-info">
                                <div class="list-name">${escapeHtml(u.display_name || 'Игрок')}</div>
                                <div class="list-score">${formatScore(u.score)} очков</div>
                            </div>
                            ${prize ? `<div class="list-prize">+${prize} TON</div>` : ''}
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('Leaderboard error:', e);
            }
        }

        function formatScore(score) {
            return Math.round(score || 0).toLocaleString('ru-RU');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateCountdown() {
            if (!endTime) return;
            const now = Date.now();
            const diff = Math.max(0, endTime - now);
            
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown').textContent = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        loadLeaderboard();
        setInterval(updateCountdown, 1000);
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
