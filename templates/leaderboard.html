<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1319">
    <title>Rasswet Gifts - Лидерборд</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/global.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-family:'LilitaOne';src:url('/static/fonts/lilitaone-regular-webfont.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;unicode-range:U+0000-024F,U+0300-036F,U+1E00-1EFF,U+2000-206F,U+2070-209F,U+20A0-20CF,U+2100-214F}

        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0f1319;
            --surface:rgba(255,255,255,.04);
            --border:rgba(255,255,255,.06);
            --text:#fff;
            --text-2:rgba(255,255,255,.45);
            --gold:#FDA100;
            --gold-glow:rgba(253,161,0,.35);
            --silver:#C0C0C0;
            --bronze:#CD7F32;
        }
        body{
            font-family:'LilitaOne','Inter Variable','Inter',-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:-1;
            background:
                radial-gradient(ellipse 500px 300px at 50% 0%,rgba(253,161,0,.06) 0%,transparent 70%),
                linear-gradient(180deg,#0f1319 0%,#0a0e14 100%);
        }

        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

        .header{display:none}
        
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,20px) + 5vh + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 90px);
        }

        /* Help tooltip */
        .help-tip{
            display:flex;align-items:center;gap:6px;
            justify-content:center;margin-bottom:6px;
            font-size:12px;color:var(--text-2);
            cursor:pointer;
        }
        .help-tip svg{width:14px;height:14px;opacity:.5}

        /* Page Title */
        .page-title{
            font-size:28px;font-weight:900;text-align:center;
            margin-bottom:8px;letter-spacing:-.5px;
        }
        .page-desc{
            text-align:center;color:var(--text-2);font-size:13px;
            line-height:1.5;margin-bottom:24px;
            max-width:340px;margin-left:auto;margin-right:auto;
        }
        .season-timer{
            display:inline-flex;align-items:center;gap:6px;
            font-size:13px;font-weight:700;color:var(--gold);
            margin-bottom:20px;text-align:center;width:100%;
            justify-content:center;
        }
        .season-timer svg{width:16px;height:16px;opacity:.7}

        /* ══════════════ PODIUM ══════════════ */
        .podium{
            display:flex;align-items:flex-end;justify-content:center;
            gap:0;margin-bottom:28px;padding:0 8px;
            position:relative;
        }

        .podium-slot{
            display:flex;flex-direction:column;align-items:center;
            flex:1;max-width:140px;position:relative;z-index:1;
        }

        /* ── Name ── */
        .podium-name{
            margin-bottom:6px;
            font-size:12px;font-weight:800;color:#fff;
            max-width:100%;overflow:hidden;
            text-overflow:ellipsis;white-space:nowrap;
            text-align:center;
        }
        .podium-slot.p1 .podium-name{font-size:14px}

        /* ── Avatar ── */
        .podium-avatar{
            border-radius:50%;overflow:hidden;
            background:rgba(255,255,255,.04);
            margin-bottom:0;position:relative;
        }
        .podium-slot.p1 .podium-avatar{
            width:110px;height:110px;
            border:3.5px solid var(--gold);
            box-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(253,161,0,.2);
        }
        .podium-slot.p2 .podium-avatar{
            width:80px;height:80px;
            border:3px solid var(--silver);
            box-shadow:0 0 20px rgba(192,192,192,.25);
        }
        .podium-slot.p3 .podium-avatar{
            width:80px;height:80px;
            border:3px solid var(--bronze);
            box-shadow:0 0 20px rgba(205,127,50,.25);
        }
        .podium-avatar img{width:100%;height:100%;object-fit:cover;display:block}

        /* ── Medal GIF ── */
        .podium-medal{
            margin-top:-16px;margin-bottom:-10px;
            position:relative;z-index:3;
        }
        .podium-medal img{
            width:64px;height:64px;object-fit:contain;
            filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
            animation:medalBounce 2.5s ease-in-out infinite;
        }
        .podium-slot.p1 .podium-medal img{
            width:80px;height:80px;
            filter:drop-shadow(0 6px 20px rgba(253,161,0,.5));
        }
        @keyframes medalBounce{
            0%,100%{transform:translateY(0) scale(1)}
            50%{transform:translateY(-4px) scale(1.03)}
        }

        /* ── Pedestal (3D-effect) ── */
        .podium-pedestal{
            width:100%;border-radius:14px 14px 0 0;
            display:flex;flex-direction:column;align-items:center;
            justify-content:flex-start;
            padding:14px 6px 14px;position:relative;
            margin-top:0;
            overflow:visible;
            transform:perspective(600px) rotateX(2deg);
            transform-origin:bottom center;
        }
        /* Top highlight strip */
        .podium-pedestal::before{
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            border-radius:14px 14px 0 0;
            background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,.35) 50%,transparent 95%);
            z-index:2;
        }
        /* Bottom shadow for depth */
        .podium-pedestal::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:50%;
            background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.25) 100%);
            pointer-events:none;border-radius:0;
        }
        /* Left/right side face illusion */
        .podium-pedestal-wrap{position:relative;width:100%}
        .podium-pedestal-wrap::before,
        .podium-pedestal-wrap::after{
            content:'';position:absolute;bottom:0;width:8px;
            pointer-events:none;z-index:-1;
        }
        .podium-pedestal-wrap::before{
            left:-6px;top:8px;
            background:linear-gradient(90deg,rgba(0,0,0,.3),rgba(0,0,0,.1));
            border-radius:4px 0 0 0;
            transform:skewY(-4deg);transform-origin:top right;
        }
        .podium-pedestal-wrap::after{
            right:-6px;top:8px;
            background:linear-gradient(270deg,rgba(0,0,0,.3),rgba(0,0,0,.1));
            border-radius:0 4px 0 0;
            transform:skewY(4deg);transform-origin:top left;
        }

        .podium-slot.p1 .podium-pedestal{
            height:140px;
            background:linear-gradient(180deg,rgba(253,190,19,.35) 0%,rgba(253,161,0,.18) 30%,rgba(253,161,0,.06) 100%);
            border:1px solid rgba(253,161,0,.3);border-bottom:none;
            box-shadow:inset 0 4px 20px rgba(253,161,0,.15),0 -6px 30px rgba(253,161,0,.12),0 8px 25px rgba(0,0,0,.4);
        }
        .podium-slot.p1 .podium-pedestal-wrap::before{background:linear-gradient(90deg,rgba(180,120,0,.3),rgba(180,120,0,.05))}
        .podium-slot.p1 .podium-pedestal-wrap::after{background:linear-gradient(270deg,rgba(180,120,0,.3),rgba(180,120,0,.05))}

        .podium-slot.p2 .podium-pedestal{
            height:100px;
            background:linear-gradient(180deg,rgba(192,192,192,.25) 0%,rgba(160,160,160,.10) 30%,rgba(160,160,160,.03) 100%);
            border:1px solid rgba(192,192,192,.2);border-bottom:none;
            box-shadow:inset 0 3px 15px rgba(192,192,192,.1),0 -4px 20px rgba(192,192,192,.08),0 8px 20px rgba(0,0,0,.35);
        }
        .podium-slot.p2 .podium-pedestal-wrap::before{background:linear-gradient(90deg,rgba(140,140,140,.25),rgba(140,140,140,.05))}
        .podium-slot.p2 .podium-pedestal-wrap::after{background:linear-gradient(270deg,rgba(140,140,140,.25),rgba(140,140,140,.05))}

        .podium-slot.p3 .podium-pedestal{
            height:80px;
            background:linear-gradient(180deg,rgba(205,127,50,.25) 0%,rgba(184,115,51,.10) 30%,rgba(184,115,51,.03) 100%);
            border:1px solid rgba(205,127,50,.2);border-bottom:none;
            box-shadow:inset 0 3px 12px rgba(205,127,50,.1),0 -4px 18px rgba(205,127,50,.08),0 8px 20px rgba(0,0,0,.35);
        }
        .podium-slot.p3 .podium-pedestal-wrap::before{background:linear-gradient(90deg,rgba(150,90,30,.25),rgba(150,90,30,.05))}
        .podium-slot.p3 .podium-pedestal-wrap::after{background:linear-gradient(270deg,rgba(150,90,30,.25),rgba(150,90,30,.05))}

        /* Prize inside pedestal */
        .podium-prize{margin-bottom:2px;position:relative;z-index:1}
        .podium-prize img{
            width:44px;height:44px;object-fit:contain;
            filter:drop-shadow(0 2px 10px rgba(0,0,0,.5));
        }
        .podium-slot.p1 .podium-prize img{
            width:58px;height:58px;
            filter:drop-shadow(0 4px 18px rgba(253,161,0,.5));
        }

        /* Turnover under prize */
        .podium-turnover{
            font-size:11px;font-weight:800;color:rgba(255,255,255,.7);
            display:flex;align-items:center;gap:3px;
            margin-top:4px;
            white-space:nowrap;position:relative;z-index:1;
        }
        .podium-slot.p1 .podium-turnover{font-size:12px;color:rgba(255,255,255,.85)}
        .podium-turnover img{width:12px;height:12px}

        /* ── Golden glow for #1 ── */
        .podium-slot.p1::before{
            content:'';position:absolute;
            top:-10px;left:50%;transform:translateX(-50%);
            width:140px;height:140px;border-radius:50%;
            background:radial-gradient(circle,rgba(253,161,0,.18) 0%,transparent 70%);
            z-index:-1;pointer-events:none;
            animation:goldPulse 3s ease-in-out infinite;
        }
        @keyframes goldPulse{
            0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}
            50%{opacity:1;transform:translateX(-50%) scale(1.1)}
        }

        /* ── Empty slot placeholder ── */
        .podium-empty{opacity:.2;pointer-events:none}
        .podium-empty .podium-pedestal{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.05)}

        /* ══════════════ LIST (#4+) ══════════════ */
        .leaders-list{display:flex;flex-direction:column;gap:8px}

        .leader-item{
            display:flex;align-items:center;gap:12px;
            padding:12px 14px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:14px;transition:all .15s;
        }
        .leader-item:active{transform:scale(.98)}

        .leader-rank{
            width:28px;flex-shrink:0;
            font-size:14px;font-weight:800;color:var(--text-2);
            text-align:center;
        }

        .leader-avatar{
            width:44px;height:44px;border-radius:50%;overflow:hidden;
            background:rgba(255,255,255,.04);flex-shrink:0;
            border:2px solid rgba(255,255,255,.08);
        }
        .leader-avatar img{width:100%;height:100%;object-fit:cover}

        .leader-info{flex:1;min-width:0}
        .leader-name{
            font-size:14px;font-weight:700;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            margin-bottom:2px;
        }
        .leader-turnover{
            display:flex;align-items:center;gap:4px;
            font-size:12px;color:var(--text-2);font-weight:600;
        }
        .leader-turnover img{width:12px;height:12px}

        .leader-prize{
            width:40px;height:40px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
        }
        .leader-prize img{
            width:34px;height:34px;object-fit:contain;
            filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));
        }

        /* Empty State */
        .empty{text-align:center;padding:60px 20px;color:var(--text-2)}
        .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}

        /* ══════════════ BOTTOM NAV ══════════════ */

        /* ══════════════ PROFILE CARD ══════════════ */
        .profile-overlay{
            position:fixed;inset:0;z-index:7000;
            background:rgba(0,0,0,.55);
            backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
            display:flex;align-items:flex-end;justify-content:center;
            opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
        }
        .profile-overlay.show{opacity:1;visibility:visible}
        .profile-card{
            width:100%;max-width:480px;
            max-height:75vh;overflow-y:auto;
            background:linear-gradient(180deg,#1a1f28 0%,#12161d 100%);
            border-radius:20px 20px 0 0;
            padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 20px);
            display:flex;flex-direction:column;align-items:center;
            transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
        }
        .profile-overlay.show .profile-card{transform:translateY(0)}
        .profile-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin-bottom:16px;flex-shrink:0}
        .profile-name{font-size:20px;font-weight:800;margin-bottom:4px;text-align:center}
        /* Level progress bar */
        .pc-level-wrap{width:100%;max-width:280px;margin-bottom:16px}
        .pc-level-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:4px}
        .pc-level-label span:first-child{color:rgba(253,161,0,.9);font-weight:700}
        .pc-level-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
        .pc-level-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#fda100,#ff6b00);transition:width .6s ease}
        .pc-level-text{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:3px}
        /* Stat rows */
        .pc-stat-rows{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
        .pc-stat-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 14px}
        .pc-stat-row img{width:22px;height:22px;flex-shrink:0}
        .pc-stat-row svg{width:22px;height:22px;flex-shrink:0}
        .pc-stat-row-label{font-size:12px;color:rgba(255,255,255,.45);font-weight:600}
        .pc-stat-row-val{margin-left:auto;font-size:14px;font-weight:800;color:#fff}
        /* Inventory */
        .profile-inv-title{font-size:14px;font-weight:700;color:rgba(255,255,255,.5);margin-top:4px;margin-bottom:8px;text-align:left;width:100%}
        .profile-inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
        .profile-inv-item{background:rgba(255,255,255,.04);border-radius:12px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;border:1.5px solid transparent}
        .profile-inv-item.upgraded{border-color:rgba(255,215,0,.35);background:linear-gradient(180deg,rgba(255,215,0,.06) 0%,rgba(255,140,0,.04) 100%);box-shadow:0 0 12px rgba(255,215,0,.08)}
        .profile-inv-img{width:72px;height:72px;object-fit:contain;margin-bottom:4px}
        .profile-inv-name{font-family:'Inter Variable','Inter',sans-serif;font-size:11px;color:rgba(255,255,255,.8);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;line-height:1.2}
        .profile-inv-price{font-family:'Inter Variable','Inter',sans-serif;font-size:11px;color:#1ee44c;font-weight:700;margin-top:2px}
        .profile-inv-upgraded{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1}
        .profile-close-btn{width:100%;padding:12px;border:none;border-radius:12px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-family:'Inter Variable','Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;flex-shrink:0;transition:background .2s}
        .profile-close-btn:active{background:rgba(255,255,255,.1)}

        /* ══════════════ LEADERBOARD INFO MODAL ══════════════ */
        .lead-info-overlay{
            position:fixed;inset:0;z-index:8000;
            background:rgba(0,0,0,.65);
            backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            display:flex;align-items:center;justify-content:center;
            opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
        }
        .lead-info-overlay.show{opacity:1;visibility:visible}
        .lead-info-card{
            width:calc(100% - 32px);max-width:400px;
            background:linear-gradient(180deg,#1e2330 0%,#161b26 100%);
            border-radius:20px;padding:0;overflow:hidden;
            transform:scale(.9);transition:transform .3s cubic-bezier(.32,.72,0,1);
        }
        .lead-info-overlay.show .lead-info-card{transform:scale(1)}
        .lead-info-img{width:100%;display:block;border-radius:20px 20px 0 0}
        .lead-info-close{
            width:calc(100% - 32px);margin:12px 16px 16px;padding:12px;
            border:none;border-radius:12px;background:rgba(255,255,255,.06);
            color:rgba(255,255,255,.6);font-family:'Inter Variable','Inter',sans-serif;
            font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;
        }
        .lead-info-close:active{background:rgba(255,255,255,.1)}

        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(15,19,25,.9);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-top:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.06)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}
    </style>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="help-tip" onclick="openLeadInfo()">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 16v-1m0-3a2 2 0 10-2-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="0.5"/></svg>
            Как попасть в лидерборд?
        </div>
        <div class="season-timer" id="countdown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span id="countdown-text">--:--:--</span>
        </div>
        <div class="page-title">Лидерборд игр</div>
        <div class="page-desc">Играйте в краш и крутите кейсы. Получайте призы, если попадёте в топ-15 по сумме ставок за месяц</div>

        <div class="podium" id="podium"></div>
        <div class="leaders-list" id="leadersList">
            <div class="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                </svg>
                <p>Лидерборд пока не активен</p>
            </div>
        </div>
    </main>

    <nav class="bnav">
        <a href="/crash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            <span>Краш</span>
        </a>
        <a href="/cases">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            <span>Кейсы</span>
        </a>
        <a href="/news">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
            <span>Новости</span>
        </a>
        <a href="/leaderboard" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="/inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.setHeaderColor('#0f1319');
            tg.setBackgroundColor('#0f1319');
        }

        let endTime = null;

        function getTonSvg(amount) {
            if (amount <= 25) return '/static/img/tons/ton_1.svg';
            if (amount <= 50) return '/static/img/tons/ton_2.svg';
            if (amount <= 100) return '/static/img/tons/ton_3.svg';
            if (amount <= 250) return '/static/img/tons/ton_4.svg';
            return '/static/img/tons/ton_5.svg';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                if (!data.success || !data.active) {
                    document.getElementById('podium').innerHTML = '';
                    document.getElementById('leadersList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Лидерборд пока не активен</p>
                        </div>`;
                    return;
                }

                const config = data.config;
                const users = data.leaderboard || [];
                const rewards = config.rewards || {};

                if (config.period_end) {
                    endTime = new Date(config.period_end).getTime();
                    updateCountdown();
                }

                if (users.length === 0) {
                    document.getElementById('podium').innerHTML = '';
                    document.getElementById('leadersList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Пока нет участников</p>
                        </div>`;
                    return;
                }

                // ═══ PODIUM (top 3) ═══
                const top3 = users.slice(0, Math.min(3, users.length));
                const podiumEl = document.getElementById('podium');

                function renderSlot(u, rank, pClass) {
                    const prize = u.reward || rewards[String(rank)];
                    const turnover = ((u.turnover || 0) / 100).toFixed(2);
                    const displayName = u.first_name || u.username || 'Игрок';
                    const avatar = u.photo_url || '/static/img/avatar-default.png';
                    const placeGif = `/static/gifs/place/${rank}.gif`;
                    let prizeHtml = '';
                    if (prize) {
                        if (prize.type === 'gift' && prize.gift_image) {
                            prizeHtml = `<div class="podium-prize"><img src="${prize.gift_image}" alt=""></div>`;
                        } else {
                            const tonAmt = typeof prize === 'number' ? prize : ((prize.amount || 0) / 100);
                            prizeHtml = `<div class="podium-prize"><img src="${getTonSvg(tonAmt)}" alt=""></div>`;
                        }
                    }
                    return `<div class="podium-slot ${pClass}" onclick="openProfileCard(${u.user_id || 0})" style="cursor:pointer">
                        <div class="podium-name">${escapeHtml(displayName)}</div>
                        <div class="podium-avatar">
                            <img src="${avatar}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                        </div>
                        <div class="podium-medal"><img src="${placeGif}" alt="${rank}"></div>
                        <div class="podium-pedestal-wrap"><div class="podium-pedestal">
                            ${prizeHtml}
                            <div class="podium-turnover">${turnover} TON</div>
                        </div></div>
                    </div>`;
                }

                if (top3.length >= 3) {
                    podiumEl.innerHTML =
                        renderSlot(top3[1], 2, 'p2') +
                        renderSlot(top3[0], 1, 'p1') +
                        renderSlot(top3[2], 3, 'p3');
                } else if (top3.length === 2) {
                    podiumEl.innerHTML =
                        renderSlot(top3[1], 2, 'p2') +
                        renderSlot(top3[0], 1, 'p1') +
                        '<div class="podium-slot p3 podium-empty"></div>';
                } else if (top3.length === 1) {
                    podiumEl.innerHTML =
                        '<div class="podium-slot p2 podium-empty"></div>' +
                        renderSlot(top3[0], 1, 'p1') +
                        '<div class="podium-slot p3 podium-empty"></div>';
                } else {
                    podiumEl.innerHTML = '';
                }

                // ═══ LIST (#4+) ═══
                const listStart = Math.min(3, top3.length);
                const rest = users.slice(listStart, 20);
                document.getElementById('leadersList').innerHTML = rest.map((u, i) => {
                    const rank = u.position || (listStart + i + 1);
                    const prize = u.reward || rewards[String(rank)];
                    const turnover = ((u.turnover || 0) / 100).toFixed(2);
                    const displayName = u.first_name || u.username || 'Игрок';
                    const avatar = u.photo_url || '/static/img/avatar-default.png';

                    let prizeImg = '';
                    if (prize) {
                        if (prize.type === 'gift' && prize.gift_image) {
                            prizeImg = `<img src="${prize.gift_image}" alt="${escapeHtml(prize.gift_name || '')}">`;
                        } else {
                            const tonAmount = typeof prize === 'number' ? prize : ((prize.amount || 0) / 100);
                            prizeImg = `<img src="${getTonSvg(tonAmount)}" alt="${tonAmount} TON">`;
                        }
                    }

                    return `<div class="leader-item" onclick="openProfileCard(${u.user_id || 0})" style="cursor:pointer">
                        <div class="leader-rank">${rank}</div>
                        <div class="leader-avatar">
                            <img src="${avatar}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                        </div>
                        <div class="leader-info">
                            <div class="leader-name">${escapeHtml(displayName)}</div>
                            <div class="leader-turnover">${turnover} TON</div>
                        </div>
                        ${prizeImg ? `<div class="leader-prize">${prizeImg}</div>` : ''}
                    </div>`;
                }).join('');

            } catch (e) {
                console.error('Leaderboard error:', e);
            }
        }

        function updateCountdown() {
            if (!endTime) {
                document.getElementById('countdown-text').textContent = '--:--:--';
                return;
            }
            const now = Date.now();
            const diff = Math.max(0, endTime - now);
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            if (d > 0) {
                document.getElementById('countdown-text').textContent = `Осталось ${d} дней и ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                document.getElementById('countdown-text').textContent = 
                    `Осталось ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }
        
        function openBoost() {
            window.location.href = '/cases';
        }

        loadLeaderboard();
        setInterval(updateCountdown, 1000);
        setInterval(loadLeaderboard, 30000);

        /* ============================================================
           LEADERBOARD INFO MODAL (lead.png)
           ============================================================ */
        (function(){
            var ov = document.createElement('div');
            ov.className = 'lead-info-overlay';
            ov.id = 'leadInfoOverlay';
            ov.innerHTML =
                '<div class="lead-info-card">' +
                    '<img class="lead-info-img" src="/static/img/lead.png" alt="Как выиграть приз">' +
                    '<button class="lead-info-close" onclick="closeLeadInfo()">Понятно</button>' +
                '</div>';
            document.body.appendChild(ov);
            ov.addEventListener('click', function(e){ if(e.target === ov) closeLeadInfo(); });
        })();
        function openLeadInfo(){
            document.getElementById('leadInfoOverlay').classList.add('show');
        }
        function closeLeadInfo(){
            document.getElementById('leadInfoOverlay').classList.remove('show');
        }

        /* ============================================================
           PROFILE CARD MODAL
           ============================================================ */
        (function(){
            var overlay = document.createElement('div');
            overlay.className = 'profile-overlay';
            overlay.id = 'profileOverlay';
            overlay.innerHTML =
                '<div class="profile-card" id="profileCard">' +
                    '<div class="profile-handle"></div>' +
                    '<div class="profile-name" id="pcName">—</div>' +
                    '<div class="pc-level-wrap" id="pcLevelWrap">' +
                        '<div class="pc-level-label"><span id="pcLevelNum">Ур. 1</span><span id="pcLevelPct">0%</span></div>' +
                        '<div class="pc-level-bg"><div class="pc-level-fill" id="pcLevelFill" style="width:0%"></div></div>' +
                        '<div class="pc-level-text" id="pcLevelText">0 / 100 TON</div>' +
                    '</div>' +
                    '<div class="pc-stat-rows" id="pcStatRows"></div>' +
                    '<div class="profile-inv-title" id="pcInvTitle" style="display:none">Инвентарь</div>' +
                    '<div class="profile-inv-grid" id="pcInvGrid"></div>' +
                    '<button class="profile-close-btn" onclick="closeProfileCard()">Закрыть</button>' +
                '</div>';
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e){ if(e.target === overlay) closeProfileCard(); });
        })();

        function closeProfileCard(){
            var o = document.getElementById('profileOverlay');
            if(o) o.classList.remove('show');
        }

        var _pcLoading = false;
        function openProfileCard(userId){
            if(!userId || userId <= 0 || _pcLoading) return;
            _pcLoading = true;
            var o = document.getElementById('profileOverlay');
            document.getElementById('pcName').textContent = 'Загрузка…';
            document.getElementById('pcStatRows').innerHTML = '';
            document.getElementById('pcInvGrid').innerHTML = '';
            document.getElementById('pcInvTitle').style.display = 'none';
            document.getElementById('pcLevelFill').style.width = '0%';
            document.getElementById('pcLevelText').textContent = '';
            document.getElementById('pcLevelNum').textContent = '';
            document.getElementById('pcLevelPct').textContent = '';
            o.classList.add('show');

            fetch('/api/user-profile/' + userId)
                .then(function(r){ return r.json(); })
                .then(function(d){
                    _pcLoading = false;
                    if(!d.success || !d.profile){ document.getElementById('pcName').textContent = 'Не найден'; return; }
                    var p = d.profile;
                    document.getElementById('pcName').textContent = p.first_name || 'User';

                    /* Level bar */
                    var pct = Math.min(Math.max(p.level_progress || 0, 0), 100);
                    document.getElementById('pcLevelNum').textContent = 'Ур. ' + p.level;
                    document.getElementById('pcLevelPct').textContent = Math.round(pct) + '%';
                    document.getElementById('pcLevelFill').style.width = pct + '%';
                    var expCur = ((p.experience || 0) / 100).toFixed(1);
                    var expNext = ((p.next_level_exp || 0) / 100).toFixed(1);
                    document.getElementById('pcLevelText').textContent = expCur + ' / ' + expNext + ' TON';

                    /* Stat rows */
                    var tonTotal = (p.total_volume / 100).toFixed(2);
                    var tonMonth = (p.monthly_turnover / 100).toFixed(2);
                    var cupSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#fda100" stroke-width="2" style="width:22px;height:22px"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M18 2H6v7a6 6 0 0012 0V2z"/></svg>';

                    document.getElementById('pcStatRows').innerHTML =
                        '<div class="pc-stat-row">' +
                            '<img src="/static/img/ton.png" alt="">' +
                            '<span class="pc-stat-row-label">Общий оборот</span>' +
                            '<span class="pc-stat-row-val">' + tonTotal + ' TON</span>' +
                        '</div>' +
                        '<div class="pc-stat-row">' +
                            '<img src="/static/img/ton.png" alt="">' +
                            '<span class="pc-stat-row-label">Оборот за месяц</span>' +
                            '<span class="pc-stat-row-val">' + tonMonth + ' TON</span>' +
                        '</div>' +
                        '<div class="pc-stat-row">' +
                            cupSvg +
                            '<span class="pc-stat-row-label">Место в рейтинге</span>' +
                            '<span class="pc-stat-row-val">#' + p.rank + '</span>' +
                        '</div>';

                    /* Inventory */
                    var inv = p.inventory || [];
                    if(inv.length){
                        document.getElementById('pcInvTitle').style.display = '';
                        var h = '';
                        for(var i=0;i<inv.length;i++){
                            var it = inv[i];
                            var price = (it.value / 100).toFixed(2);
                            var cls = 'profile-inv-item' + (it.is_upgraded ? ' upgraded' : '');
                            h += '<div class="' + cls + '">';
                            if(it.is_upgraded) h += '<div class="profile-inv-upgraded">⬆</div>';
                            h += '<img class="profile-inv-img" src="' + it.image + '" alt="">';
                            h += '<div class="profile-inv-name">' + it.name + '</div>';
                            h += '<div class="profile-inv-price">' + price + ' TON</div>';
                            h += '</div>';
                        }
                        document.getElementById('pcInvGrid').innerHTML = h;
                    }
                })
                .catch(function(){ _pcLoading = false; document.getElementById('pcName').textContent = 'Ошибка'; });
        }
    </script>
</body>
</html>
