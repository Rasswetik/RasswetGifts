<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1A1E2A">
    <title>Rasswet Gifts - Сезон</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/global.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-cyrillic-wght-normal.DqGufNeO.woff2) format("woff2-variations");unicode-range:U+301,U+400-45F,U+490-491,U+4B0-4B1,U+2116}
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-latin-wght-normal.Dx4kXJAl.woff2) format("woff2-variations");unicode-range:U+??,U+131,U+152-153,U+2BB-2BC,U+2C6,U+2DA,U+2DC,U+304,U+308,U+329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#1A1E2A;
            --surface:#242936;
            --border:rgba(255,255,255,.06);
            --text:#fff;
            --text-2:rgba(255,255,255,.5);
            --primary:#0098EA;
            --accent:#1EE44C;
            --gold:#FDA100;
        }
        body{
            font-family:'Inter Variable','Inter',-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:linear-gradient(180deg,#12151C 0%,#1A1E2A 50%,#0E1017 100%);
            z-index:-1;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:rgba(255,255,255,.02);border-radius:3px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}

        .header{
            position:fixed;top:env(safe-area-inset-top,0);left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:56px;padding:0 16px;
            background:rgba(26,30,42,.85);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;justify-content:center;
        }
        .header-title{font-size:18px;font-weight:700}
        
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,0) + 72px) 16px 100px;
        }
        
        /* Season Banner */
        .season-banner{
            position:relative;
            border-radius:20px;
            overflow:hidden;
            margin:0 0 16px;
            background:linear-gradient(135deg,#1A3050,#0D1524);
            border:none;
            height:180px;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0;
        }
        .season-banner img{
            width:100%;
            height:100%;
            object-fit:cover;
            filter:none;
        }
        .season-timer{
            position:absolute;
            top:16px;
            right:16px;
            font-size:14px;
            font-weight:700;
            color:var(--gold);
            text-shadow:0 0 12px rgba(253,161,0,.4);
        }
        
        /* Boost Button */
        .boost-btn{
            width:100%;
            padding:16px;
            border-radius:14px;
            border:none;
            background:linear-gradient(90deg,#0098EA,#0077CC);
            color:#fff;
            font-family:inherit;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
            margin-bottom:20px;
            transition:all .2s;
        }
        .boost-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,152,234,.3)}
        
        /* Leaderboard List */
        .leaders-list{display:flex;flex-direction:column;gap:8px}
        
        .leader-item{
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 14px;
            background:rgba(255,255,255,.04);
            border:none;
            border-radius:14px;
            transition:all .2s;
        }
        .leader-item:hover{background:rgba(255,255,255,.08)}
        
        /* Top 3 special styles */
        .leader-item.rank-1{
            background:linear-gradient(135deg,rgba(253,190,19,.15),rgba(253,161,0,.05));
            border:none;
        }
        .leader-item.rank-2{
            background:linear-gradient(135deg,rgba(192,192,192,.15),rgba(160,160,160,.05));
            border:none;
        }
        .leader-item.rank-3{
            background:linear-gradient(135deg,rgba(205,127,50,.15),rgba(184,115,51,.05));
            border:none;
        }
        
        /* Rank Badge */
        .leader-rank{
            width:32px;
            height:32px;
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .leader-rank img{
            width:28px;
            height:28px;
            object-fit:contain;
        }
        .leader-rank span{
            font-size:14px;
            font-weight:700;
            color:var(--text-2);
        }
        
        /* Avatar */
        .leader-avatar{
            width:44px;
            height:44px;
            border-radius:50%;
            overflow:hidden;
            background:rgba(255,255,255,.04);
            flex-shrink:0;
            border:2px solid rgba(255,255,255,.1);
        }
        .leader-item.rank-1 .leader-avatar{border-color:rgba(253,161,0,.5)}
        .leader-item.rank-2 .leader-avatar{border-color:rgba(160,160,160,.5)}
        .leader-item.rank-3 .leader-avatar{border-color:rgba(184,115,51,.5)}
        .leader-avatar img{width:100%;height:100%;object-fit:cover}
        
        /* Info */
        .leader-info{flex:1;min-width:0}
        .leader-name{
            font-size:14px;
            font-weight:700;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            margin-bottom:4px;
        }
        .leader-stats{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:12px;
            color:var(--text-2);
        }
        .leader-turnover{
            display:flex;
            align-items:center;
            gap:4px;
        }
        .leader-turnover img{width:12px;height:12px}
        .leader-turnover span{font-weight:600}
        
        .leader-separator{
            width:1px;
            height:14px;
            background:rgba(255,255,255,.15);
        }
        
        .leader-level{
            display:flex;
            align-items:center;
            gap:4px;
            color:var(--accent);
            font-weight:700;
        }
        
        /* Prize */
        .leader-prize{
            width:44px;
            height:44px;
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .leader-prize img{
            width:36px;
            height:36px;
            object-fit:contain;
            filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
        }
        
        /* Empty State */
        .empty{text-align:center;padding:60px 20px;color:var(--text-2)}
        .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
        
        /* Bottom Nav */
        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(26,30,42,.85);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-top:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);
            transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.06)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">Сезон</div>
    </header>

    <main class="main">
        <!-- Season Banner with Mascot -->
        <div class="season-banner">
            <img src="/static/img/lead.png" alt="" onerror="this.src='/static/img/logo.png'">
            <div class="season-timer" id="countdown">--:--:--</div>
        </div>
        
        <button class="boost-btn" onclick="openBoost()">Boost your rank</button>
        
        <div class="leaders-list" id="leadersList">
            <div class="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                </svg>
                <p>Лидерборд пока не активен</p>
            </div>
        </div>
    </main>

    <nav class="bnav">
        <a href="/crash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            <span>Краш</span>
        </a>
        <a href="/cases">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            <span>Кейсы</span>
        </a>
        <a href="/news">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
            <span>Новости</span>
        </a>
        <a href="/leaderboard" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="/inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.setHeaderColor('#1A1E2A');
            tg.setBackgroundColor('#1A1E2A');
        }

        let endTime = null;

        // Get appropriate TON SVG based on amount
        function getTonSvg(amount) {
            if (amount <= 25) return '/static/img/tons/ton_1.svg';
            if (amount <= 50) return '/static/img/tons/ton_2.svg';
            if (amount <= 100) return '/static/img/tons/ton_3.svg';
            if (amount <= 250) return '/static/img/tons/ton_4.svg';
            return '/static/img/tons/ton_5.svg';
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                if (!data.success || !data.active) {
                    document.getElementById('leadersList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Лидерборд пока не активен</p>
                        </div>
                    `;
                    return;
                }

                const config = data.config;
                const users = data.leaderboard || [];
                const rewards = config.rewards || {};

                // End time
                if (config.period_end) {
                    endTime = new Date(config.period_end).getTime();
                    updateCountdown();
                }

                // Render all users
                document.getElementById('leadersList').innerHTML = users.slice(0, 20).map((u, i) => {
                    const rank = u.position || (i + 1);
                    const prize = u.reward || rewards[String(rank)];
                    const rankClass = rank <= 3 ? `rank-${rank}` : '';
                    
                    // Rank badge: 1.gif, 2.gif, 3.gif for top 3, numbers for rest
                    let rankBadge;
                    if (rank <= 3) {
                        rankBadge = `<img src="/static/gifs/place/${rank}.gif" alt="${rank}" onerror="this.outerHTML='<span>#${rank}</span>'">`;
                    } else {
                        rankBadge = `<span>#${rank}</span>`;
                    }
                    
                    // Prize image: gift or TON
                    let prizeImg = '';
                    if (prize) {
                        if (prize.type === 'gift' && prize.gift_image) {
                            prizeImg = `<img src="${prize.gift_image}" alt="${prize.gift_name || ''}">`;
                        } else {
                            const tonAmount = typeof prize === 'number' ? prize : ((prize.amount || 0) / 100);
                            prizeImg = `<img src="${getTonSvg(tonAmount)}" alt="${tonAmount} TON">`;
                        }
                    }
                    
                    // Score/turnover in TON
                    const turnover = ((u.turnover || 0) / 100).toFixed(2);
                    const displayName = u.first_name || u.username || 'Игрок';
                    const avatar = u.photo_url || '/static/img/avatar-default.png';
                    
                    return `
                        <div class="leader-item ${rankClass}">
                            <div class="leader-rank">${rankBadge}</div>
                            <div class="leader-avatar">
                                <img src="${avatar}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                            </div>
                            <div class="leader-info">
                                <div class="leader-name">${escapeHtml(displayName)}</div>
                                <div class="leader-stats">
                                    <div class="leader-turnover">
                                        <img src="/static/img/ton.png" alt="">
                                        <span>${turnover}</span>
                                    </div>
                                </div>
                            </div>
                            ${prizeImg ? `<div class="leader-prize">${prizeImg}</div>` : ''}
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('Leaderboard error:', e);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateCountdown() {
            if (!endTime) {
                document.getElementById('countdown').textContent = '--:--:--';
                return;
            }
            const now = Date.now();
            const diff = Math.max(0, endTime - now);
            
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            if (d > 0) {
                document.getElementById('countdown').textContent = `${d}d ${h}h ${m}m ${s}s`;
            } else {
                document.getElementById('countdown').textContent = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }
        
        function openBoost() {
            window.location.href = '/cases';
        }

        loadLeaderboard();
        setInterval(updateCountdown, 1000);
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
