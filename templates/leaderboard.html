<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1319">
    <title>Rasswet Gifts - Лидерборд</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/global.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-cyrillic-wght-normal.DqGufNeO.woff2) format("woff2-variations");unicode-range:U+301,U+400-45F,U+490-491,U+4B0-4B1,U+2116}
        @font-face{font-display:swap;font-family:'Inter Variable';font-style:normal;font-weight:100 900;src:url(/static/fonts/inter-latin-wght-normal.Dx4kXJAl.woff2) format("woff2-variations");unicode-range:U+??,U+131,U+152-153,U+2BB-2BC,U+2C6,U+2DA,U+2DC,U+304,U+308,U+329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0f1319;
            --surface:rgba(255,255,255,.04);
            --border:rgba(255,255,255,.06);
            --text:#fff;
            --text-2:rgba(255,255,255,.45);
            --gold:#FDA100;
            --gold-glow:rgba(253,161,0,.35);
            --silver:#C0C0C0;
            --bronze:#CD7F32;
        }
        body{
            font-family:'Inter Variable','Inter',-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:-1;
            background:
                radial-gradient(ellipse 500px 300px at 50% 0%,rgba(253,161,0,.06) 0%,transparent 70%),
                linear-gradient(180deg,#0f1319 0%,#0a0e14 100%);
        }

        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

        .header{display:none}
        
        .main{
            max-width:480px;margin:0 auto;
            padding:calc(env(safe-area-inset-top,20px) + 5vh + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 90px);
        }

        /* Help tooltip */
        .help-tip{
            display:flex;align-items:center;gap:6px;
            justify-content:center;margin-bottom:6px;
            font-size:12px;color:var(--text-2);
            cursor:pointer;
        }
        .help-tip svg{width:14px;height:14px;opacity:.5}

        /* Page Title */
        .page-title{
            font-size:28px;font-weight:900;text-align:center;
            margin-bottom:8px;letter-spacing:-.5px;
        }
        .page-desc{
            text-align:center;color:var(--text-2);font-size:13px;
            line-height:1.5;margin-bottom:24px;
            max-width:340px;margin-left:auto;margin-right:auto;
        }
        .season-timer{
            display:inline-flex;align-items:center;gap:6px;
            font-size:13px;font-weight:700;color:var(--gold);
            margin-bottom:20px;text-align:center;width:100%;
            justify-content:center;
        }
        .season-timer svg{width:16px;height:16px;opacity:.7}

        /* ══════════════ PODIUM ══════════════ */
        .podium{
            display:flex;align-items:flex-end;justify-content:center;
            gap:0;margin-bottom:28px;padding:0 8px;
            position:relative;
        }

        .podium-slot{
            display:flex;flex-direction:column;align-items:center;
            flex:1;max-width:140px;position:relative;z-index:1;
        }

        /* ── Name above avatar ── */
        .podium-name{
            font-size:12px;font-weight:700;color:#fff;
            max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            margin-bottom:8px;text-align:center;
        }

        /* ── Rank badge (medal circle) ── */
        .podium-badge{
            position:absolute;z-index:5;
            width:28px;height:28px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:13px;font-weight:900;color:#fff;
            border:2.5px solid var(--bg);
        }
        .podium-slot.p1 .podium-badge{
            top:-14px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,#FFD700,#FDA100);
            box-shadow:0 2px 12px rgba(253,161,0,.6);
        }
        .podium-slot.p2 .podium-badge{
            top:-14px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,#D4D4D4,#9E9E9E);
            box-shadow:0 2px 10px rgba(192,192,192,.5);
        }
        .podium-slot.p3 .podium-badge{
            top:-14px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,#E8A854,#CD7F32);
            box-shadow:0 2px 10px rgba(205,127,50,.5);
        }

        /* ── Avatar ── */
        .podium-avatar{
            border-radius:50%;overflow:hidden;
            background:rgba(255,255,255,.04);
            margin-bottom:10px;position:relative;
        }
        .podium-slot.p1 .podium-avatar{
            width:96px;height:96px;
            border:3.5px solid var(--gold);
            box-shadow:0 0 36px var(--gold-glow),0 0 72px rgba(253,161,0,.2);
        }
        .podium-slot.p2 .podium-avatar{
            width:72px;height:72px;
            border:3px solid var(--silver);
            box-shadow:0 0 16px rgba(192,192,192,.2);
        }
        .podium-slot.p3 .podium-avatar{
            width:72px;height:72px;
            border:3px solid var(--bronze);
            box-shadow:0 0 16px rgba(205,127,50,.2);
        }
        .podium-avatar img{width:100%;height:100%;object-fit:cover;display:block}

        /* ── Pedestal ── */
        .podium-pedestal{
            width:100%;border-radius:16px 16px 0 0;
            display:flex;flex-direction:column;align-items:center;
            padding:12px 8px 16px;position:relative;
        }
        .podium-slot.p1 .podium-pedestal{
            height:110px;
            background:linear-gradient(180deg,rgba(253,190,19,.22),rgba(253,161,0,.06));
            border:1px solid rgba(253,161,0,.25);border-bottom:none;
        }
        .podium-slot.p2 .podium-pedestal{
            height:76px;
            background:linear-gradient(180deg,rgba(192,192,192,.12),rgba(160,160,160,.03));
            border:1px solid rgba(192,192,192,.15);border-bottom:none;
        }
        .podium-slot.p3 .podium-pedestal{
            height:60px;
            background:linear-gradient(180deg,rgba(205,127,50,.12),rgba(184,115,51,.03));
            border:1px solid rgba(205,127,50,.15);border-bottom:none;
        }

        /* Prize inside pedestal */
        .podium-prize{margin-bottom:4px}
        .podium-prize img{
            width:36px;height:36px;object-fit:contain;
            filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));
        }
        .podium-slot.p1 .podium-prize img{width:52px;height:52px;filter:drop-shadow(0 4px 16px rgba(253,161,0,.5))}

        /* Turnover under pedestal */
        .podium-turnover{
            font-size:11px;font-weight:700;color:rgba(255,255,255,.65);
            display:flex;align-items:center;gap:3px;
            margin-top:8px;
            white-space:nowrap;
        }
        .podium-turnover img{width:12px;height:12px}

        /* ── Golden glow for #1 ── */
        .podium-slot.p1::before{
            content:'';position:absolute;
            top:-20px;left:50%;transform:translateX(-50%);
            width:120px;height:120px;border-radius:50%;
            background:radial-gradient(circle,rgba(253,161,0,.15) 0%,transparent 70%);
            z-index:-1;pointer-events:none;
            animation:goldPulse 3s ease-in-out infinite;
        }
        @keyframes goldPulse{
            0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}
            50%{opacity:1;transform:translateX(-50%) scale(1.1)}
        }

        /* ══════════════ LIST (#4+) ══════════════ */
        .leaders-list{display:flex;flex-direction:column;gap:8px}

        .leader-item{
            display:flex;align-items:center;gap:12px;
            padding:12px 14px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:14px;transition:all .15s;
        }
        .leader-item:active{transform:scale(.98)}

        .leader-rank{
            width:28px;flex-shrink:0;
            font-size:14px;font-weight:800;color:var(--text-2);
            text-align:center;
        }

        .leader-avatar{
            width:44px;height:44px;border-radius:50%;overflow:hidden;
            background:rgba(255,255,255,.04);flex-shrink:0;
            border:2px solid rgba(255,255,255,.08);
        }
        .leader-avatar img{width:100%;height:100%;object-fit:cover}

        .leader-info{flex:1;min-width:0}
        .leader-name{
            font-size:14px;font-weight:700;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            margin-bottom:2px;
        }
        .leader-turnover{
            display:flex;align-items:center;gap:4px;
            font-size:12px;color:var(--text-2);font-weight:600;
        }
        .leader-turnover img{width:12px;height:12px}

        .leader-prize{
            width:40px;height:40px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
        }
        .leader-prize img{
            width:34px;height:34px;object-fit:contain;
            filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));
        }

        /* Empty State */
        .empty{text-align:center;padding:60px 20px;color:var(--text-2)}
        .empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}

        /* ══════════════ BOTTOM NAV ══════════════ */
        .bnav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);
            z-index:100;width:100%;max-width:480px;
            height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0) + 8px);
            background:rgba(15,19,25,.9);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-top:1px solid rgba(255,255,255,.05);
            display:flex;align-items:center;justify-content:space-around;
        }
        .bnav a{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:8px 16px;border-radius:12px;
            text-decoration:none;color:var(--text-2);transition:all .2s;
        }
        .bnav a.active{color:var(--text);background:rgba(255,255,255,.06)}
        .bnav a svg{width:24px;height:24px}
        .bnav a span{font-size:10px;font-weight:600}
    </style>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="help-tip" onclick="alert('Играйте в краш или открывайте кейсы — сумма ваших ставок за месяц определяет место в топе. Топ-15 получают призы!')">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 16v-1m0-3a2 2 0 10-2-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="0.5"/></svg>
            Как попасть в лидерборд?
        </div>
        <div class="season-timer" id="countdown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span id="countdown-text">--:--:--</span>
        </div>
        <div class="page-title">Лидерборд игр</div>
        <div class="page-desc">Играйте в краш и крутите кейсы. Получайте призы, если попадёте в топ-15 по сумме ставок за месяц</div>

        <div class="podium" id="podium"></div>
        <div class="leaders-list" id="leadersList">
            <div class="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                </svg>
                <p>Лидерборд пока не активен</p>
            </div>
        </div>
    </main>

    <nav class="bnav">
        <a href="/crash">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
            <span>Краш</span>
        </a>
        <a href="/cases">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            <span>Кейсы</span>
        </a>
        <a href="/news">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
            <span>Новости</span>
        </a>
        <a href="/leaderboard" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
            <span>Топ</span>
        </a>
        <a href="/inventory">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.setHeaderColor('#0f1319');
            tg.setBackgroundColor('#0f1319');
        }

        let endTime = null;

        function getTonSvg(amount) {
            if (amount <= 25) return '/static/img/tons/ton_1.svg';
            if (amount <= 50) return '/static/img/tons/ton_2.svg';
            if (amount <= 100) return '/static/img/tons/ton_3.svg';
            if (amount <= 250) return '/static/img/tons/ton_4.svg';
            return '/static/img/tons/ton_5.svg';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                if (!data.success || !data.active) {
                    document.getElementById('podium').innerHTML = '';
                    document.getElementById('leadersList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Лидерборд пока не активен</p>
                        </div>`;
                    return;
                }

                const config = data.config;
                const users = data.leaderboard || [];
                const rewards = config.rewards || {};

                if (config.period_end) {
                    endTime = new Date(config.period_end).getTime();
                    updateCountdown();
                }

                if (users.length === 0) {
                    document.getElementById('podium').innerHTML = '';
                    document.getElementById('leadersList').innerHTML = `
                        <div class="empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                            </svg>
                            <p>Пока нет участников</p>
                        </div>`;
                    return;
                }

                // ═══ PODIUM (top 3) ═══
                const top3 = users.slice(0, Math.min(3, users.length));
                const podiumEl = document.getElementById('podium');
                if (top3.length >= 3) {
                    // Order: #2 left, #1 center, #3 right
                    const order = [top3[1], top3[0], top3[2]];
                    const pClasses = ['p2', 'p1', 'p3'];

                    podiumEl.innerHTML = order.map((u, idx) => {
                        const rank = u.position || (idx === 1 ? 1 : idx === 0 ? 2 : 3);
                        const turnover = ((u.turnover || 0) / 100).toFixed(2);
                        const displayName = u.first_name || u.username || 'Игрок';
                        const avatar = u.photo_url || '/static/img/avatar-default.png';

                        // Use place GIFs for top 3
                        const placeGif = `/static/gifs/place/${rank}.gif`;
                        const prizeHtml = `<div class="podium-prize"><img src="${placeGif}" alt="${rank} место"></div>`;

                        return `<div class="podium-slot ${pClasses[idx]}">
                            <div class="podium-badge">${rank}</div>
                            <div class="podium-name">${escapeHtml(displayName)}</div>
                            <div class="podium-avatar">
                                <img src="${avatar}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                            </div>
                            <div class="podium-pedestal">
                                ${prizeHtml}
                                <div class="podium-turnover">${turnover} TON</div>
                            </div>
                        </div>`;
                    }).join('');
                } else if (top3.length > 0) {
                    // 1-2 users: show them as list items instead of podium
                    podiumEl.innerHTML = '';
                } else {
                    podiumEl.innerHTML = '';
                }

                // ═══ LIST ═══
                const listStart = top3.length >= 3 ? 3 : 0;
                const rest = users.slice(listStart, 20);
                document.getElementById('leadersList').innerHTML = rest.map((u, i) => {
                    const rank = u.position || (i + 4);
                    const prize = u.reward || rewards[String(rank)];
                    const turnover = ((u.turnover || 0) / 100).toFixed(2);
                    const displayName = u.first_name || u.username || 'Игрок';
                    const avatar = u.photo_url || '/static/img/avatar-default.png';

                    let prizeImg = '';
                    if (prize) {
                        if (prize.type === 'gift' && prize.gift_image) {
                            prizeImg = `<img src="${prize.gift_image}" alt="${escapeHtml(prize.gift_name || '')}">`;
                        } else {
                            const tonAmount = typeof prize === 'number' ? prize : ((prize.amount || 0) / 100);
                            prizeImg = `<img src="${getTonSvg(tonAmount)}" alt="${tonAmount} TON">`;
                        }
                    }

                    return `<div class="leader-item">
                        <div class="leader-rank">${rank}</div>
                        <div class="leader-avatar">
                            <img src="${avatar}" alt="" onerror="this.src='/static/img/avatar-default.png'">
                        </div>
                        <div class="leader-info">
                            <div class="leader-name">${escapeHtml(displayName)}</div>
                            <div class="leader-turnover">${turnover} TON</div>
                        </div>
                        ${prizeImg ? `<div class="leader-prize">${prizeImg}</div>` : ''}
                    </div>`;
                }).join('');

            } catch (e) {
                console.error('Leaderboard error:', e);
            }
        }

        function updateCountdown() {
            if (!endTime) {
                document.getElementById('countdown-text').textContent = '--:--:--';
                return;
            }
            const now = Date.now();
            const diff = Math.max(0, endTime - now);
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            if (d > 0) {
                document.getElementById('countdown-text').textContent = `Осталось ${d} дней и ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else {
                document.getElementById('countdown-text').textContent = 
                    `Осталось ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }
        
        function openBoost() {
            window.location.href = '/cases';
        }

        loadLeaderboard();
        setInterval(updateCountdown, 1000);
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
