<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0E1015">
    <title>Rasswet Gifts</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/telegram-auth.js"></script>
    <style>
        @font-face{font-family:'LilitaOne';src:url('/static/fonts/lilitaone-regular-webfont.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;unicode-range:U+0000-024F,U+0300-036F,U+1E00-1EFF,U+2000-206F,U+2070-209F,U+20A0-20CF,U+2100-214F}
        @font-face{font-family:'LilitaOne';src:url('/static/fonts/LilitaOne_BSS.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;unicode-range:U+0400-04FF,U+0500-052F,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F}

        *{margin:0;padding:0;box-sizing:border-box}
        html{font-synthesis:none;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
        body{
            font-family:'LilitaOne','Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0E1015;color:#fff;min-height:100vh;overflow-x:hidden;
            display:flex;align-items:center;justify-content:center;
        }
        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:
                radial-gradient(circle at 20% 50%,rgba(140,150,170,.04) 0%,transparent 50%),
                radial-gradient(circle at 80% 50%,rgba(140,150,170,.03) 0%,transparent 50%);
            z-index:0;pointer-events:none;
        }
        .container{max-width:480px;width:100%;margin:0 auto;padding:calc(env(safe-area-inset-top,20px) + 30px + 5vh) 20px 30px;display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;z-index:1}

        .menu-title{text-align:center;margin-bottom:20px}
        .menu-title h1{font-size:38px;font-weight:900;letter-spacing:1.5px;background:linear-gradient(135deg,#8CA0BE,#A0B0C4,#C8D0DC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
        .menu-title p{color:rgba(255,255,255,.4);font-size:14px;font-weight:500}

        .menu-button{
            position:relative;width:100%;border:none;border-radius:20px;cursor:pointer;
            overflow:hidden;transition:all .3s cubic-bezier(.175,.885,.32,1.275);
            backdrop-filter:blur(20px);
            box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
            opacity:0;transform:translateY(30px);animation:btnAppear .6s ease forwards;
        }
        .menu-button:nth-child(1){animation-delay:.05s}
        .menu-button:nth-child(2){animation-delay:.1s}
        .menu-button:nth-child(3){animation-delay:.15s}
        .menu-button:nth-child(4){animation-delay:.2s}
        .menu-button:nth-child(5){animation-delay:.25s}
        @keyframes btnAppear{to{opacity:1;transform:translateY(0)}}

        .menu-button.big{height:140px}
        .menu-button.small{height:110px}

        .menu-button.disabled{cursor:not-allowed;opacity:.5;filter:grayscale(.8)}
        .menu-button.disabled:hover{transform:none!important;box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)!important}

        .menu-button:not(.disabled):hover{transform:translateY(-6px) scale(1.02);box-shadow:0 20px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)}
        .menu-button:not(.disabled):active{transform:translateY(-2px) scale(.98);transition:transform .1s}

        /* Button themes */
        .btn-crash{background:linear-gradient(135deg,rgba(107,122,141,.85),rgba(85,98,112,.9));border:1.5px solid rgba(140,160,190,.25)}
        .btn-profile{background:linear-gradient(135deg,rgba(100,115,135,.85),rgba(85,98,112,.85));border:1.5px solid rgba(140,160,190,.2)}
        .btn-disabled{background:linear-gradient(135deg,rgba(50,55,65,.8),rgba(40,44,52,.8));border:1.5px solid rgba(100,110,120,.15)}

        .button-content{display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:100%;width:100%;position:relative;z-index:2}
        .small .button-content{padding:0 28px}

        .button-text{font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.3)}
        .small .button-text{font-size:24px;letter-spacing:1.5px}
        .menu-button.disabled .button-text{color:rgba(255,255,255,.4)}

        .button-gif{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)) brightness(1.1);transition:all .4s}
        .small .button-gif{width:68px;height:68px}
        .menu-button:not(.disabled):hover .button-gif{transform:scale(1.15) rotate(8deg);filter:drop-shadow(0 6px 20px rgba(0,0,0,.7)) brightness(1.3)}
        .menu-button.disabled .button-gif{filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)) brightness(.5) saturate(.3) grayscale(.8)}

        .lock-icon{position:absolute;top:14px;right:14px;width:28px;height:28px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:3;border:1px solid rgba(255,255,255,.08)}
        .lock-icon img{width:16px;height:16px;opacity:.7}

        .notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.9);color:#fff;padding:15px 25px;border-radius:16px;border:1px solid rgba(255,255,255,.1);font-weight:700;font-size:15px;z-index:9999;backdrop-filter:blur(10px);opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:80%}
        .notif.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

        @media(max-width:480px){.menu-title h1{font-size:32px}.button-text{font-size:24px}.small .button-text{font-size:20px}.menu-button.big{height:125px}.menu-button.small{height:100px}.button-gif{width:70px;height:70px}.small .button-gif{width:60px;height:60px}}
        @media(max-width:360px){.menu-title h1{font-size:28px}.button-text{font-size:20px}.small .button-text{font-size:18px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-title">
            <h1>RASSWET GIFTS</h1>
            <p>Choose a section to continue</p>
        </div>
        <div id="mainMenu"></div>
    </div>
    <div class="notif" id="notif"></div>

    <script>
    const buttonStatus = { inventory:true, crash:true, cases:false, upgrade:false, friends:false };
    const buttonLinks = { inventory:'/inventory', crash:'/crash', cases:'/cases', upgrade:'/upgrade', friends:'/ref' };
    const buttonData = {
        crash:     { text:'CRASH',     gif:'/static/gifs/crash.gif', cls:'btn-crash big',    order:1 },
        inventory: { text:'PROFILE',   gif:'/static/gifs/inv.gif',   cls:'btn-profile small', order:2 },
        cases:     { text:'CASES',     gif:'/static/gifs/cases.gif', cls:'btn-disabled big',  order:3 },
        upgrade:   { text:'UPGRADES',  gif:'/static/gifs/upg.gif',   cls:'btn-disabled big',  order:4 },
        friends:   { text:'FRIENDS',   gif:'/static/gifs/frd.gif',   cls:'btn-disabled big',  order:5 }
    };

    async function init() {
        var auth = await telegramAuth();
        if(auth && auth.id){
            try{ var br=await fetch('/api/check-ban?user_id='+auth.id); var bd=await br.json(); if(bd.banned){window.location.href='/ban';return;} }catch(e){}
        }
        createMenu();
    }

    function createMenu() {
        var menu = document.getElementById('mainMenu');
        var sorted = Object.entries(buttonData).sort(function(a,b){return a[1].order - b[1].order});
        sorted.forEach(function(pair) {
            var key = pair[0], data = pair[1], active = buttonStatus[key];
            var btn = document.createElement('div');
            var sizeClass = data.cls.indexOf('big') !== -1 ? 'big' : 'small';
            btn.className = 'menu-button ' + sizeClass + ' ' + (active ? data.cls : 'btn-disabled ' + sizeClass + ' disabled');
            btn.onclick = active ? function(){ window.location.href = buttonLinks[key]; } : function(){ showNotif('Section temporarily unavailable'); };
            btn.innerHTML = (!active ? '<div class="lock-icon"><img src="/static/img/block.png" alt="Locked"></div>' : '') +
                '<div class="button-content"><span class="button-text">' + data.text + '</span><img src="' + data.gif + '" alt="' + data.text + '" class="button-gif"></div>';
            menu.appendChild(btn);
        });
    }

    function showNotif(msg) {
        var el = document.getElementById('notif');
        el.textContent = msg; el.className = 'notif show';
        clearTimeout(el._t);
        el._t = setTimeout(function(){ el.className = 'notif'; }, 1500);
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
