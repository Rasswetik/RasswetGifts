<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1C2233">
<title>Lucky Buy — Rasswet</title>
<link rel="icon" href="/static/img/logo.png" type="image/png">
<link rel="stylesheet" href="/static/css/global.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/telegram-auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{
  font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1C2233;color:#fff;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}

/* TOP BAR */
.top-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,8px) + 8px) 16px 10px;
  background:rgba(28,34,51,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.top-left{display:flex;align-items:center;gap:10px}
.top-avatar{
  width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);
}
.top-nick{
  font-size:14px;font-weight:700;color:rgba(255,255,255,.9);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;
}
.top-right{display:flex;align-items:center;gap:8px}
.bal-pill{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  background:rgba(120,135,160,.1);border:1px solid rgba(120,135,160,.2);
  font-weight:700;font-size:13px;color:#fff;
}
.bal-pill img{width:16px;height:16px;flex-shrink:0}
.bal-plus{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(120,135,160,.25);color:rgba(255,255,255,.8);
  font-size:16px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(120,135,160,.35);transition:all .2s;
}
.bal-plus:active{transform:scale(.9)}

/* PAGE */
.page{
  max-width:480px;margin:0 auto;
  padding-top:calc(env(safe-area-inset-top,8px) + 62px);
  padding-bottom:24px;min-height:100vh;
}

/* SEARCH */
.search-wrap{padding:12px 14px 4px}
.search-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:10px 14px;
  transition:border-color .25s,background .25s;
}
.search-box:focus-within{border-color:rgba(120,160,204,.35);background:rgba(255,255,255,.07)}
.search-box svg{flex-shrink:0;opacity:.35;stroke:currentColor;stroke-width:2;fill:none}
.search-input{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-size:14px;font-weight:500;font-family:inherit;
}
.search-input::placeholder{color:rgba(255,255,255,.25)}
.search-clear{
  display:none;width:20px;height:20px;border-radius:50%;border:none;
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);
  cursor:pointer;font-size:12px;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.search-clear.show{display:flex}
.search-clear:active{transform:scale(.85)}

/* SECTION */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 8px;
}
.section-lbl{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.4px;text-transform:uppercase}
.section-count{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.3);
  background:rgba(255,255,255,.05);padding:3px 9px;border-radius:20px;
}

/* GIFT GRID */
.gift-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 12px 20px;
}
.gift-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:10px;
  cursor:pointer;
  transition:border-color .2s,background .2s,transform .12s;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
}
.gift-card:active{transform:scale(.97)}
.gift-card:hover{border-color:rgba(120,160,204,.2);background:rgba(255,255,255,.05)}

.gift-frame-outer{
  width:100%;aspect-ratio:1;
  border-radius:12px;
  border:1.5px solid rgba(120,160,204,.15);
  background:rgba(120,160,204,.03);
  display:flex;align-items:center;justify-content:center;
  padding:6px;position:relative;overflow:hidden;
}
.gift-frame-inner{
  width:100%;height:100%;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.gift-frame-inner img{
  width:85%;height:85%;object-fit:contain;
  transition:transform .3s;
}
.gift-card:hover .gift-frame-inner img{transform:scale(1.05)}

.gift-label{width:100%;text-align:center;margin-top:8px}
.gift-name{
  font-size:12px;font-weight:700;color:rgba(255,255,255,.85);
  line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.gift-sub{font-size:10px;font-weight:600;margin-top:2px;line-height:1.2}
.gift-sub.random{color:rgba(166,130,255,.7)}
.gift-sub.number{color:rgba(120,160,204,.65)}

.gift-prices{
  display:flex;align-items:center;justify-content:center;gap:4px;
  margin-top:6px;width:100%;
}
.gift-buy{
  display:flex;align-items:center;gap:4px;
  font-size:13px;font-weight:800;color:#78A0CC;
}
.gift-buy img{width:13px;height:13px}

/* EMPTY */
.empty-state{
  display:none;flex-direction:column;align-items:center;
  padding:48px 20px;gap:10px;color:rgba(255,255,255,.25);
}
.empty-state svg{stroke:currentColor;fill:none;stroke-width:1.5;opacity:.4}
.empty-state p{font-size:13px;font-weight:600}

/* MRKT */
.mrkt-section{padding:0 12px 20px}
.mrkt-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 4px 8px;
}
.mrkt-lbl{font-size:13px;font-weight:700;color:rgba(120,160,204,.7);letter-spacing:.4px;text-transform:uppercase}
.mrkt-floor{
  font-size:11px;font-weight:600;color:rgba(255,255,255,.3);
  background:rgba(120,160,204,.08);padding:3px 9px;border-radius:20px;
}
.mrkt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mrkt-card{
  background:rgba(120,160,204,.04);
  border:1px solid rgba(120,160,204,.1);
  border-radius:14px;padding:8px;cursor:pointer;
  transition:border-color .2s,transform .12s;
  display:flex;flex-direction:column;align-items:center;
}
.mrkt-card:active{transform:scale(.97)}
.mrkt-card:hover{border-color:rgba(120,160,204,.25)}
.mrkt-img-wrap{
  width:100%;aspect-ratio:1;border-radius:10px;
  border:1px solid rgba(120,160,204,.12);
  background:rgba(0,0,0,.2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.mrkt-img-wrap img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.mrkt-info{width:100%;text-align:center;margin-top:6px}
.mrkt-name{font-size:10px;font-weight:600;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrkt-num{font-size:9px;font-weight:700;color:rgba(120,160,204,.55);margin-top:1px}
.mrkt-price{
  display:flex;align-items:center;justify-content:center;gap:3px;
  font-size:11px;font-weight:800;color:#78A0CC;margin-top:4px;
}
.mrkt-price img{width:11px;height:11px}
.mrkt-loading{
  grid-column:1/-1;display:flex;align-items:center;justify-content:center;
  padding:24px;color:rgba(255,255,255,.25);font-size:12px;font-weight:600;gap:8px;
}
.mrkt-loading .spinner{
  width:16px;height:16px;border:2px solid rgba(120,160,204,.2);
  border-top-color:rgba(120,160,204,.6);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.mrkt-empty{
  grid-column:1/-1;text-align:center;padding:20px;
  font-size:12px;font-weight:600;color:rgba(255,255,255,.2);
}

/* MODAL */
.lb-backdrop{
  position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.6);
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.lb-backdrop.show{opacity:1;pointer-events:all}

.lb-overlay{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;z-index:500;
  background:linear-gradient(170deg,#1a2335 0%,#141a28 100%);
  display:flex;flex-direction:column;
  border-radius:20px 20px 0 0;max-height:55vh;
  transition:transform .35s cubic-bezier(.22,.89,.32,1);
  will-change:transform;box-shadow:0 -6px 40px rgba(0,0,0,.5);overflow:hidden;
}
.lb-overlay.show{transform:translateX(-50%) translateY(0)}

.lb-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.15);margin:10px auto 0;flex-shrink:0;
}
.lb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;flex-shrink:0;
}
.lb-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px}
.lb-close{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.lb-close svg{stroke:currentColor;fill:none;stroke-width:2.5;width:14px;height:14px}
.lb-close:active{background:rgba(255,255,255,.14);transform:scale(.9)}

.lb-gift-strip{
  display:flex;align-items:center;gap:10px;padding:0 14px 8px;flex-shrink:0;
}
.lb-gift-thumb{
  width:44px;height:44px;border-radius:12px;
  background:rgba(120,160,204,.06);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:1.5px solid rgba(120,160,204,.18);overflow:hidden;
}
.lb-gift-thumb img{width:36px;height:36px;object-fit:contain}
.lb-gift-info{flex:1;min-width:0}
.lb-gift-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-gift-orig{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}

/* Roulette */
.lb-roulette{
  flex-shrink:0;position:relative;overflow:hidden;padding:10px 0;
  background:rgba(0,0,0,.12);
  border-top:1px solid rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.lb-track{
  display:flex;gap:6px;padding:0 14px;
  transform:translateX(0);will-change:transform;transition:none;
}
.lb-slot{
  flex-shrink:0;width:72px;height:72px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;overflow:hidden;transition:border-color .15s,background .15s;
}
.lb-slot img{width:48px;height:48px;object-fit:contain}
.lb-slot-name{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);text-align:center;padding:0 3px;line-height:1.3}
.lb-slot.s-gift{border-color:rgba(120,160,204,.25);background:rgba(120,160,204,.05)}
.lb-slot.s-empty{border-color:rgba(255,255,255,.04)}
.lb-slot.s-winner{border-color:#78A0CC;background:rgba(120,160,204,.15);box-shadow:0 0 20px rgba(120,160,204,.4)}
.lb-slot-empty-txt{font-size:8px;font-weight:900;letter-spacing:2px;color:rgba(255,80,80,.4);text-transform:uppercase;text-align:center}

.lb-arrow-wrap{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:2;width:20px;display:flex;flex-direction:column;align-items:center}
.lb-arrow-wrap-bot{position:absolute;bottom:0;left:50%;transform:translateX(-50%);z-index:2;width:20px;display:flex;flex-direction:column;align-items:center}
.lb-arrow-svg{width:18px;height:14px;fill:rgba(120,160,204,.8);filter:drop-shadow(0 0 4px rgba(120,160,204,.5))}
.lb-center-box{
  position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:76px;
  border-left:2px solid rgba(120,160,204,.4);border-right:2px solid rgba(120,160,204,.4);
  background:rgba(120,160,204,.04);pointer-events:none;z-index:1;
}

/* Controls */
.lb-controls{
  flex:1;display:flex;flex-direction:column;
  padding:10px 14px calc(env(safe-area-inset-bottom,0) + 12px);gap:10px;overflow-y:auto;
}
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.4)}
.ctrl-val{
  font-size:14px;font-weight:800;color:#fff;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);padding:2px 10px;border-radius:8px;min-width:48px;text-align:center;
}
.lb-range{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  background:rgba(255,255,255,.08);border-radius:10px;outline:none;cursor:pointer;
}
.lb-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;
  background:radial-gradient(circle at 35% 35%,#94bae0,#5888b8);
  border-radius:50%;cursor:pointer;border:2px solid #141a28;
  box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(120,160,204,.3);transition:transform .1s;
}
.lb-range::-webkit-slider-thumb:active{transform:scale(1.15)}
.lb-range::-moz-range-thumb{
  width:22px;height:22px;background:radial-gradient(circle at 35% 35%,#94bae0,#5888b8);
  border-radius:50%;border:2px solid #141a28;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.slider-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

.cost-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:8px 12px;
}
.cost-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.3px}
.cost-val{display:flex;align-items:center;gap:5px;font-size:16px;font-weight:900;color:#fff}
.cost-val img{width:15px;height:15px}

.demo-row{display:flex;gap:6px}
.demo-btn{
  flex:1;padding:8px;border-radius:10px;border:none;cursor:pointer;
  font-size:11px;font-weight:700;font-family:inherit;transition:all .18s;
}
.demo-btn.off{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.35)}
.demo-btn.on{background:rgba(120,160,204,.15);border:1px solid rgba(120,160,204,.3);color:#78A0CC}

.spin-btn{
  width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:800;font-family:inherit;letter-spacing:-.1px;
  background:linear-gradient(135deg,rgba(100,140,184,.25) 0%,rgba(80,120,168,.3) 100%);
  color:#A8C8F0;border:1.5px solid rgba(120,160,204,.4);
  transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.2);
  border-color:rgba(255,255,255,.06);cursor:not-allowed;transform:none;box-shadow:none;
}

/* RESULT */
.res-overlay{
  position:absolute;inset:0;z-index:10;
  background:rgba(19,24,37,.96);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:0;opacity:0;pointer-events:none;transition:opacity .3s;
}
.res-overlay.show{opacity:1;pointer-events:all}
.res-icon{animation:resPop .45s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes resPop{from{opacity:0;transform:scale(.4) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.res-img-box{
  width:96px;height:96px;border-radius:16px;background:rgba(120,160,204,.08);
  border:1.5px solid rgba(120,160,204,.25);display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(120,160,204,.2);
}
.res-img-box img{width:80px;height:80px;object-fit:contain}
.res-empty-box{
  width:96px;height:96px;border-radius:16px;background:rgba(255,80,80,.05);
  border:1.5px solid rgba(255,80,80,.16);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;box-shadow:0 0 24px rgba(255,80,80,.1);
}
.res-empty-txt{font-size:15px;font-weight:900;letter-spacing:3px;color:rgba(255,80,80,.5);text-transform:uppercase}
.res-title{font-size:18px;font-weight:900;letter-spacing:-.3px;margin-bottom:3px;margin-top:14px}
.res-title.win{color:#A8C8F0}
.res-title.lose{color:rgba(255,255,255,.4)}
.res-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);text-align:center;max-width:240px}
.res-sub{font-size:11px;color:rgba(255,255,255,.28);margin-top:3px;margin-bottom:18px}
.res-btns{display:flex;gap:8px;width:100%;max-width:260px}
.res-btn{
  flex:1;padding:11px;border-radius:12px;border:none;
  font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .2s;
}
.res-btn.sell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55)}
.res-btn.sell:active{transform:scale(.96)}
.res-btn.ok{background:rgba(120,160,204,.2);border:1.5px solid rgba(120,160,204,.4);color:#A8C8F0}
.res-btn.ok:active{transform:scale(.96)}
.res-btn.ok-only{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);width:100%}
.res-btn.ok-only:active{transform:scale(.96)}

/* TOAST */
.toast{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 60px);
  left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(25,32,48,.97);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:9px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);
  z-index:9999;opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(120,160,204,.4);color:#A8C8F0}
.toast.err{border-color:rgba(255,80,80,.3);color:rgba(255,110,110,.8)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-left">
    <img class="top-avatar" id="topAvatar" src="/static/img/default_avatar.png" alt=""
         onerror="this.src='/static/img/default_avatar.png'">
    <span class="top-nick" id="topNick">...</span>
  </div>
  <div class="top-right">
    <div class="bal-pill">
      <img src="/static/img/ton.png" alt="TON">
      <span id="balVal">0.00</span>
    </div>
    <button class="bal-plus" onclick="openDepositHint()">+</button>
  </div>
</div>

<div class="page">

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Поиск подарков..." autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&#10005;</button>
    </div>
  </div>

  <!-- MRKT LISTINGS -->
  <div id="mrktSection" class="mrkt-section" style="display:none">
    <div class="mrkt-hdr">
      <span class="mrkt-lbl">MRKT</span>
      <span class="mrkt-floor" id="mrktFloor"></span>
    </div>
    <div id="mrktGrid" class="mrkt-grid"></div>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-hdr">
    <span class="section-lbl">Подарки</span>
    <span class="section-count" id="giftCount">0</span>
  </div>

  <!-- GRID -->
  <div class="gift-grid" id="giftGrid">
    {% for gift in gifts %}
    <div class="gift-card"
         data-id="{{ gift.id }}"
         data-name="{{ gift.name|lower }}"
         data-value="{{ gift.value }}"
         data-image="{{ gift.image }}"
         data-full-name="{{ gift.name }}">
      <div class="gift-frame-outer">
        <div class="gift-frame-inner">
          <img src="{{ gift.image }}" alt="{{ gift.name }}" loading="lazy"
               onerror="this.src='/static/img/star.png'">
        </div>
      </div>
      <div class="gift-label">
        <div class="gift-name">{{ gift.name.replace(' (Random)', '') }}</div>
        {% if '(Random)' in gift.name %}
        <div class="gift-sub random">Random</div>
        {% else %}
        <div class="gift-sub number">#{{ gift.id }}</div>
        {% endif %}
      </div>
      <div class="gift-prices">
        <div class="gift-buy">
          <img src="/static/img/ton.png" alt="TON">
          <span>{{ "%.2f"|format(gift.value / 100) }}</span>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="empty-state" id="emptyState">
    <svg width="40" height="40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>Ничего не найдено</p>
  </div>
</div>

<!-- BACKDROP -->
<div class="lb-backdrop" id="lbBackdrop" onclick="closeLuckyBuy()"></div>

<!-- LUCKY BUY MODAL -->
<div class="lb-overlay" id="lbOverlay">
  <div class="lb-handle"></div>
  <div class="lb-header">
    <span class="lb-title">Lucky Buy</span>
    <button class="lb-close" onclick="closeLuckyBuy()">
      <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="lb-gift-strip">
    <div class="lb-gift-thumb">
      <img id="lbThumbImg" src="/static/img/star.png" alt="">
    </div>
    <div class="lb-gift-info">
      <div class="lb-gift-name" id="lbGiftName">—</div>
      <div class="lb-gift-orig" id="lbGiftOrig">— TON</div>
    </div>
  </div>
  <div class="lb-roulette" id="lbRoulette">
    <div class="lb-arrow-wrap">
      <svg class="lb-arrow-svg" viewBox="0 0 18 14"><polygon points="9,14 0,0 18,0"/></svg>
    </div>
    <div class="lb-center-box"></div>
    <div class="lb-track" id="lbTrack"></div>
    <div class="lb-arrow-wrap-bot">
      <svg class="lb-arrow-svg" viewBox="0 0 18 14"><polygon points="9,0 0,14 18,14"/></svg>
    </div>
  </div>
  <div class="lb-controls">
    <div>
      <div class="ctrl-row" style="margin-bottom:6px">
        <span class="ctrl-label">Шанс победы</span>
        <span class="ctrl-val" id="lbChanceVal">50%</span>
      </div>
      <input class="lb-range" type="range" id="lbRange" min="1" max="50" value="50"
             oninput="onChanceInput(this.value)">
      <div class="slider-labels"><span>1%</span><span>50%</span></div>
    </div>
    <div class="cost-row">
      <span class="cost-label">Стоимость</span>
      <div class="cost-val">
        <img src="/static/img/ton.png" alt="TON">
        <span id="lbCostVal">0.00</span>
      </div>
    </div>
    <div class="demo-row">
      <button class="demo-btn on" id="btnReal" onclick="setDemo(false)">Реальный</button>
      <button class="demo-btn off" id="btnDemo" onclick="setDemo(true)">Демо</button>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">
      РАСКРУТИТЬ — <span id="spinBtnCost">0.00</span> TON
    </button>
  </div>
  <div class="res-overlay" id="resOverlay">
    <div class="res-icon" id="resIcon"></div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-name" id="resName"></div>
    <div class="res-sub" id="resSub"></div>
    <div class="res-btns" id="resBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var $=function(id){return document.getElementById(id)};
function fmtTon(stars){var t=Number(stars||0)/100;return t>=100?t.toFixed(0):t>=10?t.toFixed(1):t.toFixed(2)}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var _lang=(function(){
  try{var tg=window.Telegram&&Telegram.WebApp&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user&&Telegram.WebApp.initDataUnsafe.user.language_code;if(tg)return tg.toLowerCase().startsWith('ru')?'ru':'en'}catch(e){}
  var n=navigator.language||navigator.userLanguage||'';return n.toLowerCase().startsWith('ru')?'ru':'en'
})();
var L={empty:_lang==='ru'?'ПУСТО':'EMPTY',victory:_lang==='ru'?'Победа':'You Won',empty_result:_lang==='ru'?'Пусто':'Empty',chance_was:_lang==='ru'?'Шанс был':'Chance was',demo_mode:_lang==='ru'?' — демо режим':' — demo mode',to_inv:_lang==='ru'?'В инвентарь':'To inventory',try_again:_lang==='ru'?'Попробовать ещё':'Try again'};

var _tt;
function toast(msg,type){var el=$('toast');el.textContent=msg;el.className='toast show'+(type==='ok'?' ok':type==='err'?' err':'');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show')},2600)}

var userData=null,curGift=null,curChance=50,demoMode=false,spinning=false;
var mrktSearchTimer=null,lastMrktQuery='';

document.addEventListener('DOMContentLoaded',function(){
  if(window.Telegram&&Telegram.WebApp){try{Telegram.WebApp.ready();Telegram.WebApp.expand()}catch(e){} try{Telegram.WebApp.setHeaderColor('#1C2233');Telegram.WebApp.setBackgroundColor('#1C2233')}catch(e){}}
  initUser();initGrid();updateRangeTrack($('lbRange'));
});

async function initUser(){
  try{var s=localStorage.getItem('rasswet_user');if(s){var p=JSON.parse(s);if(p&&p.id){userData=p;applyUser()}}}catch(e){}
  if(!userData||!userData.id){if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user){var u=Telegram.WebApp.initDataUnsafe.user;userData={id:u.id,first_name:u.first_name,username:u.username||'',photo_url:u.photo_url||'',balance_stars:0};applyUser()}}
  if((!userData||!userData.id)&&typeof telegramAuth==='function'){try{var a=await Promise.race([telegramAuth(),new Promise(function(_,r){setTimeout(r,5000)})]);if(a&&a.id){userData=a;applyUser()}}catch(e){}}
  if(!userData||!userData.id)userData={id:0,first_name:'',balance_stars:0};
  applyUser();
  if(userData.id){try{var r=await fetch('/api/user/'+userData.id);var d=await r.json();if(d.success){userData=Object.assign({},userData,d.user);applyUser();try{localStorage.setItem('rasswet_user',JSON.stringify(userData))}catch(e){}}}catch(e){}}
}
function applyUser(){
  $('balVal').textContent=fmtTon(userData&&userData.balance_stars||0);
  var nick=(userData&&(userData.username?'@'+userData.username:userData.first_name))||'';
  $('topNick').textContent=nick;
  if(userData&&userData.photo_url)$('topAvatar').src=userData.photo_url;
}
function openDepositHint(){toast('Пополнение — на странице Краш','')}

/* GRID & SEARCH */
function initGrid(){
  var cards=document.querySelectorAll('.gift-card');
  $('giftCount').textContent=cards.length;
  cards.forEach(function(c){
    c.addEventListener('click',function(){
      openLuckyBuy(parseInt(c.dataset.id),c.dataset.fullName,c.dataset.image,parseInt(c.dataset.value));
    });
  });
  $('searchInput').addEventListener('input',function(){
    var q=this.value.trim();
    $('searchClear').classList.toggle('show',q.length>0);
    doSearch(q);
  });
}

function doSearch(query){
  var q=query.toLowerCase();
  var cards=document.querySelectorAll('.gift-card');
  var vis=0;
  cards.forEach(function(c){
    var name=c.dataset.name||'';
    var fullName=(c.dataset.fullName||'').toLowerCase();
    var show=!q||name.indexOf(q)!==-1||fullName.indexOf(q)!==-1;
    c.style.display=show?'':'none';
    if(show)vis++;
  });
  $('giftCount').textContent=vis;
  $('emptyState').style.display=(vis===0&&q)?'flex':'none';

  clearTimeout(mrktSearchTimer);
  if(q.length>=2){
    mrktSearchTimer=setTimeout(function(){loadMrktGifts(query)},400);
  }else{
    $('mrktSection').style.display='none';
    lastMrktQuery='';
  }
}
function clearSearch(){$('searchInput').value='';$('searchClear').classList.remove('show');doSearch('')}

/* MRKT */
async function loadMrktGifts(query){
  var normalized=query.trim();
  if(normalized===lastMrktQuery)return;
  lastMrktQuery=normalized;
  var section=$('mrktSection'),grid=$('mrktGrid');
  section.style.display='';
  grid.innerHTML='<div class="mrkt-loading"><div class="spinner"></div>Загрузка с MRKT...</div>';
  $('mrktFloor').textContent='';
  try{
    var r=await fetch('/api/mrkt/gifts?name='+encodeURIComponent(normalized));
    var d=await r.json();
    if(!d.success||!d.gifts||d.gifts.length===0){grid.innerHTML='<div class="mrkt-empty">Ничего не найдено на MRKT</div>';return}
    if(d.floor_price_ton)$('mrktFloor').textContent='Floor: '+d.floor_price_ton+' TON';
    var html='';
    d.gifts.forEach(function(g){
      var imgSrc=escHtml(g.image||'');
      var num=g.number?'#'+g.number:'';
      var model=escHtml(g.model||g.collection_name||g.title||'');
      var price=g.price_ton||0;
      html+='<div class="mrkt-card" data-mrkt-id="'+escHtml(g.id||'')+'">'
        +'<div class="mrkt-img-wrap"><img src="'+imgSrc+'" loading="lazy" onerror="this.src=\'/static/img/star.png\'" alt=""></div>'
        +'<div class="mrkt-info"><div class="mrkt-name">'+model+'</div>'
        +(num?'<div class="mrkt-num">'+escHtml(num)+'</div>':'')
        +'</div>'
        +'<div class="mrkt-price"><img src="/static/img/ton.png" alt="">'+price.toFixed(2)+'</div>'
        +'</div>';
    });
    grid.innerHTML=html;
  }catch(e){grid.innerHTML='<div class="mrkt-empty">Ошибка загрузки</div>'}
}

/* MODAL */
function openLuckyBuy(id,name,image,value){
  curGift={id:id,name:name,image:image,value:value};curChance=50;demoMode=false;spinning=false;
  $('lbThumbImg').src=image||'/static/img/star.png';
  $('lbGiftName').textContent=name.replace(' (Random)','');
  $('lbGiftOrig').textContent=fmtTon(value)+' TON';
  $('lbRange').value=50;onChanceInput(50);setDemo(false);buildStrip(50,null);
  $('resOverlay').classList.remove('show');$('spinBtn').disabled=false;
  $('lbBackdrop').classList.add('show');$('lbOverlay').classList.add('show');
}
function closeLuckyBuy(){$('lbOverlay').classList.remove('show');$('lbBackdrop').classList.remove('show');spinning=false}

function onChanceInput(v){
  curChance=parseInt(v);$('lbChanceVal').textContent=curChance+'%';
  var cost=calcCostStars(curChance),ton=fmtTon(cost);
  $('lbCostVal').textContent=ton;$('spinBtnCost').textContent=ton;
  updateRangeTrack($('lbRange'));if(!spinning)buildStrip(curChance,null);
}
function calcCostStars(ch){return Math.max(1,Math.round((curGift?curGift.value:0)*ch/100))}
function updateRangeTrack(inp){var pct=(inp.value-inp.min)/(inp.max-inp.min)*100;inp.style.background='linear-gradient(to right,#78A0CC 0%,#78A0CC '+pct+'%,rgba(255,255,255,.08) '+pct+'%,rgba(255,255,255,.08) 100%)'}

function setDemo(on){demoMode=on;$('btnReal').className='demo-btn '+(on?'off':'on');$('btnDemo').className='demo-btn '+(on?'on':'off')}

var SLOT_W=78,CENTER_IDX=22;
function buildStrip(chance,result){
  var track=$('lbTrack'),html='';
  for(var i=0;i<38;i++){
    var isCenter=(i===CENTER_IDX)&&(result!==null);
    var showGift=isCenter?(result===true):Math.random()<(chance/100);
    if(showGift){
      html+='<div class="lb-slot s-gift"><img src="'+(curGift?curGift.image:'/static/img/star.png')+'" onerror="this.src=\'/static/img/star.png\'" alt=""><div class="lb-slot-name">'+(curGift?curGift.name.replace(' (Random)','').slice(0,14):'')+'</div></div>';
    }else{
      html+='<div class="lb-slot s-empty"><div class="lb-slot-empty-txt">'+L.empty+'</div></div>';
    }
  }
  track.innerHTML=html;track.style.transition='none';track.style.transform='translateX(0)';
}
function getCenterOffset(){var w=$('lbRoulette').offsetWidth||320;return -(CENTER_IDX*SLOT_W)+(w/2)-(SLOT_W/2)+16}

async function doSpin(){
  if(spinning)return;
  if(!curGift){toast('Выберите подарок','err');return}
  var cost=calcCostStars(curChance);
  if(!demoMode){
    if(!userData||!userData.id){toast('Войдите через Telegram','err');return}
    if((userData.balance_stars||0)<cost){toast('Недостаточно баланса','err');return}
  }
  spinning=true;$('spinBtn').disabled=true;$('resOverlay').classList.remove('show');
  buildStrip(curChance,null);
  var track=$('lbTrack'),finalX=getCenterOffset();
  void track.offsetWidth;
  track.style.transition='transform 1.0s cubic-bezier(0.2,0.6,0.4,1)';
  track.style.transform='translateX('+(finalX*0.5)+'px)';

  var apiPromise=fetch('/api/lucky-buy/spin',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user_id:userData?userData.id:0,gift_id:curGift.id,chance_percent:curChance,demo:demoMode})
  }).then(function(r){return r.json()}).catch(function(){return null});

  await sleep(1050);
  var resp=await apiPromise;
  if(!resp||!resp.success){toast((resp&&resp.error)||'Ошибка','err');spinning=false;$('spinBtn').disabled=false;track.style.transition='none';track.style.transform='translateX(0)';return}
  var won=resp.won;
  if(!demoMode&&resp.new_balance!=null){if(userData)userData.balance_stars=resp.new_balance;applyUser()}

  track.style.transition='none';track.style.transform='translateX('+(finalX*0.45)+'px)';
  void track.offsetWidth;buildStrip(curChance,won);
  track.style.transform='translateX('+(finalX*0.42)+'px)';void track.offsetWidth;
  track.style.transition='transform 2.0s cubic-bezier(0.05,0.8,0.2,1)';
  track.style.transform='translateX('+finalX+'px)';
  await sleep(2100);
  var slots=track.querySelectorAll('.lb-slot');
  if(slots[CENTER_IDX])slots[CENTER_IDX].classList.add('s-winner');
  await sleep(500);
  showResult(won,curChance);spinning=false;$('spinBtn').disabled=false;
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

function showResult(won,chance){
  var icon=$('resIcon'),title=$('resTitle'),name=$('resName'),sub=$('resSub'),btns=$('resBtns');
  icon.style.animation='none';void icon.offsetWidth;icon.style.animation='';
  if(won){
    icon.innerHTML='<div class="res-img-box"><img src="'+curGift.image+'" onerror="this.src=\'/static/img/star.png\'" alt=""></div>';
    title.className='res-title win';title.textContent=L.victory;
    name.textContent=curGift.name.replace(' (Random)','');
    sub.textContent=L.chance_was+' '+chance+'%'+(demoMode?L.demo_mode:'');
    btns.innerHTML='<button class="res-btn sell" onclick="goInventory()">'+L.to_inv+'</button><button class="res-btn ok" onclick="closeRes()">OK</button>';
  }else{
    icon.innerHTML='<div class="res-empty-box"><div class="res-empty-txt">'+L.empty+'</div></div>';
    title.className='res-title lose';title.textContent=L.empty_result;name.textContent='';
    sub.textContent=L.chance_was+' '+chance+'%'+(demoMode?L.demo_mode:'');
    btns.innerHTML='<button class="res-btn ok-only" onclick="closeRes()">'+L.try_again+'</button>';
  }
  $('resOverlay').classList.add('show');
}
function closeRes(){$('resOverlay').classList.remove('show')}
function goInventory(){window.location.href='/inventory'}
</script>
</body>
</html>
