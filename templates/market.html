<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Маркет — Rasswet</title>
<link rel="icon" href="/static/img/logo.png" type="image/png">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/telegram-auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 10px;max-width:480px;margin:0 auto}
.top-left{display:flex;align-items:center;gap:10px;min-width:0}
.top-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.1);flex-shrink:0}
.top-nick{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.top-right{display:flex;align-items:center;gap:8px}
.top-balance{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700}
.top-balance img{width:16px;height:16px}

/* CONTAINER */
.container{max-width:480px;margin:0 auto;padding:0 14px 120px}

/* HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
.page-title{font-size:20px;font-weight:800;color:#fff}
.sort-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.sort-btn:active{transform:scale(.9)}
.sort-label{font-size:13px;color:rgba(255,255,255,.35);cursor:pointer;margin-bottom:12px;padding:0 2px}

/* GRID */
.gifts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gift-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:10px;cursor:pointer;transition:border-color .2s,transform .12s;display:flex;flex-direction:column;align-items:center}
.gift-card:active{transform:scale(.97)}
.gift-img-wrap{width:100%;aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.gift-img-wrap img{width:90%;height:90%;object-fit:contain}
.gift-card-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.gift-card-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);margin-top:2px;text-align:center}
.gift-card-price{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px;font-size:13px;font-weight:800;color:rgba(255,255,255,.6)}
.gift-card-price img{width:14px;height:14px}
.empty-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,.2);font-size:14px;font-weight:600}

/* BUY MODAL */
.buy-overlay{position:fixed;inset:0;z-index:2000;background:rgba(10,12,20,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.buy-overlay.show{display:flex}
.buy-img-wrap{width:160px;height:160px;border-radius:20px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden}
.buy-img-wrap img{width:85%;height:85%;object-fit:contain}
.buy-name{font-size:18px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
.buy-sub{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:24px}
.buy-btn{width:100%;max-width:320px;padding:15px;border-radius:14px;border:none;background:#fff;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.buy-btn:active{transform:scale(.97);opacity:.9}
.buy-btn:disabled{opacity:.3;cursor:not-allowed}
.buy-btn img{width:16px;height:16px}
.buy-cancel{width:100%;max-width:320px;padding:12px;border-radius:14px;border:none;background:transparent;color:rgba(255,255,255,.35);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}

/* SUCCESS */
.success-overlay{position:fixed;inset:0;z-index:3000;background:rgba(10,12,20,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.success-overlay.show{display:flex}
.success-gif{width:140px;height:140px;object-fit:contain;margin-bottom:20px}
.success-title{font-size:20px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px}
.success-sub{font-size:14px;font-weight:600;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:5px;margin-bottom:28px}
.success-sub img{width:14px;height:14px}
.success-ok{width:100%;max-width:320px;padding:15px;border-radius:14px;border:none;background:#fff;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.success-ok:active{transform:scale(.97)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:100;width:100%;max-width:480px;height:72px;padding:0 8px calc(env(safe-area-inset-bottom,0px)+8px);background:rgba(26,30,42,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 16px;border-radius:12px;color:rgba(255,255,255,.4);font-weight:600;cursor:pointer;text-decoration:none;transition:all .3s}
.bnav-item svg{width:24px;height:24px;stroke:currentColor;fill:none}
.bnav-item span{font-size:10px;font-weight:600}
.bnav-item.active{background:rgba(255,255,255,.08);color:#fff}
.bnav-item:active{transform:scale(.9)}

/* TOAST */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+60px);left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(25,32,48,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(255,80,80,.3);color:rgba(255,110,110,.8)}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-left">
    <img class="top-avatar" id="topAvatar" src="/static/img/default_avatar.png" alt="">
    <span class="top-nick" id="topNick">—</span>
  </div>
  <div class="top-right">
    <div class="top-balance"><img src="/static/img/ton.png" alt=""><span id="topBalance">0.00</span></div>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-title">Маркет</div>
    <button class="sort-btn" onclick="toggleSort()">
      <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><path d="M3 6h12M5 10h8M7 14h4"/></svg>
    </button>
  </div>
  <div class="sort-label" id="sortLabel" onclick="toggleSort()">Сначала дорогие ▾</div>
  <div class="gifts-grid" id="giftsGrid">
    <div class="empty-msg">Загрузка...</div>
  </div>
</div>

<!-- BUY MODAL -->
<div class="buy-overlay" id="buyOverlay">
  <div class="buy-img-wrap"><img id="buyImg" src="" alt=""></div>
  <div class="buy-name" id="buyName"></div>
  <div class="buy-sub">Random</div>
  <button class="buy-btn" id="buyBtn" onclick="doBuy()">Купить за <span id="buyPrice">0</span> <img src="/static/img/ton.png" alt="TON"></button>
  <button class="buy-cancel" onclick="closeBuy()">Отмена</button>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <img class="success-gif" src="/static/gifs/Hlop.gif" alt="">
  <div class="success-title" id="successTitle"></div>
  <div class="success-sub" id="successSub"></div>
  <button class="success-ok" onclick="closeSuccess()">OK</button>
</div>

<nav class="bottom-nav">
  <a class="bnav-item" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="3"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1" fill="currentColor" stroke="none"/></svg><span>Игры</span></a>
  <a class="bnav-item" href="/news"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg><span>Новости</span></a>
  <a class="bnav-item active" href="/market"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/></svg><span>Маркет</span></a>
  <a class="bnav-item" href="/leaderboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg><span>Топ</span></a>
  <a class="bnav-item" href="/inventory"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Профиль</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
var userData=null, giftsData=[], sortDir='desc', selectedGift=null;

function fmtTon(s){var t=(s||0)/100;return t>=100?t.toFixed(0):t>=10?t.toFixed(1):t.toFixed(2)}
var _tt;
function toast(msg,err){var e=document.getElementById('toast');e.textContent=msg;e.className='toast show'+(err?' err':'');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show')},2600)}

document.addEventListener('DOMContentLoaded',async function(){
  if(window.Telegram&&Telegram.WebApp){try{Telegram.WebApp.ready();Telegram.WebApp.expand();Telegram.WebApp.setHeaderColor('#0a0a0f');Telegram.WebApp.setBackgroundColor('#0a0a0f')}catch(e){}}
  await initUser();
  loadGifts();
});

async function initUser(){
  var auth=await telegramAuth();
  if(!auth||!auth.id)return;
  try{var br=await fetch('/api/check-ban?user_id='+auth.id);var bd=await br.json();if(bd.banned){window.location.href='/ban';return}}catch(e){}
  try{
    var r=await fetch('/api/telegram-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(auth)});
    var d=await r.json();
    if(d.success){userData=d.user;updateTopBar()}
  }catch(e){}
}
function updateTopBar(){
  if(!userData)return;
  document.getElementById('topNick').textContent=userData.first_name||'User';
  if(userData.photo_url)document.getElementById('topAvatar').src=userData.photo_url;
  document.getElementById('topBalance').textContent=fmtTon(userData.balance_stars);
}

function toggleSort(){
  sortDir=sortDir==='desc'?'asc':'desc';
  document.getElementById('sortLabel').textContent=sortDir==='desc'?'Сначала дорогие ▾':'Сначала дешёвые ▴';
  renderGifts();
}

async function loadGifts(){
  try{
    var r=await fetch('/api/market/gifts');
    var d=await r.json();
    if(d.success)giftsData=d.gifts||[];
    renderGifts();
  }catch(e){document.getElementById('giftsGrid').innerHTML='<div class="empty-msg">Ошибка загрузки</div>'}
}

function renderGifts(){
  var grid=document.getElementById('giftsGrid');
  var items=[].concat(giftsData);
  items.sort(function(a,b){return sortDir==='desc'?b.price_stars-a.price_stars:a.price_stars-b.price_stars});
  if(!items.length){grid.innerHTML='<div class="empty-msg">Подарков пока нет</div>';return}
  var nftIdx={};
  grid.innerHTML=items.map(function(g){
    var slug=g.slug||'';
    var imgSrc=g.image||'/static/img/star.png';
    if(slug){
      if(!nftIdx[slug])nftIdx[slug]=Math.floor(Math.random()*4999)+1;
      else nftIdx[slug]++;
      imgSrc='https://nft.fragment.com/gift/'+slug.replace(/\s/g,'')+'-'+nftIdx[slug]+'.medium.jpg';
    }
    return '<div class="gift-card" onclick="openBuy('+g.id+')">'
      +'<div class="gift-img-wrap"><img src="'+imgSrc+'" alt="" loading="lazy" onerror="this.onerror=null;this.src=\''+g.image+'\'"></div>'
      +'<div class="gift-card-name">'+g.name+'</div>'
      +'<div class="gift-card-sub">Random</div>'
      +'<div class="gift-card-price"><img src="/static/img/ton.png">'+g.price_ton+'</div>'
    +'</div>';
  }).join('');
}

function openBuy(id){
  var g=giftsData.find(function(x){return x.id===id});
  if(!g)return;
  selectedGift=g;
  var slug=g.slug||'';
  var imgSrc=g.image;
  if(slug){
    var rn=Math.floor(Math.random()*4999)+1;
    imgSrc='https://nft.fragment.com/gift/'+slug.replace(/\s/g,'')+'-'+rn+'.medium.jpg';
  }
  document.getElementById('buyImg').src=imgSrc;
  document.getElementById('buyImg').onerror=function(){this.onerror=null;this.src=g.image};
  document.getElementById('buyName').textContent=g.name;
  document.getElementById('buyPrice').textContent=g.price_ton;
  document.getElementById('buyBtn').disabled=false;
  document.getElementById('buyOverlay').classList.add('show');
}
function closeBuy(){document.getElementById('buyOverlay').classList.remove('show');selectedGift=null}

async function doBuy(){
  if(!selectedGift||!userData||!userData.id)return;
  var btn=document.getElementById('buyBtn');
  btn.disabled=true;btn.textContent='Покупка...';
  try{
    var r=await fetch('/api/market/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userData.id,gift_id:selectedGift.id})});
    var d=await r.json();
    if(d.success){
      if(d.new_balance!=null){userData.balance_stars=d.new_balance;updateTopBar()}
      closeBuy();
      showSuccess('Вы успешно купили '+d.gift_name+'!',d.price_ton);
    }else{
      toast(d.error||'Ошибка покупки',true);
      btn.disabled=false;btn.innerHTML='Купить за '+selectedGift.price_ton+' <img src="/static/img/ton.png" alt="TON">';
    }
  }catch(e){toast('Ошибка соединения',true);btn.disabled=false;btn.innerHTML='Купить за '+selectedGift.price_ton+' <img src="/static/img/ton.png" alt="TON">'}
}

function showSuccess(title,price){
  document.getElementById('successTitle').textContent=title;
  document.getElementById('successSub').innerHTML=price?'<img src="/static/img/ton.png">'+price+' TON':'';
  document.getElementById('successOverlay').classList.add('show');
}
function closeSuccess(){document.getElementById('successOverlay').classList.remove('show')}
</script>
</body>
</html>
