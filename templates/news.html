<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="/static/img/logo.png">
<link rel="stylesheet" href="/static/css/global.css">
<title>Новости</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@font-face{font-family:'LilitaOne';src:url('/static/fonts/lilitaone-regular-webfont.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;unicode-range:U+0000-024F,U+0300-036F,U+1E00-1EFF,U+2000-206F,U+2070-209F,U+20A0-20CF,U+2100-214F}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{
    font-family:'LilitaOne','Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#1A1E2A;
    color:#fff;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-top:calc(env(safe-area-inset-top,20px) + 70px + 5vh);
    padding-bottom:80px;
}

/* Background */
body::before{
    content:'';position:fixed;top:0;left:0;width:100%;height:100%;
    background:
        radial-gradient(circle at 20% 50%,rgba(140,160,190,.08) 0%,transparent 50%),
        radial-gradient(circle at 80% 50%,rgba(140,160,190,.06) 0%,transparent 50%);
    z-index:-1;
    pointer-events:none;
}

/* Container */
.container{
    max-width:480px;
    margin:0 auto;
    padding:0 12px;
}
@media(min-width:768px){ .container{max-width:480px} }

/* Header */
.header{
    position:fixed;top:calc(env(safe-area-inset-top,0px) + 5vh);left:50%;transform:translateX(-50%);
    z-index:100;width:100%;max-width:480px;
    background:rgba(26,30,42,.95);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
}
.header-title{font-size:20px;font-weight:700;flex:1}
.header-back{
    width:36px;height:36px;border-radius:10px;
    background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .2s;
}
.header-back:hover{background:rgba(255,255,255,.12)}
.header-back:active{transform:scale(.95)}
.header-back svg{width:20px;height:20px;stroke:#fff;fill:none}

/* News container */
.news-container{
    padding:16px 0;
    display:flex;flex-direction:column;gap:16px;
}

/* News card */
.news-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
    transition:transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s ease;
    animation:cardIn .4s ease both;
}
.news-card:nth-child(2){animation-delay:.06s}
.news-card:nth-child(3){animation-delay:.12s}
.news-card:nth-child(4){animation-delay:.18s}
.news-card:nth-child(5){animation-delay:.24s}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.news-card:active{transform:scale(.98)}

.news-image{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    background:rgba(255,255,255,.03);
    display:block;
}
.news-image.placeholder{
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg, #1a1e2a 0%, #252b3b 100%);
}
.news-image.placeholder img{
    width:64px;height:64px;opacity:.3;
}

.news-body{padding:14px 16px}

.news-title{
    font-size:17px;
    font-weight:700;
    margin-bottom:6px;
    line-height:1.3;
}

.news-content{
    font-size:13px;
    color:rgba(255,255,255,.6);
    line-height:1.5;
    margin-bottom:12px;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.news-meta{
    display:flex;align-items:center;justify-content:space-between;
    font-size:12px;color:rgba(255,255,255,.4);
}

.news-date{display:flex;align-items:center;gap:4px}

.news-reward{
    display:flex;align-items:center;gap:6px;
    background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(0,200,100,.1));
    border:1px solid rgba(0,255,136,.3);
    padding:6px 14px;
    border-radius:20px;
    font-weight:600;
    color:#0f8;
    cursor:pointer;
    transition:all .2s;
    font-size:13px;
}
.news-reward:hover{transform:scale(1.02);box-shadow:0 0 12px rgba(0,255,136,.3)}
.news-reward:active{transform:scale(.97)}
.news-reward img{width:16px;height:16px}
.news-reward.claimed{
    background:rgba(255,255,255,.05);
    border-color:rgba(255,255,255,.1);
    color:rgba(255,255,255,.4);
    cursor:default;
    pointer-events:none;
}

/* Empty state */
.empty-state{
    text-align:center;
    padding:60px 20px;
    color:rgba(255,255,255,.4);
}
.empty-icon{
    width:80px;height:80px;
    margin:0 auto 16px;
    opacity:.4;
}
.empty-text{font-size:16px;font-weight:500}

/* Loading */
.loading{
    text-align:center;
    padding:40px;
    color:rgba(255,255,255,.5);
}
.loading::after{
    content:'';display:inline-block;
    width:24px;height:24px;
    border:2px solid rgba(255,255,255,.2);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:4000;
    background:rgba(26,30,42,.85);
    border-top:1px solid rgba(255,255,255,.05);
    display:flex;align-items:center;justify-content:center;
    padding:6px 10px calc(env(safe-area-inset-bottom,8px) + 6px);
    gap:2px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.bottom-nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:8px 12px;
    border-radius:14px;
    background:transparent;
    border:none;
    color:rgba(255,255,255,.3);
    font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-weight:600;font-size:12px;
    cursor:pointer;
    transition:all .25s ease;
    text-decoration:none;
    flex:1;
    max-width:100px;
    position:relative;
}
.bottom-nav-item svg{
    width:22px;height:22px;
    flex-shrink:0;
    stroke:currentColor;
    fill:none;
    transition:transform .25s ease;
}
.bottom-nav-item span{font-size:10px;font-weight:700;letter-spacing:.3px}
.bottom-nav-item.active{
    background:rgba(255,255,255,.07);
    color:#C8D0DC;
}
.bottom-nav-item.active svg{transform:scale(1.1)}
.bottom-nav-item.active::after{
    content:'';position:absolute;top:-1px;left:25%;right:25%;height:2px;
    background:linear-gradient(90deg,transparent,rgba(200,208,220,.5),transparent);
    border-radius:2px;
}

/* Toast */
.toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:#1e2230;
    border:1px solid rgba(255,255,255,.1);
    padding:12px 24px;border-radius:12px;
    font-size:14px;font-weight:500;
    opacity:0;visibility:hidden;
    transition:all .3s;
    z-index:9999;
}
.toast.show{opacity:1;visibility:visible}
.toast.ok{border-color:rgba(0,255,136,.3);color:#0f8}
.toast.err{border-color:rgba(255,68,68,.3);color:#f44}
</style>
</head>
<body>

<div class="header">
    <div class="header-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </div>
    <div class="header-title">Новости</div>
</div>

<div class="container">
    <div class="news-container" id="newsContainer">
        <div class="loading"></div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <a class="bottom-nav-item" href="/crash">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
        <span>Краш</span>
    </a>
    <a class="bottom-nav-item" href="/cases">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        <span>Кейсы</span>
    </a>
    <a class="bottom-nav-item active" href="/news">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
        <span>Новости</span>
    </a>
    <a class="bottom-nav-item" href="/leaderboard">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
        <span>Топ</span>
    </a>
    <a class="bottom-nav-item" href="/inventory">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Профиль</span>
    </a>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
    var $ = function(id){ return document.getElementById(id); };
    var tg = window.Telegram && window.Telegram.WebApp;
    var userId = null;
    
    if(tg){
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#1A1E2A');
        tg.setBackgroundColor('#1A1E2A');
        userId = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id;
    }
    
    function showToast(msg, type){
        var t = $('toast');
        t.textContent = msg;
        t.className = 'toast show ' + (type || 'ok');
        setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    
    function formatDate(dateStr){
        var d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
    }
    
    function formatReward(amount){
        if(amount >= 100){
            return (amount / 100).toFixed(2) + ' TON';
        }
        return amount + ' Stars';
    }
    
    async function loadNews(){
        try{
            var url = '/api/news';
            if(userId) url += '?user_id=' + userId;
            
            var r = await fetch(url);
            var d = await r.json();
            
            if(!d.success || !d.news || d.news.length === 0){
                $('newsContainer').innerHTML = '<div class="empty-state"><img class="empty-icon" src="/static/img/news/none.svg" alt=""><div class="empty-text">Нет новостей</div></div>';
                return;
            }
            
            $('newsContainer').innerHTML = d.news.map(function(n){
                var imageHtml = n.image_url 
                    ? '<img class="news-image" src="' + n.image_url + '" alt="" onerror="this.outerHTML=\'<div class=\\\'news-image placeholder\\\'><img src=\\\'/static/img/news/none.svg\\\' alt=\\\'\\\'></div>\'">'
                    : '<div class="news-image placeholder"><img src="/static/img/news/none.svg" alt=""></div>';
                
                var rewardHtml = '';
                if(n.reward_amount > 0){
                    if(n.claimed){
                        rewardHtml = '<div class="news-reward claimed" onclick="event.stopPropagation()"><span>✓ Получено</span></div>';
                    } else {
                        rewardHtml = '<div class="news-reward" onclick="event.stopPropagation(); claimReward(' + n.id + ', this)"><img src="/static/img/star.png" alt=""><span>+' + formatReward(n.reward_amount) + '</span></div>';
                    }
                }
                
                return '<div class="news-card" onclick="openNews(' + n.id + ')">' +
                    imageHtml +
                    '<div class="news-body">' +
                        '<div class="news-title">' + n.title + '</div>' +
                        '<div class="news-content">' + n.content + '</div>' +
                        '<div class="news-meta">' +
                            '<div class="news-date">' + formatDate(n.created_at) + '</div>' +
                            rewardHtml +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
            
        }catch(e){
            console.error('Load news error:', e);
            $('newsContainer').innerHTML = '<div class="empty-state"><img class="empty-icon" src="/static/img/news/none.svg" alt=""><div class="empty-text">Ошибка загрузки</div></div>';
        }
    }
    
    window.openNews = function(newsId){
        window.location.href = '/news/' + newsId;
    };
    
    window.claimReward = async function(newsId, btn){
        if(!userId){
            showToast('Войдите через Telegram', 'err');
            return;
        }
        
        btn.style.pointerEvents = 'none';
        btn.innerHTML = '<span>...</span>';
        
        try{
            var r = await fetch('/api/news/claim-reward', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, news_id: newsId})
            });
            var d = await r.json();
            
            if(d.success){
                btn.className = 'news-reward claimed';
                btn.innerHTML = '<span>✓ Получено</span>';
                showToast('Получено +' + formatReward(d.reward), 'ok');
            } else {
                btn.innerHTML = '<span>Ошибка</span>';
                showToast(d.error || 'Ошибка', 'err');
            }
        }catch(e){
            btn.innerHTML = '<span>Ошибка</span>';
            showToast('Ошибка сети', 'err');
        }
    };
    
    loadNews();
})();
</script>

</body>
</html>
