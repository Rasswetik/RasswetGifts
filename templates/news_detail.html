<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="/static/img/logo.png">
<link rel="stylesheet" href="/static/css/global.css">
<title>Новость</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{
    font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#1A1E2A;
    color:#fff;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:100px;
}
body::before{
    content:'';position:fixed;top:0;left:0;width:100%;height:100%;
    background:
        radial-gradient(circle at 20% 50%,rgba(140,160,190,.08) 0%,transparent 50%),
        radial-gradient(circle at 80% 50%,rgba(140,160,190,.06) 0%,transparent 50%);
    z-index:-1;pointer-events:none;
}

/* Container */
.container{max-width:480px;margin:0 auto;padding:0 12px}
@media(min-width:768px){.container{max-width:480px}}

/* Header */
.header{
    position:sticky;top:0;z-index:100;
    background:rgba(26,30,42,.95);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
}
.header-title{font-size:18px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-back{
    width:36px;height:36px;border-radius:10px;
    background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .2s;flex-shrink:0;
}
.header-back:hover{background:rgba(255,255,255,.12)}
.header-back:active{transform:scale(.95)}
.header-back svg{width:20px;height:20px;stroke:#fff;fill:none}

/* Banner */
.news-banner{
    width:100%;
    aspect-ratio:3/1;
    background:rgba(255,255,255,.03);
    overflow:hidden;
}
.news-banner img{
    width:100%;height:100%;
    object-fit:cover;
}

/* Version badge */
.version-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(100,140,200,.15);
    border:1px solid rgba(100,140,200,.3);
    padding:8px 16px;
    border-radius:20px;
    margin:16px;
    font-weight:700;
    color:#7a9ac0;
}
.version-badge svg{width:18px;height:18px;stroke:currentColor;fill:none}

/* Content */
.news-content{
    padding:0 16px 20px;
}
.news-title{
    font-size:24px;
    font-weight:800;
    margin-bottom:12px;
    line-height:1.3;
}
.news-meta{
    display:flex;align-items:center;gap:12px;
    font-size:13px;
    color:rgba(255,255,255,.4);
    margin-bottom:20px;
}
.news-date{display:flex;align-items:center;gap:4px}

/* Article content */
.article{
    font-size:15px;
    line-height:1.7;
    color:rgba(255,255,255,.8);
}
.article h2{
    font-size:18px;
    font-weight:700;
    margin:24px 0 12px;
    color:#fff;
}
.article h3{
    font-size:16px;
    font-weight:600;
    margin:20px 0 10px;
    color:rgba(255,255,255,.9);
}
.article p{margin-bottom:12px}
.article ul{
    margin:12px 0;
    padding-left:20px;
}
.article li{
    margin-bottom:8px;
    color:rgba(255,255,255,.7);
}

/* Reward section */
.reward-section{
    margin:24px 16px;
    padding:16px;
    background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,200,100,.05));
    border:1px solid rgba(0,255,136,.25);
    border-radius:16px;
}
.reward-title{
    font-weight:700;
    font-size:15px;
    margin-bottom:8px;
    color:#0f8;
}
.reward-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg,#00cc66,#008844);
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:all .2s;
}
.reward-btn:active{transform:scale(.98)}
.reward-btn.claimed{
    background:rgba(255,255,255,.1);
    color:rgba(255,255,255,.5);
    cursor:default;
}

/* Loading */
.loading{
    text-align:center;
    padding:60px 20px;
    color:rgba(255,255,255,.5);
}
.loading::after{
    content:'';display:inline-block;
    width:28px;height:28px;
    border:3px solid rgba(255,255,255,.2);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error state */
.error-state{
    text-align:center;
    padding:60px 20px;
    color:rgba(255,255,255,.4);
}
.error-icon{font-size:48px;margin-bottom:12px}
.error-text{font-size:16px;font-weight:500}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:4000;
    background:rgba(26,30,42,.85);
    border-top:1px solid rgba(255,255,255,.05);
    display:flex;align-items:center;justify-content:center;
    padding:6px 10px calc(env(safe-area-inset-bottom,8px) + 6px);
    gap:2px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.bottom-nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:8px 12px;
    border-radius:14px;
    background:transparent;
    border:none;
    color:rgba(255,255,255,.3);
    font-family:'Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-weight:600;font-size:12px;
    cursor:pointer;
    transition:all .25s ease;
    text-decoration:none;
    flex:1;
    max-width:100px;
    position:relative;
}
.bottom-nav-item svg{
    width:22px;height:22px;
    flex-shrink:0;
    stroke:currentColor;
    fill:none;
    transition:transform .25s ease;
}
.bottom-nav-item span{font-size:10px;font-weight:700;letter-spacing:.3px}
.bottom-nav-item.active{
    background:rgba(255,255,255,.07);
    color:#C8D0DC;
}
.bottom-nav-item.active svg{transform:scale(1.1)}
.bottom-nav-item.active::after{
    content:'';position:absolute;top:-1px;left:25%;right:25%;height:2px;
    background:linear-gradient(90deg,transparent,rgba(200,208,220,.5),transparent);
    border-radius:2px;
}

/* Toast */
.toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:#1e2230;
    border:1px solid rgba(255,255,255,.1);
    padding:12px 24px;border-radius:12px;
    font-size:14px;font-weight:500;
    opacity:0;visibility:hidden;
    transition:all .3s;
    z-index:9999;
}
.toast.show{opacity:1;visibility:visible}
.toast.ok{border-color:rgba(0,255,136,.3);color:#0f8}
.toast.err{border-color:rgba(255,68,68,.3);color:#f44}
</style>
</head>
<body>

<div class="header">
    <div class="header-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </div>
    <div class="header-title" id="headerTitle">Новость</div>
</div>

<div id="newsContent">
    <div class="loading"></div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <a class="bottom-nav-item" href="/crash">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
        <span>Краш</span>
    </a>
    <a class="bottom-nav-item" href="/cases">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        <span>Кейсы</span>
    </a>
    <a class="bottom-nav-item active" href="/news">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>
        <span>Новости</span>
    </a>
    <a class="bottom-nav-item" href="/leaderboard">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
        <span>Топ</span>
    </a>
    <a class="bottom-nav-item" href="/inventory">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Профиль</span>
    </a>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
    var tg = window.Telegram && window.Telegram.WebApp;
    var userId = null;
    var newsId = {{ news_id }};
    
    if(tg){
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#1A1E2A');
        tg.setBackgroundColor('#1A1E2A');
        userId = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id;
    }
    
    function goBack(){
        window.location.href = '/news';
    }
    window.goBack = goBack;
    
    function showToast(msg, type){
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + (type || 'ok');
        setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    
    function formatDate(dateStr){
        var d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
    }
    
    function parseMarkdown(text){
        return text
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^- (.+)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/^([^<].+)$/gm, '<p>$1</p>')
            .replace(/<p><\/p>/g, '')
            .replace(/<p>(<h[23]>)/g, '$1')
            .replace(/(<\/h[23]>)<\/p>/g, '$1')
            .replace(/<p>(<ul>)/g, '$1')
            .replace(/(<\/ul>)<\/p>/g, '$1');
    }
    
    async function loadNews(){
        try{
            var url = '/api/news/' + newsId;
            if(userId) url += '?user_id=' + userId;
            
            var r = await fetch(url);
            var d = await r.json();
            
            if(!d.success || !d.news){
                document.getElementById('newsContent').innerHTML = '<div class="error-state"><div class="error-icon">📰</div><div class="error-text">Новость не найдена</div></div>';
                return;
            }
            
            var news = d.news;
            
            document.getElementById('headerTitle').textContent = news.title;
            
            var bannerUrl = news.banner || news.cover || '/static/img/news/none.svg';
            var coverUrl = news.cover || '/static/img/news/none.svg';
            var version = news.version || '';
            
            var html = '';
            
            // Banner
            html += '<div class="news-banner"><img src="' + bannerUrl + '" onerror="this.src=\'' + coverUrl + '\'"></div>';
            
            // Version badge
            if(version){
                html += '<div class="version-badge"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Версия ' + version + '</div>';
            }
            
            // Content
            html += '<div class="news-content">';
            html += '<div class="news-title">' + news.title + '</div>';
            html += '<div class="news-meta"><div class="news-date">' + formatDate(news.created_at) + '</div></div>';
            html += '<div class="article">' + parseMarkdown(news.content) + '</div>';
            html += '</div>';
            
            // Reward section
            if(news.reward_amount > 0){
                html += '<div class="reward-section">';
                html += '<div class="reward-title">🎁 Награда за прочтение</div>';
                if(news.claimed){
                    html += '<button class="reward-btn claimed" disabled>✓ Награда получена</button>';
                } else {
                    html += '<button class="reward-btn" onclick="claimReward(' + news.id + ')">Получить +' + news.reward_amount + ' Stars</button>';
                }
                html += '</div>';
            }
            
            document.getElementById('newsContent').innerHTML = html;
            
        }catch(e){
            console.error('Load news error:', e);
            document.getElementById('newsContent').innerHTML = '<div class="error-state"><div class="error-icon">❌</div><div class="error-text">Ошибка загрузки</div></div>';
        }
    }
    
    window.claimReward = async function(nid){
        if(!userId){
            showToast('Войдите через Telegram', 'err');
            return;
        }
        
        try{
            var r = await fetch('/api/news/claim-reward', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, news_id: nid})
            });
            var d = await r.json();
            
            if(d.success){
                showToast('Получено +' + d.reward + ' Stars!', 'ok');
                loadNews();
            } else {
                showToast(d.error || 'Ошибка', 'err');
            }
        }catch(e){
            showToast('Ошибка сети', 'err');
        }
    };
    
    loadNews();
})();
</script>

</body>
</html>
